<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fshow - Votação</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  
  <link rel="icon" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png" type="image/png">
  <link rel="apple-touch-icon" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">
  <meta name="theme-color" content="#8A2BE2">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@400;500;600;700&display=swap');

    :root {
      --bg: #e0eaea;
      --card-bg: rgba(255, 255, 255, 0.95);
      --selected-bg: #f9d5e0;
      --panel-border: #8ecbc4;
      --accent: #78a9d6;
      --gem-pink: #e599ad;
      --mint-royal: #6ab9a7;
      --text: #2c3e50;
      --muted: #607d8b;
      --border-radius: 14px;
      --transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      --shadow-sm: 0 3px 10px rgba(44, 62, 80, 0.15);
      --shadow-md: 0 8px 24px rgba(120, 169, 214, 0.45);
      --shadow-lg: 0 15px 35px rgba(44, 62, 80, 0.2);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: "Poppins", sans-serif;
      color: var(--text);
      background-color: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url('https://i.ibb.co/tpG8tM20/file-00000000c988720e9063fc508c30f7e7.png') center/cover fixed no-repeat;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px 15px;
      animation: slideUp 0.5s ease-out forwards;
    }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      text-align: center;
      text-transform: uppercase;
      border-bottom: 3px double var(--accent);
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .options { display: flex; flex-direction: column; gap: 8px; }

    .option {
      display: flex;
      background: var(--card-bg);
      border: 2px solid #5a7a7f;
      border-radius: var(--border-radius);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .option:hover { transform: translateY(-2px); border-color: var(--accent); }
    .option.selected { background: var(--selected-bg); border-color: var(--gem-pink); box-shadow: 0 0 15px rgba(229, 153, 173, 0.3); }

    .option img { width: 100px; height: 90px; object-fit: cover; flex-shrink: 0; }
    .option-content {
      display: flex; align-items: center; padding: 0 15px; width: 100%;
      font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700;
    }

    input[type="radio"] {
      appearance: none; -webkit-appearance: none;
      width: 20px; height: 20px; border: 2px solid var(--accent);
      border-radius: 50%; margin-right: 12px; background: #fff;
      transition: var(--transition); position: relative;
    }
    input[type="radio"]:checked { background: var(--gem-pink); border-color: var(--gem-pink); }
    input[type="radio"]:checked::after {
      content: ""; position: absolute; inset: 4px; background: #fff; border-radius: 50%;
    }

    button {
      width: 100%; padding: 14px; margin-top: 15px;
      font-family: 'Cinzel', serif; font-size: 18px; font-weight: 800;
      border: 2px solid var(--gem-pink); border-radius: 8px;
      background: linear-gradient(180deg, #fce0e7 0%, #f7b2c4 100%);
      cursor: pointer; transition: var(--transition);
    }
    button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.05); }
    button:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(0.5); }

    /* Captcha Widget */
    #botaoCaptcha {
      display: flex; align-items: center; gap: 12px;
      background: var(--card-bg); border: 2px dashed var(--accent);
      border-radius: 12px; padding: 10px 15px; cursor: pointer;
      margin-top: 15px; transition: var(--transition);
    }
    #botaoCaptcha.valid { border-style: solid; border-color: var(--mint-royal); background: #f0fff4; }
    .checkbox-ui {
      width: 24px; height: 24px; border: 2px solid #90a4ae; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; transition: 0.2s;
    }
    #botaoCaptcha.valid .checkbox-ui { background: var(--mint-royal); border-color: var(--mint-royal); }
    .checkbox-ui svg { display: none; width: 16px; stroke: #fff; stroke-width: 4; }
    #botaoCaptcha.valid .checkbox-ui svg { display: block; }

    /* Popup */
    .popup {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
      align-items: center; justify-content: center; padding: 15px;
    }
    .captcha-box {
      background: #fff; width: 100%; max-width: 360px; border-radius: 15px;
      overflow: hidden; box-shadow: var(--shadow-lg);
    }
    .captcha-header { background: var(--accent); color: #fff; padding: 15px; font-weight: 700; font-size: 14px; }
    .captcha-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #f5f5f5; }
    .captcha-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; cursor: pointer; border: 3px solid transparent; transition: 0.2s; }
    .captcha-img.selected { border-color: var(--gem-pink); transform: scale(0.95); }
    .captcha-footer { padding: 10px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; }

    /* Result Screen */
    #confirmTela { display: none; flex-direction: column; align-items: center; padding: 20px; animation: slideUp 0.5s ease; }
    .confirm-card { background: #fff; border-radius: 15px; padding: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: var(--shadow-lg); }
    #fotoConfirm { width: 100%; border-radius: 10px; margin-bottom: 15px; }
    #nomeConfirm { font-size: 24px; font-family: 'Playfair Display', serif; font-weight: 800; margin: 10px 0; }

    .spinner {
      width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
      display: inline-block; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (min-width: 768px) {
      .container { max-width: 800px; }
      .options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
      .option { flex-direction: column; }
      .option img { width: 100%; height: 200px; }
      .option-content { padding: 15px; justify-content: center; }
    }
  </style>
</head>
<body>

  <div id="votoTela" class="container">
    <h1>Quem você quer que VENÇA?</h1>
    
    <div class="options">
      <label class="option" data-name="Felipe">
        <img src="https://i.ibb.co/q3hKxFzH/Felipe.png" alt="Felipe">
        <div class="option-content">
          <input type="radio" name="vote" value="Felipe"> Felipe
        </div>
      </label>

      <label class="option" data-name="Millena">
        <img src="https://i.ibb.co/GvHmFK1B/Millena.png" alt="Millena">
        <div class="option-content">
          <input type="radio" name="vote" value="Millena"> Millena
        </div>
      </label>

      <label class="option" data-name="Quim">
        <img src="https://i.ibb.co/9HkK6h7Q/Quim.png" alt="Quim">
        <div class="option-content">
          <input type="radio" name="vote" value="Quim"> Quim
        </div>
      </label>
    </div>

    <div id="botaoCaptcha">
      <div class="checkbox-ui">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12l6 6 10-10"/></svg>
      </div>
      <span style="flex-grow:1; font-weight:600;">Não sou um robô</span>
      <img src="https://i.ibb.co/gZZrBqq0/Chat-GPT-Image-16-de-mai-de-2026-13-55-49-1.png" style="width:40px; border-radius:4px">
    </div>

    <button id="botaoVotar" disabled>VOTAR</button>
    <div style="text-align:center; font-size:12px; color:var(--muted); margin-top:15px;">Votação aberta até às 19:00</div>
  </div>

  <!-- POPUP CAPTCHA -->
  <div id="popupCaptcha" class="popup">
    <div class="captcha-box">
      <div id="captchaHeader" class="captcha-header">Carregando...</div>
      <div id="captchaGrid" class="captcha-grid"></div>
      <div class="captcha-footer">
        <button id="refreshCaptcha" style="width:auto; padding:8px; margin:0; background:none; border:1px solid #ddd;">🔄</button>
        <button id="confirmCaptcha" disabled style="width:auto; padding:8px 20px; margin:0; font-size:14px;">Verificar</button>
      </div>
    </div>
  </div>

  <!-- TELA DE SUCESSO -->
  <div id="confirmTela">
    <div class="confirm-card">
      <img id="fotoConfirm" src="" alt="Sucesso">
      <div id="nomeConfirm"></div>
      <div style="color:var(--mint-royal); font-weight:700; margin-bottom:15px;">✦ Voto computado com sucesso!</div>
      <button id="votarNovamente">VOTAR NOVAMENTE</button>
    </div>
  </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const CONFIG = {
    supabaseUrl: "https://kbskbmxficpuxwlwlkfq.supabase.co",
    supabaseKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtic2tibXhmaWNwdXh3bHdsa2ZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjY3MjYsImV4cCI6MjA5NzkwMjcyNn0.Was5NDt1Ch0WR0HWQrd59ERXeZWRklqrdHR8Z7x-F1E",
    tableName: "finalcorrida",
    votosPorCaptcha: 10,
    encerramento: new Date("2026-06-27T20:00:00-03:00").getTime()
  };

  const supabase = createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

  // Estado da aplicação
  const state = {
    votosRestantes: 0,
    isCaptchaValid: false,
    selectedOption: null,
    isSubmitting: false
  };

  // Cache de elementos
  const el = {
    votoTela: document.getElementById('votoTela'),
    confirmTela: document.getElementById('confirmTela'),
    botaoVotar: document.getElementById('botaoVotar'),
    botaoCaptcha: document.getElementById('botaoCaptcha'),
    popupCaptcha: document.getElementById('popupCaptcha'),
    captchaGrid: document.getElementById('captchaGrid'),
    captchaHeader: document.getElementById('captchaHeader'),
    confirmCaptcha: document.getElementById('confirmCaptcha'),
    refreshCaptcha: document.getElementById('refreshCaptcha'),
    fotoConfirm: document.getElementById('fotoConfirm'),
    nomeConfirm: document.getElementById('nomeConfirm'),
    votarNovamente: document.getElementById('votarNovamente'),
    options: document.querySelectorAll('.option')
  };

  // Lógica de Votos Restantes (Persistência Leve)
  const VotoManager = {
    get: () => {
      const v = localStorage.getItem('v_count');
      const t = localStorage.getItem('v_token');
      if (!v || !t) return 0;
      return btoa(v + 'fshow') === t ? parseInt(v) : 0;
    },
    set: (n) => {
      localStorage.setItem('v_count', n);
      localStorage.setItem('v_token', btoa(n + 'fshow'));
      state.votosRestantes = n;
      updateUI();
    }
  };

  function updateUI() {
    el.botaoVotar.disabled = !state.selectedOption || !state.isCaptchaValid || state.votosRestantes <= 0 || state.isSubmitting;
    el.botaoCaptcha.classList.toggle('valid', state.isCaptchaValid && state.votosRestantes > 0);
    
    el.options.forEach(opt => {
      const radio = opt.querySelector('input');
      opt.classList.toggle('selected', radio.checked);
    });
  }

  // Lógica do Captcha
  const Captcha = {
    prompts: [
      {
        label: "Selecione todos os VEÍCULOS",
        tag: "car",
        imgs: [
          { s: "https://i.ibb.co/cSMQWgx4/car1.png", t: "car" },
          { s: "https://i.ibb.co/d0CCf03S/moto1.png", t: "car" },
          { s: "https://i.ibb.co/tp8Mxrd9/car3.png", t: "car" },
          { s: "https://i.ibb.co/vtwFRhB/moto2.png", t: "car" },
          { s: "https://i.ibb.co/kVQVS7yD/car4.png", t: "car" },
          { s: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/papel-higi%C3%AAnico.jpg?raw=true", t: "x" },
          { s: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/toalha.jpg?raw=true", t: "x" },
          { s: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/sabonete.jpg?raw=true", t: "x" },
          { s: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/escova-de-dentes.jpg?raw=true", t: "x" }
        ]
      },
      {
        label: "Selecione todos os ANIMAIS",
        tag: "animal",
        imgs: [
          { s: "https://i.ibb.co/PZPW0gzR/elefante.jpg", t: "animal" },
          { s: "https://i.ibb.co/zHZ6BhsR/cavalo.jpg", t: "animal" },
          { s: "https://i.ibb.co/Nw9HKGp/leao.jpg", t: "animal" },
          { s: "https://i.ibb.co/VcBzNJsw/rino.jpg", t: "animal" },
          { s: "https://i.ibb.co/0jr3fwBd/girafa.jpg", t: "animal" },
          { s: "https://i.ibb.co/WNh2CsLC/torta.png", t: "x" },
          { s: "https://i.ibb.co/BHvGC4Cr/cookie.png", t: "x" },
          { s: "https://i.ibb.co/35sfVQvY/donuts.png", t: "x" },
          { s: "https://i.ibb.co/rRT6hz08/bolo.png", t: "x" }
        ]
      }
    ],
    current: null,
    
    init() {
      this.current = this.prompts[Math.floor(Math.random() * this.prompts.length)];
      el.captchaHeader.textContent = this.current.label;
      el.captchaGrid.innerHTML = '';
      el.confirmCaptcha.disabled = true;
      
      const shuffled = [...this.current.imgs].sort(() => Math.random() - 0.5);
      shuffled.forEach(img => {
        const item = document.createElement('img');
        item.src = img.s;
        item.className = 'captcha-img';
        item.dataset.t = img.t;
        item.onclick = () => {
          item.classList.toggle('selected');
          el.confirmCaptcha.disabled = !document.querySelector('.captcha-img.selected');
        };
        el.captchaGrid.appendChild(item);
      });
    },
    
    verify() {
      const selected = document.querySelectorAll('.captcha-img.selected');
      const allCorrect = Array.from(document.querySelectorAll('.captcha-img')).every(img => {
        const isCorrectType = img.dataset.t === this.current.tag;
        const isSelected = img.classList.contains('selected');
        return isCorrectType === isSelected;
      });

      if (allCorrect) {
        state.isCaptchaValid = true;
        VotoManager.set(CONFIG.votosPorCaptcha);
        el.popupCaptcha.style.display = 'none';
      } else {
        alert('Incorreto, tente novamente.');
        this.init();
      }
    }
  };

  // Ações Principais
  async function submitVote() {
    if (state.isSubmitting || state.votosRestantes <= 0) return;
    
    const now = Date.now();
    if (now > CONFIG.encerramento) {
      alert("Votação encerrada!");
      return;
    }

    state.isSubmitting = true;
    el.botaoVotar.innerHTML = '<span class="spinner"></span>Enviando...';
    updateUI();

    try {
      const { error } = await supabase.from(CONFIG.tableName).insert([{ participante: state.selectedOption }]);
      
      if (error) throw error;

      // Sucesso
      VotoManager.set(state.votosRestantes - 1);
      
      // Mostrar tela de confirmação
      const selectedImg = document.querySelector('.option.selected img').src;
      el.fotoConfirm.src = selectedImg;
      el.nomeConfirm.textContent = state.selectedOption;
      el.votoTela.style.display = 'none';
      el.confirmTela.style.display = 'flex';
      window.scrollTo(0,0);

    } catch (err) {
      alert("Erro ao votar: " + err.message);
    } finally {
      state.isSubmitting = false;
      el.botaoVotar.textContent = 'VOTAR';
      updateUI();
    }
  }

  // Event Listeners
  el.options.forEach(opt => {
    opt.onclick = () => {
      const radio = opt.querySelector('input');
      radio.checked = true;
      state.selectedOption = radio.value;
      updateUI();
      // Scroll suave para o botão de votar em mobile
      if(window.innerWidth < 768) {
        el.botaoCaptcha.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    };
  });

  el.botaoCaptcha.onclick = () => {
    if (state.votosRestantes > 0) {
      state.isCaptchaValid = true;
      updateUI();
      return;
    }
    Captcha.init();
    el.popupCaptcha.style.display = 'flex';
  };

  el.confirmCaptcha.onclick = () => Captcha.verify();
  el.refreshCaptcha.onclick = () => Captcha.init();
  el.botaoVotar.onclick = () => submitVote();
  
  el.votarNovamente.onclick = () => {
    el.confirmTela.style.display = 'none';
    el.votoTela.style.display = 'block';
    state.selectedOption = null;
    document.querySelectorAll('input[name="vote"]').forEach(r => r.checked = false);
    updateUI();
  };

  // Inicialização
  state.votosRestantes = VotoManager.get();
  state.isCaptchaValid = state.votosRestantes > 0;
  updateUI();

</script>
</body>
</html>
