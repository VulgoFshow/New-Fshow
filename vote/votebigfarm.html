<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fshow - Votação</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="icon" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png" type="image/png">
<meta name="theme-color" content="#8A2BE2">
  
<style>
/* ===== VARIÁVEIS GLOBAIS ===== */
:root {
  --accent: #00b7b0;
  --text: #fff;
  --muted: #bdbdbd;
  --border-radius: 8px;
  --transition: all 0.3s ease;
}

/* ===== BASE ===== */
*,
*::before,
*::after {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  font-family: "Inter", Arial, sans-serif;
  color: var(--text);
  background: linear-gradient(145deg, #0a0b0d, #101218 45%, #060708);
  overflow: hidden;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== LAYOUT COMPACTO PARA IFRAME 16:9 ===== */
.container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 12px;
  animation: slideUp 0.6s ease;
  overflow-y: auto;
  overflow-x: hidden;
}

h1 {
  font-size: 18px;
  font-weight: 700;
  margin: 0 0 8px 0;
  text-align: left;
  line-height: 1.2;
  flex-shrink: 0;
}

/* ===== OPÇÕES (GRID COMPACTO) ===== */
.options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.option {
  display: flex;
  flex-direction: column;
  background: #2b2b2b;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--border-radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.3s ease;
  min-width: 0;
}

.option:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,.55);
  border-color: var(--accent);
}

.option.selected,
.option:has(input[type="radio"]:checked) {
  background: rgba(0, 183, 176, 0.2) !important;
  border-color: var(--accent) !important;
}

.option.selected .option-content,
.option:has(input[type="radio"]:checked) .option-content {
  background: transparent !important;
}

/* ===== IMAGEM COM ASPECT RATIO 1:1 ===== */
.option-img-wrapper {
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: rgba(0, 183, 176, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
}

.option img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
  transition: transform 0.4s ease;
}

.option-content {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 4px;
  width: 100%;
  background: #1f1f1f;
  font-size: 11px;
  font-weight: 500;
  transition: background 0.3s ease;
  text-align: center;
  min-height: 36px;
  gap: 4px;
  flex-wrap: wrap;
}

.option-content input[type="radio"] {
  appearance: none;
  width: 16px;
  height: 16px;
  min-width: 16px;
  min-height: 16px;
  border: 2px solid var(--muted);
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  transition: border-color 0.3s ease, transform 0.2s ease;
  flex-shrink: 0;
}

.option-content input[type="radio"]:hover {
  transform: scale(1.1);
}

.option-content input[type="radio"]:checked {
  border-color: var(--accent);
}

.option-content input[type="radio"]:checked::before {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--accent);
}

.option-label {
  flex: 1;
  word-break: break-word;
  overflow-wrap: break-word;
  white-space: normal;
  min-width: 0;
}

/* ===== SPINNER ===== */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  border-top-color: #fff;
  animation: spin 0.8s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== BOTÃO PRINCIPAL ===== */
button {
  width: 100%;
  padding: 10px;
  font-size: 14px;
  font-weight: bold;
  border: none;
  border-radius: var(--border-radius);
  cursor: pointer;
  background: #444;
  color: var(--muted);
  transition: var(--transition);
  flex-shrink: 0;
}

button:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0, 183, 176, 0.3);
}

button.active {
  background: var(--accent);
  color: #fff;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.notice {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  margin-top: 6px;
  flex-shrink: 0;
}

/* ===== CONFIRMAÇÃO ===== */
#confirmTela {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  padding: 12px;
  text-align: center;
  background: transparent;
  animation: slideUp 0.6s ease forwards;
}

.confirm-card {
  background: rgba(0,0,0,.35);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 12px;
  padding: 12px;
  width: 100%;
  max-width: 100%;
  margin: 0 auto;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,.6);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.confirm-card .img-container {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 8px;
  overflow: hidden;
  background: rgba(0, 183, 176, 0.2); 
  border: 1px solid rgba(0, 255, 255, 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  max-height: 200px;
}

#fotoConfirm {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  object-position: center;
}

#nomeConfirm {
  background: #1F1F1F;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  margin: 0;
  word-break: break-word;
}

.success-msg {
  background: rgba(0, 255, 150, 0.1);
  border: 1px solid rgba(0, 255, 150, 0.4);
  border-radius: 8px;
  padding: 8px 12px;
  text-align: center;
  color: #00ff99;
  font-weight: 600;
  font-size: 12px;
  animation: fadeIn 0.6s ease;
}

.success-msg::before {
  content: "✔ ";
  color: #00ff99;
}

.voltar {
  background: var(--accent);
  color: #fff;
  transition: background 0.3s ease;
  padding: 10px;
  font-size: 14px;
}

.voltar:hover {
  background: #00c9b8;
}
</style>
</head>
<body>

  <div id="votoTela" class="container">
    <h1>Quem quer que FIQUE?</h1>
    
    <div class="options">
      <label class="option">
        <div class="option-img-wrapper">
          <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Celso.png?raw=true" alt="Celso Escoliosi">
        </div>
        <div class="option-content">
          <input type="radio" name="vote" value="Celso Escoliosi">
          <span class="option-label">Celso</span>
        </div>
      </label>

      <label class="option">
        <div class="option-img-wrapper">
          <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Lucas.png?raw=true" alt="Lucas BemVaral">
        </div>
        <div class="option-content">
          <input type="radio" name="vote" value="Lucas BemVaral">
          <span class="option-label">Lucas</span>
        </div>
      </label>
        
      <label class="option">
        <div class="option-img-wrapper">
          <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Sobrinha.png?raw=true" alt="Sobrinha Milena">
        </div>
        <div class="option-content">
          <input type="radio" name="vote" value="Sobrinha Milena">
          <span class="option-label">Milena</span>
        </div>
      </label>
    </div>

    <button id="botaoVotar" disabled>VOTAR</button>
    <div class="notice">Votação aberta até 19:00</div>
  </div>
  
  <div id="confirmTela">
    <div class="confirm-card">
      <div class="img-container"><img id="fotoConfirm" src="" alt="Voto"/></div>
      <p id="nomeConfirm"></p>
      <div class="success-msg">Voto computado com sucesso!</div>
      <button id="botaoVotarNovamente" class="voltar">VOTAR NOVAMENTE</button>
    </div>
  </div> 
  
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  // =================== CONFIG ===================
  const SUPABASE_URL = "https://ntkaeaijugkjhqrbnavk.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50a2FlYWlqdWdramhxcmJuYXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NjI1MTksImV4cCI6MjA5OTQzODUxOX0.PbMWZZm82S07CcpR9A6X2Rz5uznkgQXCRQ_l8lwiK2Y";
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const TABLE_VOTACAO = "bfs1";
  const DEBUG = false;
  const pesoVoto = 1;

  // =================== HORÁRIOS ===================
  const aberturaBR = new Date("2026-01-18T19:00:00-03:00").getTime();
  const encerramentoBR = new Date("2026-07-13T21:00:00-03:00").getTime();

  // =================== HORA DO SERVIDOR ===================
  async function getServerTime() {
    try {
      const res = await fetch(
        "https://timeapi.io/api/Time/current/zone?timeZone=America/Sao_Paulo",
        { cache: "no-store" }
      );
      if (!res.ok) throw new Error("Falha ao buscar horário");
      const data = await res.json();
      return new Date(data.year, data.month - 1, data.day, data.hour, data.minute, data.seconds).getTime();
    } catch (e) {
      console.error("Erro ao verificar horário:", e);
      return Date.now();
    }
  }

  // =================== REDIRECT ===================
  function redirect(url) {
    if (typeof DEBUG !== "undefined" && DEBUG) {
      console.warn("REDIRECT BLOQUEADO →", url);
      return;
    }
    window.location.replace(url);
  }

  // =================== VERIFICAÇÃO DE HORÁRIO ===================
  async function verificarHorarios() {
    const agoraBR = await getServerTime();
    if (agoraBR < aberturaBR) {
      redirect("aguarde.html");
      return;
    }
    if (agoraBR > encerramentoBR) {
      redirect("fechada.html");
      return;
    }
  }
  verificarHorarios();

  setInterval(async () => {
    const agoraBR = await getServerTime();
    if (agoraBR < aberturaBR) {
      redirect("aguarde.html");
      return;
    }
    if (agoraBR > encerramentoBR) {
      redirect("fechada.html");
      return;
    }
  }, 5000);
  
  // =================== ELEMENTOS DOM ===================
  const votoTela = document.getElementById("votoTela");
  const confirmTela = document.getElementById("confirmTela");
  const nomeConfirm = document.getElementById("nomeConfirm");
  const fotoConfirm = document.getElementById("fotoConfirm");
  const botaoVotar = document.getElementById("botaoVotar");
  const botaoVotarNovamente = document.getElementById("botaoVotarNovamente");

  function updateBotoesEstado() {
    const escolhido = document.querySelector('input[name="vote"]:checked');
    if (escolhido) {
      botaoVotar.disabled = false;
      botaoVotar.classList.add("active");
    } else {
      botaoVotar.disabled = true;
      botaoVotar.classList.remove("active");
    }
  }

  botaoVotar.addEventListener("click", () => {
    const escolhido = document.querySelector('input[name="vote"]:checked');
    if (!escolhido) {
      alert("Selecione alguém para votar!");
      return;
    }
    botaoVotar.disabled = true;
    botaoVotar.innerHTML = '<span class="spinner"></span>Enviando...';
    submitVote(escolhido.value);
  });

  async function submitVote(participante) {
    try {
      const agoraBR = await getServerTime();
      if (agoraBR > encerramentoBR) {
        alert("A votação foi encerrada!");
        botaoVotar.disabled = false;
        botaoVotar.textContent = "VOTAR";
        return;
      }

      const inputEscolhido = document.querySelector('input[name="vote"]:checked');
      if (!inputEscolhido) {
         botaoVotar.disabled = false;
         botaoVotar.textContent = "VOTAR";
         return;
      }

      const cardPai = inputEscolhido.closest('.option');
      const imagemVotada = cardPai.querySelector('img').src;
      const prevText = "VOTAR";
      
      const votos = [];
      for (let i = 0; i < pesoVoto; i++) {
        votos.push({ participante: participante });
      }

      const { error } = await supabase.from(TABLE_VOTACAO).insert(votos);
      
      if (error) {
        console.error("Erro Supabase:", error);
        alert("ERRO:\n" + (error.message || JSON.stringify(error)));
        botaoVotar.disabled = false;
        botaoVotar.textContent = prevText;
        return;
      }
      
      votoTela.style.display = "none";
      confirmTela.style.display = "flex";
      nomeConfirm.textContent = participante;
      fotoConfirm.src = imagemVotada;
      fotoConfirm.style.display = "block";
      
      botaoVotar.textContent = prevText;
      botaoVotar.disabled = false;
    } catch (e) {
      alert("Erro inesperado: " + e.message);
      botaoVotar.disabled = false;
      botaoVotar.textContent = "VOTAR";
    }
  }

  function voltarParaVotacao() {
    confirmTela.style.display = "none";
    votoTela.style.display = "flex";
    const checked = document.querySelector('input[name="vote"]:checked');
    if (checked) checked.checked = false;
    updateBotoesEstado();
  }

  botaoVotarNovamente.addEventListener("click", () => {
    voltarParaVotacao();
  });

  document.querySelectorAll('input[name="vote"]').forEach(radio => {
    radio.addEventListener("change", () => { 
      updateBotoesEstado();
    });
  });

  updateBotoesEstado();
</script>

</body>
</html>
