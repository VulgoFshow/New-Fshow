<style>
/* ===== VARIÁVEIS GLOBAIS ===== */
:root {
  --bg: #121212;
  --card-bg: #2b2b2b;
  --selected-bg: #3c3c3c;
  --panel-bg: #2b2b2b;
  --panel-border: rgba(255, 255, 255, 0.06);
  --accent: #00b7b0;
  --text: #fff;
  --muted: #bdbdbd;
  --border-radius: 8px;
  --transition: all 0.3s ease;
  --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.6);
  --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 25px rgba(13, 13, 13, 0.3);
  --back: #0d0d0d;
}

/* ===== BASE ===== */
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: "Inter", Arial, sans-serif;
  color: var(--text);

  background:
    radial-gradient(circle at 10% 20%, rgba(0, 183, 176, 0.32), transparent 55%),
    radial-gradient(circle at 85% 75%, rgba(0, 110, 255, 0.28), transparent 60%),
    radial-gradient(circle at 50% -20%, rgba(200, 0, 255, 0.25), transparent 70%),
    linear-gradient(145deg, #0a0b0d, #101218 45%, #060708);

  background-attachment: fixed;
  background-size: cover;
  animation: fadeIn 0.7s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== LAYOUT (FORÇADO DESKTOP) ===== */
.container {
  max-width: 1040px; /* Forçado desktop */
  margin: 0 auto;
  padding: 40px 20px; /* Forçado desktop */
  animation: slideUp 0.6s ease;
}

h1 {
  font-size: 28px; /* Forçado desktop */
  font-weight: 700;
  margin-bottom: 32px; /* Forçado desktop */
  text-align: left;
  transition: color 0.3s ease;
}

/* ===== OPÇÕES (GRID FORÇADO) ===== */
.options {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* 3 colunas sempre */
  gap: 24px;
}

.option {
  display: flex;
  flex-direction: column; /* Forçado desktop: vertical */
  background: #2b2b2b;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--border-radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.3s ease;
}

.option:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,.55);
  border-color: var(--accent);
}

.option.selected,
.option:has(input[type="radio"]:checked) {
  background: rgba(0, 183, 176, 0.2) !important;
  border-color: var(--accent) !important;
}

.option.selected .option-content,
.option:has(input[type="radio"]:checked) .option-content {
  background: transparent !important;
}

.option img {
  width: 100%; /* Forçado desktop */
  height: 200px; /* Forçado desktop */
  object-fit: cover;
  object-position: top;
  display: block;
  transition: transform 0.4s ease;
}

.option-content {
  display: flex;
  align-items: center;
  padding: 14px 16px; /* Forçado desktop */
  width: 100%;
  background: #1f1f1f; /* Forçado desktop */
  font-size: 17px; /* Forçado desktop */
  font-weight: 500;
  transition: background 0.3s ease;
}

.option-content input[type="radio"] {
  appearance: none;
  width: 20px;
  height: 20px;
  border: 2px solid var(--muted);
  border-radius: 50%;
  margin-right: 10px; /* Forçado desktop */
  cursor: pointer;
  position: relative;
  transition: border-color 0.3s ease, transform 0.2s ease;
}

.option-content input[type="radio"]:hover {
  transform: scale(1.1);
}

.option-content input[type="radio"]:checked {
  border-color: var(--accent);
}

.option-content input[type="radio"]:checked::before {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--accent);
}

/* ===== SPINNER ===== */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  border-top-color: #fff;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== BOTÃO PRINCIPAL ===== */
button {
  width: 100%;
  max-width: 420px; /* Forçado desktop */
  margin: 32px auto 0; /* Forçado desktop */
  display: block; /* Forçado desktop */
  padding: 14px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: var(--border-radius);
  cursor: pointer;
  background: #444;
  color: var(--muted);
  transition: var(--transition);
}

button:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0, 183, 176, 0.3);
}

button.active {
  background: var(--accent);
  color: #fff;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.notice {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  margin-top: 10px;
}

/* ===== CONFIRMAÇÃO (FORÇADO DESKTOP) ===== */
#confirmTela {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px 20px; /* Forçado desktop */
  text-align: center;
  background: transparent;
  min-height: auto; /* Forçado desktop */
  animation: slideUp 0.6s ease forwards;
}

.confirm-card {
  background: rgba(0,0,0,.35); /* Forçado desktop */
  border: 1px solid rgba(255,255,255,.15); /* Forçado desktop */
  border-radius: 12px;
  padding: 28px; /* Forçado desktop */
  max-width: 620px; /* Forçado desktop */
  width: 100%;
  margin: 0 auto;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,.6); /* Forçado desktop */
}

.confirm-card .img-container {
  width: 100%;
  height: 280px; /* Forçado desktop */
  border-radius: 8px 8px 0 0;
  overflow: hidden;
  background: rgba(0, 183, 176, 0.2); 
  border: 1px solid rgba(0, 255, 255, 0.1);
  border-bottom: none;
  display: flex;
  align-items: center;
  justify-content: center;
}

#fotoConfirm {
  height: auto;
  display: block;
  object-fit: contain;
}

#nomeConfirm {
  background: #1F1F1F;
  color: #fff;
  font-size: 24px; /* Forçado desktop */
  font-weight: 700;
  text-align: center;
  padding: 16px; /* Forçado desktop */
  border-radius: 0 0 10px 10px;
  border: 1px solid rgba(255,255,255,0.1);
  border-top: none;
  margin: 0;
}

.success-msg {
  background: rgba(0, 255, 150, 0.1);
  border: 1px solid rgba(0, 255, 150, 0.4);
  border-radius: 8px;
  padding: 14px 20px; /* Forçado desktop */
  text-align: center;
  color: #00ff99;
  font-weight: 600;
  font-size: 15px; /* Forçado desktop */
  margin-bottom: 18px;
  animation: fadeIn 0.6s ease;
}

.success-msg::before {
  content: "✔ ";
  color: #00ff99;
}

.voltar {
  background: var(--accent);
  color: #fff;
  transition: background 0.3s ease;
  max-width: 420px; /* Forçado desktop */
  margin: 20px auto 0; /* Forçado desktop */
  display: block; /* Forçado desktop */
}

.voltar:hover {
  background: #00c9b8;
}

.espacador { width: 100%; margin: 10px 0; }
</style>
</head>
<body>

  <div id="votoTela" class="container">
    <div class="espacador"></div>
    
    <h1>Quem você quer que FIQUE <br> na Big Farm?</h1>
    <div class="espacador"></div>
    
    <div class="options">
      <label class="option">
        <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Celso.png?raw=true" alt="Opção">
        <div class="option-content">
          <input type="radio" name="vote" value="Celso Escoliosi"> Celso Escoliosi
        </div>
      </label>

      <label class="option">
        <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Lucas.png?raw=true" alt="Opção">
        <div class="option-content">
          <input type="radio" name="vote" value="Lucas BemVaral"> Lucas BemVaral
        </div>
      </label>
        
      <label class="option">
        <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Sobrinha.png?raw=true" alt="Opção">
        <div class="option-content">
          <input type="radio" name="vote" value="Sobrinha Milena"> Sobrinha Milena
        </div>
      </label>
    </div>

    <button id="botaoVotar" disabled>VOTAR</button>

    <div class="notice">Essa votação segue aberta até às 19:00</div>
  </div>
  
  <div id="confirmTela">
    <div class="confirm-card">
      <div class="img-container"><img id="fotoConfirm" src="" alt="Voto"/></div>
      <p id="nomeConfirm"></p>
      <button id="botaoVotarNovamente" class="voltar">
       VOTAR NOVAMENTE
      </button>
      <div class="success-msg" style="margin-top: 15px;">Voto computado com sucesso!</div>
      <div class="notice">Essa votação segue aberta até às 19:00</div>
    </div>
  </div> 
  
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  // =================== CONFIG ===================
  const SUPABASE_URL = "https://ntkaeaijugkjhqrbnavk.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50a2FlYWlqdWdramhxcmJuYXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NjI1MTksImV4cCI6MjA5OTQzODUxOX0.PbMWZZm82S07CcpR9A6X2Rz5uznkgQXCRQ_l8lwiK2Y";
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const TABLE_VOTACAO = "bfs1";
  const DEBUG = false;
  const pesoVoto = 1;

  // =================== HORÁRIOS ===================
  const aberturaBR = new Date("2026-01-18T19:00:00-03:00").getTime();
  const encerramentoBR = new Date("2026-07-13T21:00:00-03:00").getTime();

  // =================== HORA DO SERVIDOR ===================
  async function getServerTime() {
    try {
      const res = await fetch(
        "https://timeapi.io/api/Time/current/zone?timeZone=America/Sao_Paulo",
        { cache: "no-store" }
      );
      if (!res.ok) throw new Error("Falha ao buscar horário");
      const data = await res.json();
      return new Date(data.year, data.month - 1, data.day, data.hour, data.minute, data.seconds).getTime();
    } catch (e) {
      console.error("Erro ao verificar horário:", e);
      return Date.now();
    }
  }

  // =================== REDIRECT ===================
  function redirect(url) {
    if (typeof DEBUG !== "undefined" && DEBUG) {
      console.warn("REDIRECT BLOQUEADO →", url);
      return;
    }
    window.location.replace(url);
  }

  // =================== VERIFICAÇÃO DE HORÁRIO ===================
  async function verificarHorarios() {
    const agoraBR = await getServerTime();
    if (agoraBR < aberturaBR) {
      redirect("aguarde.html");
      return;
    }
    if (agoraBR > encerramentoBR) {
      redirect("fechada.html");
      return;
    }
  }
  verificarHorarios();

  setInterval(async () => {
    const agoraBR = await getServerTime();
    if (agoraBR < aberturaBR) {
      redirect("aguarde.html");
      return;
    }
    if (agoraBR > encerramentoBR) {
      redirect("fechada.html");
      return;
    }
  }, 5000);
  
  // =================== ELEMENTOS DOM ===================
  const votoTela = document.getElementById("votoTela");
  const confirmTela = document.getElementById("confirmTela");
  const nomeConfirm = document.getElementById("nomeConfirm");
  const fotoConfirm = document.getElementById("fotoConfirm");
  const botaoVotar = document.getElementById("botaoVotar");
  const botaoVotarNovamente = document.getElementById("botaoVotarNovamente");

  function updateBotoesEstado() {
    const escolhido = document.querySelector('input[name="vote"]:checked');
    if (escolhido) {
      botaoVotar.disabled = false;
      botaoVotar.classList.add("active");
    } else {
      botaoVotar.disabled = true;
      botaoVotar.classList.remove("active");
    }
  }

  botaoVotar.addEventListener("click", () => {
    const escolhido = document.querySelector('input[name="vote"]:checked');
    if (!escolhido) {
      alert("Selecione alguém para votar!");
      return;
    }
    botaoVotar.disabled = true;
    botaoVotar.innerHTML = '<span class="spinner"></span>Enviando voto...';
    submitVote(escolhido.value);
  });

  async function submitVote(participante) {
    try {
      const agoraBR = await getServerTime();
      if (agoraBR > encerramentoBR) {
        alert("A votação foi encerrada!");
        botaoVotar.disabled = false;
        botaoVotar.textContent = "VOTAR";
        return;
      }

      const inputEscolhido = document.querySelector('input[name="vote"]:checked');
      if (!inputEscolhido) {
         botaoVotar.disabled = false;
         botaoVotar.textContent = "VOTAR";
         return;
      }

      const cardPai = inputEscolhido.closest('.option');
      const imagemVotada = cardPai.querySelector('img').src;
      const prevText = "VOTAR";
      
      const votos = [];
      for (let i = 0; i < pesoVoto; i++) {
        votos.push({ participante: participante });
      }

      const { error } = await supabase.from(TABLE_VOTACAO).insert(votos);
      
      if (error) {
        console.error("Erro Supabase:", error);
        alert("ERRO NO SUPABASE:\n" + (error.message || JSON.stringify(error)));
        botaoVotar.disabled = false;
        botaoVotar.textContent = prevText;
        return;
      }
      
      votoTela.style.display = "none";
      confirmTela.style.display = "flex";
      nomeConfirm.textContent = participante;
      fotoConfirm.src = imagemVotada;
      fotoConfirm.style.display = "block";
      
      botaoVotar.textContent = prevText;
      botaoVotar.disabled = false;
    } catch (e) {
      alert("Erro inesperado: " + e.message);
      botaoVotar.disabled = false;
      botaoVotar.textContent = "VOTAR";
    }
  }

  function voltarParaVotacao() {
    confirmTela.style.display = "none";
    votoTela.style.display = "block";
    const checked = document.querySelector('input[name="vote"]:checked');
    if (checked) checked.checked = false;
    updateBotoesEstado();
  }

  botaoVotarNovamente.addEventListener("click", () => {
    voltarParaVotacao();
  });
  
  function scrollParaFinal() {
    setTimeout(() => {
      window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
    }, 100);
  }

  document.querySelectorAll('input[name="vote"]').forEach(radio => {
    radio.addEventListener("change", () => { 
      updateBotoesEstado();
      scrollParaFinal(); 
    });
  });

  updateBotoesEstado();
</script>

</body>
