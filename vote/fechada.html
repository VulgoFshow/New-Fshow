<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Votação Encerrada</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Favicon corrigido -->
  <link rel="icon" type="image/png" href="https://i.ibb.co/3yCzdJ59/logo-fshow.png">

<style>
:root {
  --roxo: #7b2cff;
  --laranja: #ff7b00;
  --gradiente: linear-gradient(135deg, #7b2cff, #ff7b00);
  --bg: #0d0d0f;
  --card-bg: #1c1c1c;
  --border: rgba(255,255,255,.08);
  --text-muted: #bdbdbd;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: #fff;
  padding: 30px 15px;
  text-align: center;
}

/* TÍTULO */
h1 {
  font-size: 2rem;
  margin-bottom: 10px;
  background: var(--gradiente);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* TEXTO */
p {
  color: #ff4d4d;
  font-weight: 700;
}

/* CARD */
.card {
  display: flex;
  align-items: stretch;
  width: 100%;
  max-width: 720px;
  margin: 30px auto;
  background: var(--card-bg);
  border-radius: 16px;
  overflow: hidden;
  border-left: 6px solid var(--roxo);
}

.card img {
  width: 170px;
  height: 100%;
  object-fit: cover;
  flex-shrink: 0;
}

.card-content {
  flex: 1;
  padding: 22px 26px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-info span {
  font-size: 22px;
  font-weight: 700;
}

.card-percent strong {
  font-size: 26px;
  color: var(--laranja);
}

.eliminado-label {
  margin-top: 6px;
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  padding: 4px 12px;
  border-radius: 999px;
  background: var(--laranja);
  color: #000;
  text-transform: uppercase;
}

/* MOBILE */
@media (max-width: 600px) {
  .card {
    flex-direction: column;
    text-align: center;
  }

  .card img {
    width: 100%;
    height: 180px;
  }

  .card-content {
    flex-direction: column;
    gap: 10px;
  }
}

/* FOOTER */
footer {
  margin-top: 60px;
  font-size: .85rem;
  color: var(--text-muted);
}
</style>
</head>

<body>
  <div id="votoTela"></div>

<script>
const votacaoAtiva = false;

if (!votacaoAtiva) {
  document.getElementById("votoTela").innerHTML = `
    <h1>🛑 Votação Encerrada</h1>

    <p style="font-size:20px;margin-top:40px;">
      A votação foi encerrada. Obrigado por participar!
    </p>

    <div class="card">
      <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/pcf2/LuaneFernanda.jpg?raw=true" alt="Campeões">

      <div class="card-content">
        <div class="card-info">
          <span>Luan e Fernanda</span>
        </div>

        <div class="card-percent">
          <strong>56.87%</strong><br>
          <span class="eliminado-label">Campeões</span>
        </div>
      </div>
    </div>

    <footer>
      © 2025 Portal Flop / Fshow - Todos os direitos reservados.
    </footer>
  `;
}
</script>

</body>
</html>
