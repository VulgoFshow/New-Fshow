<style>
/* ===== VARIÁVEIS GLOBAIS ===== */
:root {
  --bg: #121212;
  --card-bg: #2b2b2b;
  --selected-bg: #3c3c3c;
  --panel-bg: #2b2b2b;
  --panel-border: rgba(255, 255, 255, 0.06);
  --accent: #00b7b0;
  --text: #fff;
  --muted: #bdbdbd;
  --border-radius: 8px;
  --transition: all 0.3s ease;
  --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.6);
  --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 25px rgba(13, 13, 13, 0.3);
  --back: #0d0d0d;
}

/* ===== BASE ===== */
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: "Inter", Arial, sans-serif;
  color: var(--text);

  background:
    radial-gradient(circle at 10% 20%, rgba(0, 183, 176, 0.32), transparent 55%),
    radial-gradient(circle at 85% 75%, rgba(0, 110, 255, 0.28), transparent 60%),
    radial-gradient(circle at 50% -20%, rgba(200, 0, 255, 0.25), transparent 70%),
    linear-gradient(145deg, #0a0b0d, #101218 45%, #060708);

  background-attachment: fixed;
  background-size: cover;
  animation: fadeIn 0.7s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== LAYOUT ===== */
.container {
  max-width: 400px;
  margin: 0 auto;
  padding: 20px 15px;
  animation: slideUp 0.6s ease;
}

h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: left;
  transition: color 0.3s ease;
}

/* ===== OPÇÕES (RADIO CARDS) ===== */
.option {
  display: flex;
  background: var(--card-bg);
  border: 1px solid #fff;
  border-radius: var(--border-radius);
  margin-bottom: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.3s ease;
}

.option:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
}

.option.selected,
.option:has(input[type="radio"]:checked) {
  background: rgba(0, 183, 176, 0.2) !important;
  border-color: var(--accent) !important;
}

.option.selected .option-content,
.option:has(input[type="radio"]:checked) .option-content {
  background: transparent !important;
}

.option img {
  width: 150px;
  height: auto;
  object-fit: cover;
  flex-shrink: 0;
  transition: transform 0.4s ease;
}

.option-content {
  display: flex;
  align-items: center;
  padding: 0 12px;
  width: 100%;
  font-size: 18px;
  font-weight: 500;
  transition: background 0.3s ease;
}

.option-content input[type="radio"] {
  appearance: none;
  width: 20px;
  height: 20px;
  border: 2px solid var(--muted);
  border-radius: 50%;
  margin-right: 8px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.3s ease, transform 0.2s ease;
}

.option-content input[type="radio"]:hover {
  transform: scale(1.1);
}

.option-content input[type="radio"]:checked {
  border-color: var(--accent);
}

.option-content input[type="radio"]:checked::before {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--accent);
}

  /* ===== SPINNER ===== */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== BOTÃO PRINCIPAL ===== */
  button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: var(--border-radius);
  margin-top: 15px;
  cursor: pointer;
  background: #444;
  color: var(--muted);
  transition: var(--transition);
}

button:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0, 183, 176, 0.3);
}

button.active {
  background: var(--accent);
  color: #fff;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.notice {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  margin-top: 10px;
}

/* ===== POPUP ===== */
.popup {
  display: none;
  position: fixed;
  z-index: 1500;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
  padding: 20px;
  transition: opacity .25s ease;
}

.popup.active {
  display: flex;
  opacity: 1;
}

/* ===== CONTAINER ===== */
.captcha-box {
  background: #1b1b1b;
  width: 360px;
  max-width: 95%;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.45);
  animation: fadeIn .3s ease;
  color: #eee;
}

/* ===== CABEÇALHO ===== */
.captcha-header {
  background: #0f7b82;
  padding: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.captcha-header span {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  flex: 1;
  color: #fff;
}

.captcha-header img {
  width: 62px;
  height: 62px;
  border-radius: 6px;
  object-fit: cover;
  margin-left: 12px;
}

/* ===== GRID ===== */
.captcha-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 10px;
  background: #00000022;
}

.captcha-img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 6px;
  background: #111;
  cursor: pointer;
  border: 2px solid transparent;
  transition: .15s;
}

.captcha-img:hover {
  transform: scale(1.03);
}

.captcha-img.selected {
  border-color: #fff;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
}

/* ===== FOOTER ===== */
.captcha-footer {
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: flex-end;
}

/* ===== BOTÃO AVANÇAR ===== */
.captcha-btn {
  background: #e6e6e6;
  color: #222;
  padding: 10px 22px;
  border-radius: 6px;
  cursor: pointer;
  border: none;
  font-weight: 600;
  transition: .15s;
}

.captcha-btn:disabled {
  opacity: .5;
  cursor: not-allowed;
}

.captcha-btn:hover:not(:disabled) {
  background: #fff;
}

/* ===== BOTÃO ICONE ===== */
.captcha-icon-btn {
  background: #2b2b2b;
  border: none;
  padding: 8px;
  border-radius: 6px;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: .15s;
}

.captcha-icon-btn img {
  width: 20px;
  opacity: 0.8;
}

.captcha-icon-btn:hover {
  background: #333;
}

/* ===== IMG ===== */
.captcha-hand img {
  width: 36px;
  opacity: 0.85;
}

/* ===== PAGINAÇÃO ===== */

.captcha-dots {
  display: flex;
  gap: 4px;
  margin-left: auto;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #222;
  transition: background .15s;
}

.dot.white {
  background: #ffffff !important;
}

.dot.green {
  background: #4CAF50 !important;
}

.dot.active {
  background: none !important;
}

/* ===== CONFIRMAÇÃO ===== */
#fotoConfirm {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}

#nomeConfirm {
  background: #1F1F1F;
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  padding: 14px;
  border-radius: 0 0 10px 10px;
  border: 1px solid #ddd;
  border-top: none;
  margin: 0;
}

.success-msg {
  background: rgba(0, 255, 150, 0.1);
  border: 1px solid rgba(0, 255, 150, 0.4);
  border-radius: 8px;
  padding: 10px 15px;
  text-align: center;
  color: #00ff99;
  font-weight: 600;
  margin-bottom: 18px;
  animation: fadeIn 0.6s ease;
}

.success-msg::before {
  content: "✔ ";
  color: #00ff99;
}

.voltar {
  background: var(--accent);
  color: #fff;
  transition: background 0.3s ease;
}

.voltar:hover {
  background: #00c9b8;
}

#confirmTela {

  align-items: center;
  justify-content: center;

#botaoCaptcha {

#botaoCaptcha:hover {

.recaptcha-checkbox {

#botaoCaptcha[aria-pressed="true"] .recaptcha-checkbox {

.checkmark {

#botaoCaptcha[aria-pressed="true"] .checkmark {

.recaptcha-label {
  user-select: none;

.recaptcha-icon {
  width: 40px;

#botaoCaptcha:disabled {
  opacity: 0.6;

}

.bot-bait {

}

.fade-in-element {

// =================== HORA DO SERVIDOR ===================
async function getServerTime() {
  try {

    const res = await fetch(
      "https://timeapi.io/api/Time/current/zone?timeZone=America/Sao_Paulo",
      {
        cache: "no-store"
      }
    );

    if (!res.ok) {
      throw new Error("Falha ao buscar horário");
    }

    const data = await res.json();

    const serverDate = new Date(
      data.year,
      data.month - 1,
      data.day,
      data.hour,
      data.minute,
      data.seconds
    );

    return serverDate.getTime();

  } catch (e) {

    console.error("Erro ao verificar horário:", e);

    // fallback pro horário local
    return Date.now();
  }
}

}

      botaoVotar.disabled = false;

      botaoCaptcha.setAttribute("aria-pressed", "false");

  }



  function hashTag(tag) {
    const secret = "CPTX_2025_FSHOW_🔥";
    let h = 0;
    const str = tag + secret;
    for (let i = 0; i < str.length; i++) {
      h = (h << 5) - h + str.charCodeAt(i);
      h |= 0;
    }
    return h;
  }

  function getVotosRestantes() {
    const raw = localStorage.getItem("votosRestantes");
    const token = localStorage.getItem("token");
    if (!raw || !token) return 0;
    return hashTag(raw) == token ? parseInt(raw) : 0;
  }

  function setVotosRestantes(n) {
    localStorage.setItem("votosRestantes", String(n));
    localStorage.setItem("token", hashTag(String(n)));
  }

  const prompts = [
    {
      label: "Clique nas imagens contendo algo que pode se locomover",
      correctTag: "202",
      images: [

        { src: "https://i.ibb.co/tp8Mxrd9/car3.png", tag: "202" },
        { src: "https://i.ibb.co/vtwFRhB/moto2.png", tag: "202" },

        { src: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/toalha.jpg?raw=true", tag: "404" },
        { src: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/sabonete.jpg?raw=true", tag: "404" },
        { src: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/escova-de-dentes.jpg?raw=true", tag: "404" }
      ]
    },
    {
      label: "Clique nas imagens contendo um animal",
      correctTag: "706",
      images: [
        { src: "https://i.ibb.co/PZPW0gzR/elefante.jpg", tag: "706" },
        { src: "https://i.ibb.co/zHZ6BhsR/cavalo.jpg", tag: "706" },
        { src: "https://i.ibb.co/Nw9HKGp/leao.jpg", tag: "706" },

        { src: "https://i.ibb.co/0jr3fwBd/girafa.jpg", tag: "706" },
        { src: "https://i.ibb.co/WNh2CsLC/torta.png", tag: "1412" },
        { src: "https://i.ibb.co/BHvGC4Cr/cookie.png", tag: "1412" },
        { src: "https://i.ibb.co/35sfVQvY/donuts.png", tag: "1412" },
        { src: "https://i.ibb.co/rRT6hz08/bolo.png", tag: "1412" }
      ]
    }
  ];

  let captchaCurrentPrompt = null;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function abrirCaptcha() {
    pendingVote = null;
    generateCaptcha();
    popupCaptcha.style.display = "flex";
    captchaAberto = true;
  }

  function fecharCaptcha() {
    popupCaptcha.style.display = "none";
    captchaAberto = false;
    updateBotoesEstado();
  }

  function generateCaptcha() {
    captchaCurrentPrompt = prompts[Math.floor(Math.random() * prompts.length)];
    captchaInstruction.textContent = captchaCurrentPrompt.label;
    statusEl.textContent = "";
    verifyBtn.disabled = true;
    
    const images = shuffle([...captchaCurrentPrompt.images]);
    captchaGrid.innerHTML = "";
    
    images.forEach(imgData => {
      const wrapper = document.createElement("div");
      wrapper.className = "captcha-item";
      
      const img = document.createElement("img");
      img.src = imgData.src;
      img.className = "captcha-img";
      img.dataset.hash = hashTag(imgData.tag);
      
      wrapper.appendChild(img);
      captchaGrid.appendChild(wrapper);
      
      wrapper.addEventListener("click", () => {
        img.classList.toggle("selected");
        const anySelected = !!document.querySelector(".captcha-img.selected");
        verifyBtn.disabled = !anySelected;
        verifyBtn.textContent = anySelected ? "Verificar" : "Avançar";
      });
    });
  }

  refreshBtn.addEventListener("click", () => {
    generateCaptcha();
  });

  verifyBtn.addEventListener("click", () => {
    const corretoHash = hashTag(captchaCurrentPrompt.correctTag);
    let sucesso = true;
    document.querySelectorAll(".captcha-img").forEach(img => {
      const isCorrect = img.dataset.hash == corretoHash;
      const isSelected = img.classList.contains("selected");
      if (isCorrect !== isSelected) sucesso = false;
    });
    if (!sucesso) {
      statusEl.textContent = "Incorreto. Tente novamente.";
      statusEl.style.color = "red";
      setTimeout(generateCaptcha, 1200);
      return;
    }
    
setVotosRestantes(VOTOS_POR_CAPTCHA);
captchaClicado = true; 
updateBotoesEstado();

fecharCaptcha();

    if (pendingVote) {
      const voto = pendingVote;
      pendingVote = null;
      setTimeout(() => submitVote(voto), 300);
    }
  })
  
  

botaoVotar.addEventListener("click", () => {
  const escolhido = document.querySelector('input[name="vote"]:checked');
  
  if (!escolhido) {
    alert("Selecione alguém para votar!");
    return;
  }

  if (!captchaClicado) {
    alert("Clique no botão de CAPTCHA antes de votar!");
    return;
  }

  if (getVotosRestantes() <= 0) {
    alert("Resolva o CAPTCHA para liberar votos!");

  }

  // BLOQUEIO IMEDIATO AQUI
  botaoVotar.disabled = true;

});

async function submitVote(participante) {
  try {
    const agoraBR = await getServerTime();
    if (agoraBR > encerramentoBR) {
      alert("A votação foi encerrada!");
      // Reativa se falhar por horário
      botaoVotar.disabled = false;
      botaoVotar.textContent = "VOTAR";

    const votos = [];

for (let i = 0; i < pesoVoto; i++) {
votos.push({

});
}

const { error } = await supabase
  .from(TABLE_VOTACAO)
  .insert(votos);
    
    if (error) {
      console.error("Erro Supabase:", error);
      let msgErro = error.message || JSON.stringify(error);
      alert("ERRO NO SUPABASE:\n" + msgErro + "\n\n1. Verifique se a tabela 'cdf1' existe no seu banco.\n2. Verifique se o RLS permite inserção pública.");
      botaoVotar.disabled = false;
      botaoVotar.textContent = prevText;
      return;
    }
    
setVotosRestantes(Math.max(getVotosRestantes() - 1, 0));
captchaClicado = false;
updateBotoesEstado();

    votoTela.style.display = "none";
    confirmTela.style.display = "flex";
    nomeConfirm.textContent = participante;
    
    // Usamos a imagem capturada do card no momento do voto
    fotoConfirm.src = imagemVotada;
    fotoConfirm.style.display = "block";
    
    botaoVotar.textContent = prevText;
    botaoVotar.disabled = false;
  } catch (e) {
    alert("Erro inesperado: " + e.message);
    botaoVotar.disabled = false;
    botaoVotar.textContent = "VOTAR";
  }
}

function voltarParaVotacao() {
  confirmTela.style.display = "none";

  const checked = document.querySelector('input[name="vote"]:checked');
  if (checked) checked.checked = false;

  captchaClicado = false; 
  updateBotoesEstado();
}

  botaoVotarNovamente.addEventListener("click", () => {

botaoCaptcha.addEventListener("click", () => {

    captchaClicado = true;
    updateBotoesEstado();
  }
});

document.querySelectorAll('input[name="vote"]').forEach(radio => {
