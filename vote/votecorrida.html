<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Votação</title>

<style>
    /* ===== VARIÁVEIS GERAIS ===== */
    :root {
        --accent: #00b7b0;
        --accent-hover: #00e0d8;
        --muted: #888;
        --bg-dark: #1b1b1b;
        --bg-darker: #111;
        --panel-border: rgba(255, 255, 255, 0.1);
        --transition: all 0.3s ease;
        --border-radius: 12px;
        --shadow-sm: 0 2px 5px rgba(0,0,0,0.2);
        --shadow-lg: 0 20px 50px rgba(0,0,0,0.6);
    }

    /* ===== RESET E BASE ===== */
    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    
    body, html { 
        height: 100%; 
        overflow-x: hidden; 
    }

    .bg-fullscreen {
        position: fixed;
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%;
        background: url('https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
        background-size: cover;
        z-index: -1;
        filter: brightness(0.5);
    }

    .main-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        color: white;
        text-align: center;
    }

    /* ===== ANIMAÇÕES E UTILITÁRIOS ===== */
    @keyframes fadeIn { 
        from { opacity: 0; } 
        to { opacity: 1; } 
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }

    .notice {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
        margin-top: 10px;
    }

    /* ===== TELAS DE VOTO E CONFIRMAÇÃO ===== */
    #votoTela, #confirmTela {
        width: 100%;
        max-width: 900px;
        animation: fadeIn 0.5s ease;
    }

    /* ===== OPÇÕES EM GRADE (GRID) ===== */
    .options-container {
        display: grid;
        /* Cria exatamente 3 colunas de tamanhos iguais */
        grid-template-columns: repeat(3, 1fr);
        gap: 20px; /* Espaço entre os itens */
        margin-bottom: 30px;
        width: 100%;
        /* Em telas de celular muito estreitas, o gap menor ajuda a não espremer tanto as imagens */
    }

    @media (max-width: 480px) {
        .options-container {
            gap: 10px; /* Reduz o espaço no celular para as 3 imagens caberem melhor */
        }
    }

    .option {
        width: 100%; /* Ocupa todo o espaço da sua coluna na grade */
        cursor: pointer;
        transition: var(--transition);
    }

    .option img {
        width: 100%; /* Faz a imagem crescer/encolher conforme a coluna */
        aspect-ratio: 1/1; /* Mantém sempre quadrada */
        object-fit: cover; /* Evita que a imagem distorça */
        border-radius: var(--border-radius);
        border: 4px solid transparent;
        transition: var(--transition);
    }

    .option:hover img { 
        transform: scale(1.05); 
        border-color: rgba(255,255,255,0.3); 
    }

    .option input[type="radio"] { 
        display: none; 
    }

    .option input[type="radio"]:checked + img {
        border-color: var(--accent);
        box-shadow: 0 0 20px var(--accent);
    }

    .option-name { 
        margin-top: 12px; 
        font-weight: bold; 
        /* Usar 'vw' ou 'clamp' pode ajudar o texto a escalar em telas menores, mas 1rem (16px) costuma ser seguro */
        font-size: clamp(0.8rem, 2.5vw, 1.2rem); 
        text-shadow: 0 2px 4px rgba(0,0,0,0.5); 
    }

    /* ===== BOTÃO VOTAR ===== */
    #botaoVotar {
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        margin: 25px auto 0;
        transition: var(--transition);
        display: block;
    }

    #botaoVotar img {
        width: 240px;
        max-width: 100%; /* Garante que o botão não ultrapasse a tela em celulares minúsculos */
        display: block;
    }

    #botaoVotar:hover:not(:disabled) { 
        transform: scale(1.05); 
    }
    
    #botaoVotar:disabled { 
        filter: grayscale(1); 
        opacity: 0.5; 
        cursor: not-allowed; 
    }

    /* ===== TELA DE CONFIRMAÇÃO ===== */
    #confirmTela { 
        display: none; 
        flex-direction: column; 
        align-items: center; 
    }

    .confirm-card {
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        padding: 50px 30px; /* Padding ajustado para telas menores */
        max-width: 500px;
        width: 100%;
        box-shadow: var(--shadow-lg);
    }

    .thanks-text { 
        font-size: clamp(1.5rem, 5vw, 2.2rem); 
        font-weight: bold; 
        margin-bottom: 25px; 
    }

    .voted-option-display { 
        margin: 25px 0; 
    }

    .voted-option-display img {
        width: clamp(120px, 40vw, 180px); /* Imagem responsiva na confirmação */
        height: clamp(120px, 40vw, 180px);
        object-fit: cover;
        border-radius: 50%;
        border: 5px solid var(--accent);
        box-shadow: 0 0 30px var(--accent);
    }

    #nomeConfirm { 
        font-size: 1.6rem; 
        font-weight: bold; 
        margin-top: 15px; 
        color: #fff; 
    }

    .voltar {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 16px 35px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        margin-top: 35px;
        transition: var(--transition);
        text-transform: uppercase;
    }

    .voltar:hover { 
        background: var(--accent-hover); 
        transform: translateY(-3px); 
        box-shadow: 0 8px 20px rgba(0, 183, 176, 0.4); 
    }

    /* ===== POPUP CAPTCHA (MANTIDO DO SEU CÓDIGO) ===== */
    .popup {
        display: none;
        position: fixed;
        z-index: 1500;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        padding: 20px;
        transition: opacity .25s ease;
    }

    .popup.active {
        display: flex;
        opacity: 1;
    }

    .captcha-box {
        background: var(--bg-dark);
        width: 360px;
        max-width: 100%;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,.45);
        color: #eee;
    }

    .captcha-header {
        background: #0f7b82;
        padding: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .captcha-header span {
        font-size: 15px;
        font-weight: 600;
        line-height: 1.3;
        flex: 1;
        color: #fff;
    }

    .captcha-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.13);
    }

    .captcha-img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: 6px;
        background: var(--bg-darker);
        cursor: pointer;
        border: 2px solid transparent;
        transition: .15s;
    }

    .captcha-img:hover { transform: scale(1.03); }
    .captcha-img.selected {
        border-color: #fff;
        box-shadow: 0 0 6px rgba(255,255,255,0.5);
    }

    .captcha-footer {
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: flex-end;
    }

    .captcha-btn {
        background: #e6e6e6;
        color: #222;
        padding: 10px 22px;
        border-radius: 6px;
        cursor: pointer;
        border: none;
        font-weight: 600;
        transition: .15s;
    }

    .captcha-btn:disabled { opacity: .5; cursor: not-allowed; }
    .captcha-btn:hover:not(:disabled) { background: #fff; }

    .captcha-icon-btn {
        background: #2b2b2b;
        border: none;
        padding: 8px;
        border-radius: 6px;
        width: 40px;
        height: 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: .15s;
    }

    .captcha-icon-btn img { width: 20px; opacity: 0.8; }

    .captcha-dots { display: flex; gap: 4px; margin-left: auto; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #222; }
    .dot.white { background: #ffffff !important; }
    .dot.green { background: #4CAF50 !important; }

    /* ===== BOTÃO INICIAL DO CAPTCHA ===== */
    #botaoCaptcha {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        background: #222;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 0 15px;
        height: 70px;
        max-width: 100%;
        width: 320px;
        margin: 20px auto 0;
        cursor: pointer;
        user-select: none;
        box-shadow: var(--shadow-sm);
        color: #ccc;
        font-size: 14px;
        font-weight: 400;
        transition: var(--transition);
    }

    .recaptcha-checkbox {
        flex-shrink: 0;
        width: 30px;
        height: 30px;
        background: var(--bg-darker);
        border: 2px solid #444;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
    }

    #botaoCaptcha[aria-pressed="true"] .recaptcha-checkbox {
        background: #00aaff;
        border-color: #00aaff;
    }

    .checkmark {
        width: 18px;
        height: 18px;
        stroke: white;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: none;
    }

    #botaoCaptcha[aria-pressed="true"] .checkmark { display: block; }
    .recaptcha-label { user-select: none; line-height: 1; flex-grow: 1; text-align: left; }
    .recaptcha-icon { width: 40px; height: 40px; border-radius: 4px; object-fit: contain; filter: brightness(0.7); flex-shrink: 0; }

/* ===== TÍTULO PRINCIPAL (ACIMA DAS OPÇÕES) ===== */
.titulo-principal {
    font-size: clamp(2rem, 5vw, 3.5rem); /* Cresce e diminui conforme o tamanho da tela */
    font-weight: 800;
    color: #ffffff;
    text-align: center;
    margin-bottom: 40px; /* Dá um respiro antes de começar a grade de opções */
    line-height: 1.2;
    text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6); /* Sombra para garantir leitura sobre o fundo */
    letter-spacing: 1px;
}

/* Opcional: Se quiser que uma parte do texto fique com a cor de destaque (verde) */
.titulo-principal span {
    color: var(--accent);
}
</style>
</head>
<body>

    <div id="pesoDoVotoBadge" class="peso-voto-badge"></div>

    <div class="main-container">

            </div>
        </div>
    </div>

    <!-- SCRIPT ORIGINAL INTEGRADO -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // =================== CONFIG ===================
        const SUPABASE_URL = "https://beuqcarjvvjjmwoedvsc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJldXFjYXJqdnZqam13b2VkdnNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MzUxODQsImV4cCI6MjA4NDQxMTE4NH0.RxFRnk7zqPCJcIcF99BdPYLPRFtMR99diu4lU9pENJ4";
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        const TABLE_VOTACAO = "testador";
        const VOTOS_POR_CAPTCHA = 10;
        const DEBUG = false;

        // =================== HORÁRIOS ===================
        const aberturaBR = new Date("2026-01-18T19:00:00-03:00").getTime();
        const encerramentoBR = new Date("2026-08-14T19:00:00-03:00").getTime();

        // =================== HORA DO SERVIDOR ===================
        async function getServerTime() {
            try {
                const res = await fetch("https://timeapi.io/api/Time/current/zone?timeZone=America/Sao_Paulo", { cache: "no-store" });
                if (!res.ok) throw new Error("Falha ao buscar horário");
                const data = await res.json();
                return new Date(data.year, data.month - 1, data.day, data.hour, data.minute, data.seconds).getTime();
            } catch (e) {
                console.error("Erro ao verificar horário:", e);
                return Date.now();
            }
        }

        // =================== REDIRECT ===================
        function redirect(url) {
            if (typeof DEBUG !== "undefined" && DEBUG) {
                console.warn("REDIRECT BLOQUEADO →", url);
                return;
            }
            window.location.replace(url);
        }

        // =================== VERIFICAÇÃO DE HORÁRIO ===================
        async function verificarHorarios() {
            const agoraBR = await getServerTime();
            if (agoraBR < aberturaBR) { redirect("aguarde.html"); return; }
            if (agoraBR > encerramentoBR) { redirect("fechada.html"); return; }
        }
        verificarHorarios();
        setInterval(async () => {
            const agoraBR = await getServerTime();
            if (agoraBR < aberturaBR) redirect("aguarde.html");
            if (agoraBR > encerramentoBR) redirect("fechada.html");
        }, 5000);

        // =================== ELEMENTOS DOM ===================
        const votoTela = document.getElementById("votoTela");
        const confirmTela = document.getElementById("confirmTela");
        const nomeConfirm = document.getElementById("nomeConfirm");
        const fotoConfirm = document.getElementById("fotoConfirm");
        const botaoCaptcha = document.getElementById("botaoCaptcha");
        const botaoVotar = document.getElementById("botaoVotar");
        const botaoVotarNovamente = document.getElementById("botaoVotarNovamente");
        const popupCaptcha = document.getElementById("popupCaptcha");
        const captchaGrid = document.getElementById("captchaGrid");
        const captchaInstruction = document.getElementById("captcha-instrucao");
        const verifyBtn = document.getElementById("captchaConfirm");
        const refreshBtn = document.getElementById("captchaRefresh");
        const statusEl = document.getElementById("captchaStatus");

        let pendingVote = null;
        let captchaAberto = false;
        let captchaClicado = false;

        function updateBotoesEstado() {
            const restantes = getVotosRestantes();
            if (captchaClicado && restantes > 0) {
                botaoVotar.disabled = false;
                botaoVotar.classList.add("active");
            } else {
                botaoVotar.disabled = true;
                botaoVotar.classList.remove("active");
            }
            botaoCaptcha.setAttribute("aria-pressed", captchaClicado ? "true" : "false");
        }

        function hashTag(tag) {
            const secret = "CPTX_2025_FSHOW_🔥";
            let h = 0;
            const str = tag + secret;
            for (let i = 0; i < str.length; i++) { h = (h << 5) - h + str.charCodeAt(i); h |= 0; }
            return h;
        }

        function getVotosRestantes() {
            const raw = localStorage.getItem("votosRestantes");
            const token = localStorage.getItem("token");
            if (!raw || !token) return 0;
            return hashTag(raw) == token ? parseInt(raw) : 0;
        }

        function setVotosRestantes(n) {
            localStorage.setItem("votosRestantes", String(n));
            localStorage.setItem("token", hashTag(String(n)));
        }

        const prompts = [
            {
                label: "Clique nas imagens contendo algo que pode se locomover",
                correctTag: "202",
                images: [
                    { src: "https://i.ibb.co/cSMQWgx4/car1.png", tag: "202" },
                    { src: "https://i.ibb.co/d0CCf03S/moto1.png", tag: "202" },
                    { src: "https://i.ibb.co/tp8Mxrd9/car3.png", tag: "202" },
                    { src: "https://i.ibb.co/vtwFRhB/moto2.png", tag: "202" },
                    { src: "https://i.ibb.co/kVQVS7yD/car4.png", tag: "202" },
                    { src: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/papel-higi%C3%AAnico.jpg?raw=true", tag: "404" },
                    { src: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/toalha.jpg?raw=true", tag: "404" },
                    { src: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/sabonete.jpg?raw=true", tag: "404" },
                    { src: "https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/captcha/cap1/banheiro/escova-de-dentes.jpg?raw=true", tag: "404" }
                ]
            },
            {
                label: "Clique nas imagens contendo um animal",
                correctTag: "706",
                images: [
                    { src: "https://i.ibb.co/PZPW0gzR/elefante.jpg", tag: "706" },
                    { src: "https://i.ibb.co/zHZ6BhsR/cavalo.jpg", tag: "706" },
                    { src: "https://i.ibb.co/Nw9HKGp/leao.jpg", tag: "706" },
                    { src: "https://i.ibb.co/VcBzNJsw/rino.jpg", tag: "706" },
                    { src: "https://i.ibb.co/0jr3fwBd/girafa.jpg", tag: "706" },
                    { src: "https://i.ibb.co/WNh2CsLC/torta.png", tag: "1412" },
                    { src: "https://i.ibb.co/BHvGC4Cr/cookie.png", tag: "1412" },
                    { src: "https://i.ibb.co/35sfVQvY/donuts.png", tag: "1412" },
                    { src: "https://i.ibb.co/rRT6hz08/bolo.png", tag: "1412" }
                ]
            }
        ];

        let captchaCurrentPrompt = null;
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateCaptcha() {
            captchaGrid.innerHTML = "";
            statusEl.textContent = "";
            updateBotoesEstado();
            verifyBtn.disabled = true;
            captchaCurrentPrompt = prompts[Math.floor(Math.random() * prompts.length)];
            captchaInstruction.textContent = captchaCurrentPrompt.label;
            const correctImages = captchaCurrentPrompt.images.filter(i => i.tag === captchaCurrentPrompt.correctTag);
            const wrongImages = captchaCurrentPrompt.images.filter(i => i.tag !== captchaCurrentPrompt.correctTag);
            const correctCount = Math.min(Math.floor(Math.random() * 3) + 3, correctImages.length);
            const selectedCorrect = shuffle([...correctImages]).slice(0, correctCount);
            const selectedWrong = shuffle([...wrongImages]).slice(0, 9 - correctCount);
            const allImages = shuffle([...selectedCorrect, ...selectedWrong]);
            allImages.forEach(img => {
                const imgEl = document.createElement("img");
                imgEl.src = img.src;
                imgEl.className = "captcha-img";
                imgEl.dataset.hash = hashTag(img.tag);
                imgEl.addEventListener("click", () => {
                    imgEl.classList.toggle("selected");
                    verifyBtn.disabled = !document.querySelectorAll(".captcha-img.selected").length;
                });
                captchaGrid.appendChild(imgEl);
            });
        }

        function abrirCaptcha() {
            if (captchaAberto) return;
            captchaAberto = true;
            generateCaptcha();
            popupCaptcha.classList.add("active");
            botaoVotar.disabled = true;
        }

        function fecharCaptcha() {
            popupCaptcha.classList.remove("active");
            captchaAberto = false;
            updateBotoesEstado();
        }

        refreshBtn.addEventListener("click", () => generateCaptcha());

        verifyBtn.addEventListener("click", () => {
            const corretoHash = hashTag(captchaCurrentPrompt.correctTag);
            let sucesso = true;
            document.querySelectorAll(".captcha-img").forEach(img => {
                const isCorrect = img.dataset.hash == corretoHash;
                const isSelected = img.classList.contains("selected");
                if (isCorrect !== isSelected) sucesso = false;
            });
            if (!sucesso) {
                statusEl.textContent = "Incorreto. Tente novamente.";
                statusEl.style.color = "red";
                setTimeout(generateCaptcha, 1200);
                return;
            }
            setVotosRestantes(VOTOS_POR_CAPTCHA);
            captchaClicado = true;
            updateBotoesEstado();
            fecharCaptcha();
            if (pendingVote) {
                const voto = pendingVote;
                pendingVote = null;
                setTimeout(() => submitVote(voto), 300);
            }
        });

        botaoVotar.addEventListener("click", () => {
            const escolhido = document.querySelector('input[name="vote"]:checked');
            if (!escolhido) { alert("Selecione alguém para votar!"); return; }
            if (!captchaClicado) { alert("Clique no botão de CAPTCHA antes de votar!"); return; }
            if (getVotosRestantes() <= 0) { alert("Resolva o CAPTCHA para liberar votos!"); return; }
            botaoVotar.disabled = true;
            botaoVotar.innerHTML = '<span class="spinner"></span>';
            submitVote(escolhido.value);
        });

        async function submitVote(participante) {
            try {
                const agoraBR = await getServerTime();
                if (agoraBR > encerramentoBR) {
                    alert("A votação foi encerrada!");
                    botaoVotar.disabled = false;
                    botaoVotar.innerHTML = '<img src="https://i.ibb.co/d4bCY8fL/votar-removebg-preview.png" alt="VOTAR">';
                    return;
                }
                const inputEscolhido = document.querySelector('input[name="vote"]:checked');
                if (!inputEscolhido) {
                    botaoVotar.disabled = false;
                    botaoVotar.innerHTML = '<img src="https://i.ibb.co/d4bCY8fL/votar-removebg-preview.png" alt="VOTAR">';
                    return;
                }
                const cardPai = inputEscolhido.closest('.option');
                const imagemVotada = cardPai.querySelector('img').src;

                const votos = [];
                for (let i = 0; i < pesoVoto; i++) { votos.push({ participante: participante }); }
                const { error } = await supabase.from(TABLE_VOTACAO).insert(votos);
                
                if (error) {
                    console.error("Erro Supabase:", error);
                    alert("ERRO NO SUPABASE: " + error.message);
                    botaoVotar.disabled = false;
                    botaoVotar.innerHTML = '<img src="https://i.ibb.co/d4bCY8fL/votar-removebg-preview.png" alt="VOTAR">';
                    return;
                }
                
                setVotosRestantes(Math.max(getVotosRestantes() - 1, 0));
                captchaClicado = false;
                updateBotoesEstado();

                votoTela.style.display = "none";
                confirmTela.style.display = "flex";
                nomeConfirm.textContent = participante;
                fotoConfirm.src = imagemVotada;
                
                botaoVotar.innerHTML = '<img src="https://i.ibb.co/d4bCY8fL/votar-removebg-preview.png" alt="VOTAR">';
                botaoVotar.disabled = false;
            } catch (e) {
                alert("Erro inesperado: " + e.message);
                botaoVotar.disabled = false;
                botaoVotar.innerHTML = '<img src="https://i.ibb.co/d4bCY8fL/votar-removebg-preview.png" alt="VOTAR">';
            }
        }

        function voltarParaVotacao() {
            confirmTela.style.display = "none";
            votoTela.style.display = "block";
            const checked = document.querySelector('input[name="vote"]:checked');
            if (checked) checked.checked = false;
            captchaClicado = false;
            updateBotoesEstado();
        }

        botaoVotarNovamente.addEventListener("click", () => voltarParaVotacao());
        
        botaoCaptcha.addEventListener("click", () => {
            const restantes = getVotosRestantes();
            if (restantes <= 0) abrirCaptcha();
            else { captchaClicado = true; updateBotoesEstado(); }
        });

        document.querySelectorAll('input[name="vote"]').forEach(radio => {
            radio.addEventListener("change", () => { /* scrollParaFinal(); */ });
        });

        (function init() {
            captchaClicado = false;
            updateBotoesEstado();
        })();
    </script>
</body>
</html>
