<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Votação</title>

<style>
    /* ===== VARIÁVEIS GERAIS ===== */
    :root {
        --accent: #a78bfa;
        --accent-hover: #c4b5fd;
        --muted: #888;
        --bg-dark: #1b1b1b;
        --bg-darker: #111;
        --panel-border: rgba(255, 255, 255, 0.1);
        --transition: all 0.3s ease;
        --border-radius: 12px;
        --shadow-sm: 0 2px 5px rgba(0,0,0,0.2);
        --shadow-lg: 0 20px 50px rgba(0,0,0,0.6);
    }

    /* ===== RESET E BASE ===== */
    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    
    body, html { 
        height: 100%; 
        overflow-x: hidden; 
    }

    .bg-fullscreen {
        position: fixed;
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%;
        background: url('https://i.ibb.co/nMzFNk1Q/imgi-8-Imagem-Home.png') no-repeat center center fixed;
        background-size: cover;
        z-index: -1;
    }

    .main-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        color: white;
        text-align: center;
    }

    /* ===== ANIMAÇÕES E UTILITÁRIOS ===== */
    @keyframes fadeIn { 
        from { opacity: 0; } 
        to { opacity: 1; } 
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
    }

    .notice {
        font-size: 14px;
        color: var(--muted);
        text-align: center;
        margin-top: 15px;
    }

    /* ===== TELAS DE VOTO E CONFIRMAÇÃO ===== */
    #votoTela, #confirmTela {
        width: 100%;
        max-width: 1200px;
        animation: fadeIn 0.5s ease;
    }

    /* ===== OPÇÕES EM GRADE (GRID) ===== */
    .options-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 30px;
        width: 100%;
    }

    @media (max-width: 600px) {
        .options-container {
            gap: 8px;
        }
    }

    .option {
        width: 100%;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
    }

    .option img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: var(--border-radius);
        border: 4px solid transparent;
        transition: var(--transition);
        display: block;
    }

    .option:hover img { 
        transform: scale(1.02); 
        border-color: rgba(255,255,255,0.3); 
    }

    .option input[type="radio"] { 
        display: none; 
    }

    .option input[type="radio"]:checked + img {
        border-color: var(--accent);
        box-shadow: 0 0 25px var(--accent);
        transform: scale(1.02);
    }

    .option-name { 
        margin-top: 12px; 
        font-weight: bold; 
        font-size: clamp(0.9rem, 3vw, 1.5rem); 
        text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
    }

    /* ===== BOTÃO VOTAR ===== */
    #botaoVotar {
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        margin: 20px auto 0;
        transition: var(--transition);
        display: block;
    }

    #botaoVotar img {
        width: 280px;
        max-width: 100%;
        display: block;
    }

    #botaoVotar:hover:not(:disabled) { 
        transform: scale(1.05); 
    }
    
    #botaoVotar:disabled { 
        filter: grayscale(1); 
        opacity: 0.5; 
        cursor: not-allowed; 
    }

    /* ===== TELA DE CONFIRMAÇÃO ===== */
    #confirmTela { 
        display: none; 
        flex-direction: column; 
        align-items: center; 
    }

    .confirm-card {
        background: linear-gradient(135deg, rgba(167, 139, 250, 0.1) 0%, rgba(244, 114, 182, 0.1) 100%);
        backdrop-filter: blur(20px);
        border: 2px solid rgba(167, 139, 250, 0.3);
        border-radius: 28px;
        padding: 50px 30px;
        max-width: 550px;
        width: 100%;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
    }

    .thanks-text { 
        font-size: clamp(1.8rem, 6vw, 2.5rem); 
        font-weight: bold; 
        margin-bottom: 20px; 
    }

    .voted-option-display { 
        margin: 20px 0; 
    }

    .voted-option-display img {
        width: 240px;
        height: 240px;
        object-fit: cover;
        border-radius: 16px;
        border: none;
        box-shadow: 0 20px 60px rgba(167, 139, 250, 0.3);
        transition: transform 0.3s ease;
    }

    .voted-option-display img:hover {
        transform: scale(1.02);
    }

    #nomeConfirm { 
        font-size: 1.8rem; 
        font-weight: bold; 
        margin-top: 15px; 
        color: #fff; 
    }

    .voltar {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 16px 35px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        margin-top: 30px;
        transition: var(--transition);
        text-transform: uppercase;
    }

    .voltar:hover { 
        background: var(--accent-hover); 
        transform: translateY(-3px); 
        box-shadow: 0 8px 20px rgba(0, 183, 176, 0.4); 
    }

    /* ===== POPUP CAPTCHA ===== */
    .popup {
        display: none;
        position: fixed;
        z-index: 1500;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .popup.active {
        display: flex;
    }

    .captcha-box {
        background: var(--bg-dark);
        width: 360px;
        max-width: 100%;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,.45);
        color: #eee;
    }

    .captcha-header {
        background: #0f7b82;
        padding: 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .captcha-header span {
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        text-align: left;
    }

    .captcha-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.13);
    }

    .captcha-img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: 6px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: .15s;
    }

    .captcha-img.selected {
        border-color: #fff;
        box-shadow: 0 0 6px rgba(255,255,255,0.5);
        transform: scale(0.95);
    }

    .captcha-footer {
        padding: 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: space-between;
    }

    .captcha-btn {
        background: #e6e6e6;
        color: #222;
        padding: 10px 22px;
        border-radius: 6px;
        cursor: pointer;
        border: none;
        font-weight: 600;
    }

    .captcha-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ===== BOTÃO INICIAL DO CAPTCHA ===== */
    #botaoCaptcha {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        background: #f9f9f9;
        border: 1px solid #d3d3d3;
        border-radius: 3px;
        padding: 0 12px;
        height: 74px;
        width: 300px;
        margin: 20px auto 0;
        cursor: pointer;
        color: #000;
        font-size: 14px;
        box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }

    .recaptcha-checkbox {
        width: 28px;
        height: 28px;
        background: #fff;
        border: 2px solid #c1c1c1;
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #botaoCaptcha[aria-pressed="true"] .recaptcha-checkbox {
        background: #fff;
        border-color: #fff;
    }

    .checkmark {
        width: 30px;
        height: 30px;
        display: none;
    }

    #botaoCaptcha[aria-pressed="true"] .checkmark { display: block; }
    .recaptcha-label { flex-grow: 1; text-align: left; }
    .recaptcha-icon-wrapper { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #555; }
    .recaptcha-icon { width: 32px; height: 32px; margin-bottom: 2px; }

    /* ===== TÍTULO PRINCIPAL ===== */
    .titulo-principal {
        font-size: clamp(1.8rem, 5vw, 3rem);
        font-weight: 800;
        color: #ffffff;
        margin-bottom: 30px;
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
    }

    .titulo-principal span {
        color: var(--accent);
    }


</style>
</head>
<body>

    <div class="bg-fullscreen"></div>

    <div class="main-container">
        <!-- TELA DE VOTAÇÃO -->
        <div id="votoTela">
            <h1 class="titulo-principal">Quem você quer que <span>Vença?</span></h1>
            <div class="options-container">
                <label class="option">
                    <input type="radio" name="vote" value="João">
                    <img src="https://i.ibb.co/rKk3wcF9/Joao.png" alt="João">
                    <div class="option-name">João</div>
                </label>
                <label class="option">
                    <input type="radio" name="vote" value="Rose">
                    <img src="https://i.ibb.co/jPb3GKpz/Rose.png" alt="Rose">
                    <div class="option-name">Rose</div>
                </label>
                <label class="option">
                    <input type="radio" name="vote" value="Nick">
                    <img src="https://i.ibb.co/m53bbK1q/Nick.png" alt="Nick">
                    <div class="option-name">Nick</div>
                </label>
            </div>

            <!-- CAPTCHA -->
            <button id="botaoCaptcha" aria-pressed="false" type="button">
                <span class="recaptcha-checkbox">
                    <img class="checkmark" src="https://www.gstatic.com/recaptcha/api2/payload?p=1" alt="check" style="display:none;">
                    <!-- SVG Checkmark manual -->
                    <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="#00AAFF" stroke-width="4" style="width:20px; height:20px;">
                        <path d="M4 12l6 6 10-10"/>
                    </svg>
                </span>
                <span class="recaptcha-label">Não sou um robô</span>
                <div class="recaptcha-icon-wrapper">
                    <img class="recaptcha-icon" src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="reCAPTCHA">
                    <span>reCAPTCHA</span>
                </div>
            </button>

            <!-- BOTÃO VOTAR -->
            <button id="botaoVotar" disabled>
                <img src="https://i.ibb.co/d4bCY8fL/votar-removebg-preview.png" alt="VOTAR">
            </button>

            <div class="notice">Votação aberta até às 19:00</div>
        </div>

        <!-- TELA DE CONFIRMAÇÃO -->
        <div id="confirmTela">
            <div class="confirm-card">
                <div class="thanks-text">Obrigado por votar!</div>
                <div class="voted-option-display">
                    <img id="fotoConfirm" src="" alt="Voto"/>
                    <p id="nomeConfirm"></p>
                </div>
                <button id="botaoVotarNovamente" class="voltar">VOTAR NOVAMENTE</button>
                <div class="notice">Voto computado com sucesso!</div>
            </div>
        </div>
    </div>

    <!-- POPUP CAPTCHA -->
    <div id="popupCaptcha" class="popup">
        <div class="captcha-box">
            <div class="captcha-header">
                <span>Selecione todas as imagens com <br><strong id="captcha-instrucao">...</strong></span>
            </div>
            <div id="captchaGrid" class="captcha-grid"></div>
            <div class="captcha-footer">
                <div style="display:flex; gap:10px;">
                    <button id="captchaRefresh" class="captcha-btn" style="padding: 10px;">🔄</button>
                </div>
                <button id="captchaConfirm" class="captcha-btn" disabled>VERIFICAR</button>
            </div>
            <div id="captchaStatus" style="text-align:center; padding-bottom:10px; font-size:12px;"></div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1"></script>
<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // CONFIG
    const SUPABASE_URL = "https://beuqcarjvvjjmwoedvsc.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJldXFjYXJqdnZqam13b2VkdnNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MzUxODQsImV4cCI6MjA4NDQxMTE4NH0.RxFRnk7zqPCJcIcF99BdPYLPRFtMR99diu4lU9pENJ4";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const TABLE_VOTACAO = "testador";
    const VOTOS_POR_CAPTCHA = 10;
    const DEBUG = false;

    // HORÁRIOS
    const aberturaBR = new Date("2026-01-18T19:00:00-03:00").getTime();
    const encerramentoBR = new Date("2026-08-14T19:00:00-03:00").getTime();

    async function getServerTime() {
        try {
            const res = await fetch("https://timeapi.io/api/Time/current/zone?timeZone=America/Sao_Paulo", { cache: "no-store" });
            if (!res.ok) throw new Error();
            const data = await res.json();
            return new Date(data.dateTime).getTime();
        } catch (e) {
            return Date.now();
        }
    }

    // APPWRITE
    const appwriteClient = new Appwrite.Client();
    appwriteClient.setEndpoint("https://nyc.cloud.appwrite.io/v1").setProject("6a07b38c00004e1645ee");
    const appwriteAccount = new Appwrite.Account(appwriteClient);

    let pesoVoto = 1;

    // DOM
    const votoTela = document.getElementById("votoTela");
    const confirmTela = document.getElementById("confirmTela");
    const nomeConfirm = document.getElementById("nomeConfirm");
    const fotoConfirm = document.getElementById("fotoConfirm");
    const botaoCaptcha = document.getElementById("botaoCaptcha");
    const botaoVotar = document.getElementById("botaoVotar");
    const botaoVotarNovamente = document.getElementById("botaoVotarNovamente");
    const popupCaptcha = document.getElementById("popupCaptcha");
    const captchaGrid = document.getElementById("captchaGrid");
    const captchaInstruction = document.getElementById("captcha-instrucao");
    const verifyBtn = document.getElementById("captchaConfirm");
    const refreshBtn = document.getElementById("captchaRefresh");
    const statusEl = document.getElementById("captchaStatus");

    let captchaClicado = false;

    function getVotosRestantes() {
        const v = localStorage.getItem("votosRestantes");
        return v ? parseInt(v) : 0;
    }

    function setVotosRestantes(n) {
        localStorage.setItem("votosRestantes", n);
    }

    function updateBotoesEstado() {
        const restantes = getVotosRestantes();
        const selecionado = document.querySelector('input[name="vote"]:checked');
        
        if (captchaClicado && restantes > 0 && selecionado) {
            botaoVotar.disabled = false;
        } else {
            botaoVotar.disabled = true;
        }

        botaoCaptcha.setAttribute("aria-pressed", captchaClicado ? "true" : "false");
    }

    const prompts = [
        {
            label: "veículos",
            correctTag: "car",
            images: [
                { src: "https://i.ibb.co/cSMQWgx4/car1.png", tag: "car" },
                { src: "https://i.ibb.co/d0CCf03S/moto1.png", tag: "car" },
                { src: "https://i.ibb.co/tp8Mxrd9/car3.png", tag: "car" },
                { src: "https://i.ibb.co/vtwFRhB/moto2.png", tag: "car" },
                { src: "https://i.ibb.co/kVQVS7yD/car4.png", tag: "car" },
                { src: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=200", tag: "other" },
                { src: "https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=200", tag: "other" },
                { src: "https://images.unsplash.com/photo-1583947215259-38e31be8751f?w=200", tag: "other" },
                { src: "https://images.unsplash.com/photo-1526947425960-945c6e72858f?w=200", tag: "other" }
            ]
        },
        {
            label: "animais",
            correctTag: "animal",
            images: [
                { src: "https://i.ibb.co/PZPW0gzR/elefante.jpg", tag: "animal" },
                { src: "https://i.ibb.co/zHZ6BhsR/cavalo.jpg", tag: "animal" },
                { src: "https://i.ibb.co/Nw9HKGp/leao.jpg", tag: "animal" },
                { src: "https://i.ibb.co/VcBzNJsw/rino.jpg", tag: "animal" },
                { src: "https://i.ibb.co/0jr3fwBd/girafa.jpg", tag: "animal" },
                { src: "https://i.ibb.co/WNh2CsLC/torta.png", tag: "food" },
                { src: "https://i.ibb.co/BHvGC4Cr/cookie.png", tag: "food" },
                { src: "https://i.ibb.co/35sfVQvY/donuts.png", tag: "food" },
                { src: "https://i.ibb.co/rRT6hz08/bolo.png", tag: "food" }
            ]
        }
    ];

    let currentPrompt = null;

    function generateCaptcha() {
        captchaGrid.innerHTML = "";
        statusEl.textContent = "";
        verifyBtn.disabled = true;
        currentPrompt = prompts[Math.floor(Math.random() * prompts.length)];
        captchaInstruction.textContent = currentPrompt.label;
        
        const images = [...currentPrompt.images].sort(() => Math.random() - 0.5);
        images.forEach(img => {
            const imgEl = document.createElement("img");
            imgEl.src = img.src;
            imgEl.className = "captcha-img";
            imgEl.onclick = () => {
                imgEl.classList.toggle("selected");
                verifyBtn.disabled = !document.querySelectorAll(".captcha-img.selected").length;
            };
            imgEl.dataset.tag = img.tag;
            captchaGrid.appendChild(imgEl);
        });
    }

    botaoCaptcha.onclick = () => {
        if (getVotosRestantes() > 0) {
            captchaClicado = true;
            updateBotoesEstado();
        } else {
            popupCaptcha.classList.add("active");
            generateCaptcha();
        }
    };

    refreshBtn.onclick = generateCaptcha;

    verifyBtn.onclick = () => {
        let error = false;
        document.querySelectorAll(".captcha-img").forEach(img => {
            const isCorrect = img.dataset.tag === currentPrompt.correctTag;
            const isSelected = img.classList.contains("selected");
            if (isCorrect !== isSelected) error = true;
        });

        if (error) {
            statusEl.textContent = "Incorreto. Tente novamente.";
            statusEl.style.color = "red";
            setTimeout(generateCaptcha, 1000);
        } else {
            setVotosRestantes(VOTOS_POR_CAPTCHA);
            captchaClicado = true;
            popupCaptcha.classList.remove("active");
            updateBotoesEstado();
        }
    };

    document.querySelectorAll('input[name="vote"]').forEach(input => {
        input.onchange = updateBotoesEstado;
    });

    botaoVotar.onclick = async () => {
        const escolhido = document.querySelector('input[name="vote"]:checked');
        if (!escolhido) return;

        botaoVotar.disabled = true;
        const originalContent = botaoVotar.innerHTML;
        botaoVotar.innerHTML = '<div class="spinner"></div>';

        try {
            const votos = [{ participante: escolhido.value }];
            const { error } = await supabase.from(TABLE_VOTACAO).insert(votos);

            if (error) throw error;

            setVotosRestantes(Math.max(0, getVotosRestantes() - 1));
            captchaClicado = false;

            nomeConfirm.textContent = escolhido.value;
            fotoConfirm.src = escolhido.closest('.option').querySelector('img').src;
            votoTela.style.display = "none";
            confirmTela.style.display = "flex";
        } catch (e) {
            alert("Erro ao votar: " + e.message);
        } finally {
            botaoVotar.innerHTML = originalContent;
            updateBotoesEstado();
        }
    };

    botaoVotarNovamente.onclick = () => {
        confirmTela.style.display = "none";
        votoTela.style.display = "block";
        document.querySelectorAll('input[name="vote"]').forEach(i => i.checked = false);
        updateBotoesEstado();
    };

    updateBotoesEstado();
</script>
</body>
</html>
