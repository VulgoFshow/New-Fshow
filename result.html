<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Resultado da Votação</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

:root {
  --primary: #6366f1;
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --accent: #10b981;
  --border: #334155;
  --shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
  --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

body {
  background-color: var(--bg);
  background-image: 
    radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
    radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
    radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container { width: 100%; max-width: 550px; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(10px);
}

.title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 24px;
  text-align: center;
  background: linear-gradient(to right, #fff, #94a3b8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.input-box {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 32px;
}

.input-row {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  color: white;
  outline: none;
  font-size: 14px;
}

button {
  padding: 14px 24px;
  border-radius: 14px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: 700;
  cursor: pointer;
}

.result-item {
  background: rgba(255,255,255,.03);
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}

.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.name { font-size: 18px; font-weight: 700; color: var(--text-main); }
.perc-tag { font-size: 16px; font-weight: 800; color: var(--accent); }

.bar-bg {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,.05);
  border-radius: 10px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 10px;
  transition: width 0.3s ease;
}

.result-item.least-voted {
  border-color: rgba(239, 68, 68, 0.4);
  background: rgba(239, 68, 68, 0.05);
}

.result-item.least-voted .bar-fill {
  background: var(--danger);
  box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
}

.result-item.least-voted .perc-tag {
  color: var(--danger);
}

.vote-count {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 8px;
  text-align: right;
}

.total-votos {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 18px;
  font-weight: 800;
  color: var(--text-main);
}

.empty-msg { text-align: center; color: var(--text-muted); padding: 20px; font-size: 14px; }
label { font-size: 12px; color: var(--text-muted); margin-left: 5px; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>

<body>
<div class="container">
  <div class="card">
    <div class="title">Resultado em Tempo Real</div>

    <div class="input-box">
      <div>
        <label>Nome da Collection</label>
        <input type="text" id="collectionName" placeholder="Ex: roca31 ou roca8" value="roca31" style="width: 100%; margin-top: 5px;">
      </div>
      <div>
        <label>ID da Votação</label>
        <div class="input-row" style="margin-top: 5px;">
          <input type="text" id="idVotacao" placeholder="Ex: Roça-1" value="Roça-1">
          <button onclick="carregarResultados()">VER</button>
        </div>
      </div>
    </div>

    <div id="results">
      <p class="empty-msg">Configure a collection e o ID acima para ver os resultados.</p>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD6NAWtJ1bOD-vdVbSQuf5440XaBkg6uaU",
  authDomain: "enquete-fa527.firebaseapp.com",
  databaseURL: "https://enquete-fa527-default-rtdb.firebaseio.com",
  projectId: "enquete-fa527",
  storageBucket: "enquete-fa527.firebasestorage.app",
  messagingSenderId: "544422121318",
  appId: "1:544422121318:web:e3d0412f7bf9740e7142a7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let unsubscribe = null;

function carregarResultados() {
  const collection = document.getElementById("collectionName").value.trim();
  const idVotacao = document.getElementById("idVotacao").value.trim();
  
  if (!collection || !idVotacao) {
    alert("Preencha a Collection e o ID");
    return;
  }

  if (unsubscribe) unsubscribe();

  // Agora a busca é dinâmica baseada nos campos de input
  unsubscribe = db.collection(collection)
    .where("votacao_id", "==", idVotacao)
    .onSnapshot(snapshot => {
      const contagem = {};
      let total = 0;

      snapshot.forEach(doc => {
        const data = doc.data();
        const nome = data.nome;
        if (nome) {
          contagem[nome] = (contagem[nome] || 0) + 1;
          total++;
        }
      });

      renderResultados(contagem, total);
    }, error => {
      console.error("Erro:", error);
      document.getElementById("results").innerHTML = `<p class="empty-msg" style="color:#ef4444">Erro ao acessar a coleção '${collection}'.<br>Verifique se o nome está correto.</p>`;
    });
}

function renderResultados(dados, total) {
  const container = document.getElementById("results");
  if (total === 0) {
    container.innerHTML = `<p class="empty-msg">Nenhum voto encontrado nesta coleção com este ID.</p>`;
    return;
  }

  let html = "";
  const nomesOrdenados = Object.keys(dados).sort((a,b) => dados[b] - dados[a]);
  const menorVoto = Math.min(...Object.values(dados));

  nomesOrdenados.forEach(nome => {
    const votos = dados[nome];
    const perc = ((votos / total) * 100).toFixed(2);
    const isLeastVoted = (votos === menorVoto);

    html += `
      <div class="result-item ${isLeastVoted ? 'least-voted' : ''}">
        <div class="header-row">
          <div class="name">${nome}</div>
          <div class="perc-tag">${perc}%</div>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${perc}%"></div>
        </div>
        <div class="vote-count">${votos} ${votos === 1 ? 'voto' : 'votos'}</div>
      </div>
    `;
  });

  html += `<div class="total-votos">Total: ${total} votos</div>`;
  container.innerHTML = html;
}

// Carregar inicial
carregarResultados();
</script>
</body>
</html>
