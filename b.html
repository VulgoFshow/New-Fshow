<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fshow - Resultados da Votação</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="icon" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">
  <meta name="theme-color" content="#8A2BE2">

  <style>
    /* ===== VARIÁVEIS GLOBAIS ===== */
    :root {
      --bg: #121212;
      --card-bg: #2b2b2b;
      --accent: #00b7b0;
      --text: #fff;
      --muted: #bdbdbd;
      --border-radius: 8px;
      --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.4);
    }

    /* ===== BASE ===== */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: "Inter", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, rgba(0, 183, 176, 0.32), transparent 55%),
        radial-gradient(circle at 85% 75%, rgba(0, 110, 255, 0.28), transparent 60%),
        radial-gradient(circle at 50% -20%, rgba(200, 0, 255, 0.25), transparent 70%),
        linear-gradient(145deg, #0a0b0d, #101218 45%, #060708);
      background-attachment: fixed;
      background-size: cover;
    }

    /* ===== LAYOUT ===== */
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      box-shadow: var(--shadow-md);
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 5px;
    }

    .total-votos {
      text-align: center;
      color: var(--accent);
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    /* ===== CARDS DE RESULTADO ===== */
    .result-card {
      display: flex;
      background: var(--card-bg);
      border-radius: var(--border-radius);
      margin-bottom: 15px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      animation: fadeIn 0.5s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(10px); }
    }

    .result-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      object-position: top;
      background: #1a1a1a;
    }

    .result-info {
      padding: 15px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .nome { font-size: 18px; font-weight: bold; }
    
    .porcentagem { 
      font-size: 20px; 
      font-weight: 900; 
      color: var(--accent); 
    }

    .votos-qtd {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ===== BARRA DE PROGRESSO ===== */
    .bar-container {
      width: 100%;
      height: 8px;
      background: #444;
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%; /* Será preenchido via JS */
      transition: width 1s ease-in-out;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: var(--muted);
    }

    /* Adiciona cores diferentes pro pódio (opcional, deixa mais visual) */
    .result-card:nth-child(1) .bar-fill, .result-card:nth-child(1) .porcentagem { color: #00ff99; background-color: #00ff99;}
    .result-card:nth-child(2) .bar-fill, .result-card:nth-child(2) .porcentagem { color: #00b7b0; background-color: #00b7b0;}
    .result-card:nth-child(3) .bar-fill, .result-card:nth-child(3) .porcentagem { color: #ff8c00; background-color: #ff8c00;}
  </style>
</head>
<body>

  <div class="container">
    <h1>Resultados Oficiais</h1>
    <div id="totalVotosContainer" class="total-votos">Carregando dados...</div>
    
    <div id="resultadosLista">
      <div class="loading">Buscando votos no servidor...</div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // =================== CONFIG ===================
    const SUPABASE_URL = "https://ntkaeaijugkjhqrbnavk.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50a2FlYWlqdWdramhxcmJuYXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NjI1MTksImV4cCI6MjA5OTQzODUxOX0.PbMWZZm82S07CcpR9A6X2Rz5uznkgQXCRQ_l8lwiK2Y";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    const TABLE_VOTACAO = "bfs1";

    // Informações visuais dos participantes para a tela de resultados
    const participantes = {
      "Celso Escoliosi": { img: "https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Celso.png?raw=true" },
      "Lucas BemVaral": { img: "https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Lucas.png?raw=true" },
      "Sobrinha Milena": { img: "https://github.com/VulgoFshow/New-Fshow/blob/main/bigsims/Sobrinha.png?raw=true" }
    };

    async function buscarResultados() {
      try {
        // Busca todos os participantes votados na tabela
        // Nota: O Supabase retorna por padrão até 1000 linhas. 
        // Se a votação passar de 1000 votos, será necessário paginação.
        const { data, error } = await supabase
          .from(TABLE_VOTACAO)
          .select('participante');

        if (error) throw error;

        processarVotos(data);

      } catch (e) {
        console.error("Erro ao buscar resultados:", e);
        document.getElementById("resultadosLista").innerHTML = 
          `<div class="loading" style="color:#ff4d4d;">Erro ao carregar os resultados.</div>`;
      }
    }

    function processarVotos(votos) {
      const totalVotos = votos.length;
      const contagem = {
        "Celso Escoliosi": 0,
        "Lucas BemVaral": 0,
        "Sobrinha Milena": 0
      };

      // Conta os votos para cada um
      votos.forEach(voto => {
        if(contagem[voto.participante] !== undefined) {
          contagem[voto.participante]++;
        }
      });

      // Transforma em array para poder ordenar do mais votado pro menos votado
      const resultadosArray = Object.keys(contagem).map(nome => {
        const qtdVotos = contagem[nome];
        // Calcula porcentagem com 2 casas decimais
        const porcentagem = totalVotos > 0 ? ((qtdVotos / totalVotos) * 100) : 0;
        
        return {
          nome: nome,
          votos: qtdVotos,
          porcentagem: porcentagem.toFixed(2), // Garante o 00,00%
          img: participantes[nome].img
        };
      });

      // Ordena de forma decrescente (quem tem mais votos fica em 1º)
      resultadosArray.sort((a, b) => b.votos - a.votos);

      renderizarTela(resultadosArray, totalVotos);
    }

    function renderizarTela(resultadosArray, totalVotos) {
      // Atualiza o total
      document.getElementById("totalVotosContainer").innerHTML = `Total de Votos: ${totalVotos.toLocaleString('pt-BR')}`;
      
      const lista = document.getElementById("resultadosLista");
      lista.innerHTML = ""; // Limpa o "loading"

      // Cria os cards dinamicamente
      resultadosArray.forEach((item, index) => {
        // Atraso sutil na animação para criar um efeito em cascata
        const animDelay = index * 0.15; 
        
        const cardHtml = `
          <div class="result-card" style="animation-delay: ${animDelay}s;">
            <img src="${item.img}" alt="${item.nome}">
            <div class="result-info">
              <div class="result-header">
                <span class="nome">${item.nome}</span>
                <span class="porcentagem">${item.porcentagem}%</span>
              </div>
              <div class="votos-qtd">${item.votos} voto(s)</div>
              <div class="bar-container">
                <div class="bar-fill" style="width: 0%;" data-target="${item.porcentagem}%"></div>
              </div>
            </div>
          </div>
        `;
        lista.innerHTML += cardHtml;
      });

      // Animação suave para as barras de progresso (gatilho após um pequeno intervalo)
      setTimeout(() => {
        document.querySelectorAll('.bar-fill').forEach(bar => {
          bar.style.width = bar.getAttribute('data-target');
        });
      }, 100);
    }

    // Inicializa
    buscarResultados();
  </script>
</body>
</html>
