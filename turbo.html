<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fshow - Votação (Versão Texto)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

<link rel="icon" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png" type="image/png">
<link rel="icon" type="image/png" sizes="16x16" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">
<link rel="icon" type="image/png" sizes="32x32" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">
<link rel="icon" type="image/png" sizes="96x96" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">
<link rel="icon" type="image/png" sizes="192x192" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">

<link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">

<meta name="theme-color" content="#8A2BE2">
<meta name="msapplication-TileColor" content="#FF8C00">
<meta name="msapplication-TileImage" content="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">
  
<style>
/* ===== VARIÁVEIS GLOBAIS ===== */
:root {
  --bg: #121212;
  --card-bg: #2b2b2b;
  --selected-bg: #3c3c3c;
  --panel-bg: #2b2b2b;
  --panel-border: rgba(255, 255, 255, 0.06);
  --accent: #00b7b0;
  --text: #fff;
  --muted: #bdbdbd;
  --border-radius: 8px;
  --transition: all 0.3s ease;
  --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.6);
  --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 8px 25px rgba(13, 13, 13, 0.3);
}

/* ===== BASE ===== */
*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  font-family: "Inter", Arial, sans-serif;
  color: var(--text);

  background:
    radial-gradient(circle at 10% 20%, rgba(0, 183, 176, 0.32), transparent 55%),
    radial-gradient(circle at 85% 75%, rgba(0, 110, 255, 0.28), transparent 60%),
    radial-gradient(circle at 50% -20%, rgba(200, 0, 255, 0.25), transparent 70%),
    linear-gradient(145deg, #0a0b0d, #101218 45%, #060708);

  background-attachment: fixed;
  background-size: cover;
  animation: fadeIn 0.7s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== LAYOUT ===== */
.container {
  max-width: 400px;
  margin: 0 auto;
  padding: 20px 15px;
  animation: slideUp 0.6s ease;
}

h1 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 20px;
  text-align: left;
}

/* ===== OPÇÕES (RADIO CARDS) ===== */
.option {
  display: flex;
  background: var(--card-bg);
  border: 1px solid #fff;
  border-radius: var(--border-radius);
  margin-bottom: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.3s ease;
}

.option:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
}

.option.selected,
.option:has(input[type="radio"]:checked) {
  background: rgba(0, 183, 176, 0.2) !important;
  border-color: var(--accent) !important;
}

.option-content {
  display: flex;
  align-items: center;
  padding: 16px 12px;
  width: 100%;
  font-size: 18px;
  font-weight: 500;
}

.option-content input[type="radio"] {
  appearance: none;
  width: 20px;
  height: 20px;
  border: 2px solid var(--muted);
  border-radius: 50%;
  margin-right: 12px;
  cursor: pointer;
  position: relative;
  transition: border-color 0.3s ease, transform 0.2s ease;
}

.option-content input[type="radio"]:checked {
  border-color: var(--accent);
}

.option-content input[type="radio"]:checked::before {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 50%;
  background: var(--accent);
}

/* ===== SPINNER ===== */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  border-top-color: #fff;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ===== BOTÃO PRINCIPAL ===== */
button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: var(--border-radius);
  margin-top: 15px;
  cursor: pointer;
  background: #444;
  color: var(--muted);
  transition: var(--transition);
}

button:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0, 183, 176, 0.3);
}

button.active {
  background: var(--accent);
  color: #fff;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.notice {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  margin-top: 10px;
}

/* ===== CONFIRMAÇÃO ===== */
#nomeConfirm {
  background: #1F1F1F;
  color: #fff;
  font-size: 24px;
  font-weight: 700;
  text-align: center;
  padding: 30px 14px;
  border-radius: 10px;
  border: 1px solid var(--accent);
  margin-bottom: 20px;
}

.success-msg {
  background: rgba(0, 255, 150, 0.1);
  border: 1px solid rgba(0, 255, 150, 0.4);
  border-radius: 8px;
  padding: 10px 15px;
  text-align: center;
  color: #00ff99;
  font-weight: 600;
  margin-bottom: 18px;
}

.success-msg::before {
  content: "✔ ";
  color: #00ff99;
}

.voltar {
  background: var(--accent);
  color: #fff;
}

#confirmTela {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
  min-height: 85vh;
  animation: slideUp 0.6s ease forwards;
}

.confirm-card {
  border: 2px solid var(--panel-border);
  border-radius: 12px;
  padding: 20px;
  max-width: 450px;
  width: 100%;
  margin: 0 auto;
}

.espacador { width: 100%; margin: 10px 0; }

@media (min-width: 1024px) {
  .container { max-width: 800px; padding: 40px 20px; }
  h1 { font-size: 28px; }
  .options { display: grid; grid-template-columns: 1fr; gap: 12px; }
  button { max-width: 420px; margin: 32px auto 0; display: block; }
  .confirm-card { max-width: 620px; }
}
</style>
</head>
<body>

  <div id="votoTela" class="container">
    <div class="espacador"></div>
    <h1>Quem você quer que FIQUE <br> na Big Farm?</h1>
    <div class="espacador"></div>
    
<div class="options">
      <label class="option">
        <div class="option-content">
          <input type="radio" name="vote" value="João"> João
        </div>
      </label>

      <label class="option">
        <div class="option-content">
          <input type="radio" name="vote" value="Pedro"> Pedro
        </div>
      </label>
    </div>

    <button id="botaoVotar" disabled>VOTAR</button>
    <div class="notice">Essa votação segue aberta por 5 minutos</div>
  </div> 
  
  <div id="confirmTela">
    <div class="confirm-card">
      <p id="nomeConfirm"></p>
      <div class="success-msg">Voto computado com sucesso!</div>
      <button id="botaoVotarNovamente" class="voltar">VOTAR NOVAMENTE</button>
      <div class="notice">Essa votação segue aberta até às 19:00</div>
    </div>
  </div> 
  
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = "https://ntkaeaijugkjhqrbnavk.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50a2FlYWlqdWdramhxcmJuYXZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NjI1MTksImV4cCI6MjA5OTQzODUxOX0.PbMWZZm82S07CcpR9A6X2Rz5uznkgQXCRQ_l8lwiK2Y";
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const TABLE_VOTACAO = "rt1";
    const pesoVoto = 1;
    const aberturaBR = new Date("2026-01-18T19:00:00-03:00").getTime();
    const encerramentoBR = new Date("2026-07-20T16:23:00-03:00").getTime();

    async function getServerTime() {
      try {
        const res = await fetch("https://timeapi.io/api/Time/current/zone?timeZone=America/Sao_Paulo", { cache: "no-store" });
        if (!res.ok) throw new Error("Falha ao buscar horário");
        const data = await res.json();
        return new Date(data.year, data.month - 1, data.day, data.hour, data.minute, data.seconds).getTime();
      } catch (e) {
        return Date.now();
      }
    }

    async function verificarHorarios() {
      const agoraBR = await getServerTime();
      if (agoraBR < aberturaBR) { window.location.replace("aguarde.html"); return; }
      if (agoraBR > encerramentoBR) { window.location.replace("fechada.html"); return; }
    }
    verificarHorarios();
    setInterval(verificarHorarios, 5000);
      
    const votoTela = document.getElementById("votoTela");
    const confirmTela = document.getElementById("confirmTela");
    const nomeConfirm = document.getElementById("nomeConfirm");
    const botaoVotar = document.getElementById("botaoVotar");
    const botaoVotarNovamente = document.getElementById("botaoVotarNovamente");

    function updateBotoesEstado() {
      const escolhido = document.querySelector('input[name="vote"]:checked');
      botaoVotar.disabled = !escolhido;
      if (escolhido) botaoVotar.classList.add("active");
      else botaoVotar.classList.remove("active");
    }

    botaoVotar.addEventListener("click", async () => {
      const escolhido = document.querySelector('input[name="vote"]:checked');
      if (!escolhido) return;

      botaoVotar.disabled = true;
      botaoVotar.innerHTML = '<span class="spinner"></span>Enviando voto...';

      try {
        const agoraBR = await getServerTime();
        if (agoraBR > encerramentoBR) {
          alert("A votação foi encerrada!");
          botaoVotar.disabled = false;
          botaoVotar.textContent = "VOTAR";
          return;
        }

        const votos = Array(pesoVoto).fill({ participante: escolhido.value });
        const { error } = await supabase.from(TABLE_VOTACAO).insert(votos);
        
        if (error) {
          alert("Erro ao enviar voto: " + error.message);
          botaoVotar.disabled = false;
          botaoVotar.textContent = "VOTAR";
          return;
        }
        
        votoTela.style.display = "none";
        confirmTela.style.display = "flex";
        nomeConfirm.textContent = escolhido.value;
        botaoVotar.textContent = "VOTAR";
        botaoVotar.disabled = false;
      } catch (e) {
        alert("Erro inesperado: " + e.message);
        botaoVotar.disabled = false;
        botaoVotar.textContent = "VOTAR";
      }
    });

    botaoVotarNovamente.addEventListener("click", () => {
      confirmTela.style.display = "none";
      votoTela.style.display = "block";
      const checked = document.querySelector('input[name="vote"]:checked');
      if (checked) checked.checked = false;
      updateBotoesEstado();
    });

    document.querySelectorAll('input[name="vote"]').forEach(radio => {
      radio.addEventListener("change", updateBotoesEstado);
    });

    updateBotoesEstado();
  </script>
</body>
</html>
