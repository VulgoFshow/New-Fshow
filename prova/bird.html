<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #58a6ff;
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --success-color: #238636;
            --danger-color: #da3633;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .hidden { display: none; }

        h1 { margin-bottom: 16px; color: #fff; font-size: 24px; }
        p { margin-bottom: 20px; color: #8b949e; font-size: 14px; }

        input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            margin-bottom: 16px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 16px;
        }

        button:hover { background-color: #2ea043; }
        button:disabled { background-color: #23863680; cursor: not-allowed; }

        #game-container {
            position: relative;
            width: 320px;
            height: 480px;
            margin: 0 auto;
            border: 4px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background-color: #70c5ce; /* Sky blue */
        }

        canvas {
            display: block;
            background-color: transparent;
        }

        .game-ui {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            z-index: 10;
        }

        .ui-item {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: #fff;
        }

        .ranking-list {
            list-style: none;
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .ranking-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .score-val { color: var(--primary-color); font-weight: bold; }
        
        #alreadyPlayedMessage {
            color: var(--danger-color);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .instructions {
            font-size: 12px;
            margin-top: 10px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Tela de Carregamento -->
        <div id="loadingCard" class="card">
            <h1>Carregando...</h1>
            <p>Preparando o desafio Flappy Bird</p>
        </div>

        <!-- Tela de Login -->
        <div id="loginCard" class="card hidden">
            <h1>Flappy Bird</h1>
            <p>Digite seu nome para começar. <br>Apenas uma tentativa por IP!</p>
            <input type="text" id="playerName" placeholder="Seu nome" maxlength="15">
            <button id="startBtn" onclick="window.gameApp.startLogin()">ENTRAR NO JOGO</button>
            <p id="loginLoadingStatus" class="hidden" style="margin-top:10px;">Verificando...</p>
            <div class="instructions">Pressione ESPAÇO ou CLIQUE para voar</div>
        </div>

        <!-- Tela do Jogo -->
        <div id="gameCard" class="card hidden" style="padding: 10px;">
            <div id="game-container">
                <div class="game-ui">
                    <div class="ui-item">Score: <span id="score">0</span></div>
                    <div class="ui-item">Tempo: <span id="timer">60</span>s</div>
                </div>
                <canvas id="game" width="320" height="480"></canvas>
            </div>
        </div>

        <!-- Tela de Resultado/Ranking -->
        <div id="resultCard" class="card hidden">
            <h1>Fim de Jogo!</h1>
            <p id="alreadyPlayedMessage" class="hidden">Você já realizou sua jogada única!</p>
            <div style="font-size: 48px; margin: 20px 0;" id="finalScore">0</div>
            <p>Sua pontuação final</p>
            
            <h2 style="margin-top: 20px; font-size: 18px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">TOP 10 RANKING</h2>
            <ul id="rankingList" class="ranking-list">
                <!-- Preenchido via JS -->
            </ul>
            
            <button id="resetBtn" onclick="location.reload()" style="margin-top: 20px; background-color: var(--border-color);">VOLTAR AO INÍCIO</button>
        </div>
    </div>

    <script>
        window.gameApp = {
            // Configurações Supabase (Mantidas do original)
            SUPABASE_URL: "https://kbskbmxficpuxwlwlkfq.supabase.co/rest/v1/",
            SUPABASE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtic2tibXhmaWNwdXh3bHdsa2ZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjY3MjYsImV4cCI6MjA5NzkwMjcyNn0.Was5NDt1Ch0WR0HWQrd59ERXeZWRklqrdHR8Z7x-F1E",
            
            supabaseClient: null,

            // Estado do Jogo
            playerName: "",
            playerIP: "",
            score: 0,
            timeLeft: 60,
            timerInterval: null,
            gameLoop: null,
            
            canvas: null,
            ctx: null,
            isGameRunning: false,
            hasAlreadyPlayed: false,

            // Flappy Bird Physics & Assets
            bird: {
                x: 50,
                y: 150,
                width: 34,
                height: 24,
                gravity: 0.6,
                lift: -8,
                velocity: 0
            },
            pipes: [],
            pipeWidth: 50,
            pipeGap: 120,
            frameCounter: 0,

            init() {
                this.canvas = document.getElementById("game");
                this.ctx = this.canvas.getContext("2d");
                this.supabaseClient = window.supabase.createClient(this.SUPABASE_URL, this.SUPABASE_KEY);
                this.initializeApp();
            },

            async initializeApp() {
                try {
                    await this.getPlayerIP();
                    const alreadyPlayed = await this.checkIfIPAlreadyPlayed();
                    
                    if (alreadyPlayed) {
                        this.hasAlreadyPlayed = true;
                        this.showCard("resultCard");
                        document.getElementById("alreadyPlayedMessage").classList.remove("hidden");
                        document.getElementById("finalScore").textContent = "—";
                        await this.loadRanking();
                    } else {
                        this.showCard("loginCard");
                    }
                } catch (err) {
                    console.error("Erro ao inicializar app:", err);
                    this.showCard("loginCard");
                }
            },

            async getPlayerIP() {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    this.playerIP = data.ip;
                } catch (err) {
                    console.error("Erro ao obter IP:", err);
                    this.playerIP = "unknown-" + Math.random().toString(36).substr(2, 9);
                }
            },

            async checkIfIPAlreadyPlayed() {
                try {
                    const { data, error } = await this.supabaseClient
                        .from("ranking_snake") // Usando a mesma tabela conforme solicitado
                        .select("*")
                        .eq("ip_address", this.playerIP)
                        .limit(1);

                    return data && data.length > 0;
                } catch (err) {
                    return false;
                }
            },

            async startLogin() {
                const name = document.getElementById("playerName").value.trim();
                if (name.length < 2) {
                    alert("Por favor, digite um nome válido (mínimo 2 caracteres).");
                    return;
                }

                this.playerName = name;
                document.getElementById("startBtn").disabled = true;
                document.getElementById("loginLoadingStatus").classList.remove("hidden");

                this.hasAlreadyPlayed = await this.checkIfIPAlreadyPlayed();

                if (this.hasAlreadyPlayed) {
                    this.showCard("resultCard");
                    document.getElementById("alreadyPlayedMessage").classList.remove("hidden");
                    await this.loadRanking();
                } else {
                    this.showCard("gameCard");
                    this.startGame();
                }
            },

            showCard(cardId) {
                document.getElementById("loadingCard").classList.add("hidden");
                document.getElementById("loginCard").classList.add("hidden");
                document.getElementById("gameCard").classList.add("hidden");
                document.getElementById("resultCard").classList.add("hidden");
                document.getElementById(cardId).classList.remove("hidden");
            },

            startGame() {
                // Reset Bird
                this.bird.y = 150;
                this.bird.velocity = 0;
                this.pipes = [];
                this.score = 0;
                this.timeLeft = 60;
                this.frameCounter = 0;
                this.isGameRunning = true;
                
                document.getElementById("score").textContent = this.score;
                document.getElementById("timer").textContent = this.timeLeft;

                clearInterval(this.timerInterval);
                cancelAnimationFrame(this.gameLoop);

                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    document.getElementById("timer").textContent = this.timeLeft;
                    if (this.timeLeft <= 0) {
                        this.finishGame();
                    }
                }, 1000);

                this.loop();
            },

            jump() {
                if (this.isGameRunning) {
                    this.bird.velocity = this.bird.lift;
                }
            },

            addPipe() {
                const minHeight = 50;
                const maxHeight = this.canvas.height - this.pipeGap - minHeight;
                const height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                
                this.pipes.push({
                    x: this.canvas.width,
                    top: height,
                    bottom: this.canvas.height - (height + this.pipeGap),
                    passed: false
                });
            },

            update() {
                if (!this.isGameRunning) return;

                // Bird Physics
                this.bird.velocity += this.bird.gravity;
                this.bird.y += this.bird.velocity;

                // Ground/Ceiling Collision
                if (this.bird.y + this.bird.height > this.canvas.height || this.bird.y < 0) {
                    this.finishGame();
                }

                // Pipe Logic
                if (this.frameCounter % 100 === 0) {
                    this.addPipe();
                }

                for (let i = this.pipes.length - 1; i >= 0; i--) {
                    let p = this.pipes[i];
                    p.x -= 2;

                    // Collision Detection
                    if (
                        this.bird.x < p.x + this.pipeWidth &&
                        this.bird.x + this.bird.width > p.x &&
                        (this.bird.y < p.top || this.bird.y + this.bird.height > this.canvas.height - p.bottom)
                    ) {
                        this.finishGame();
                    }

                    // Score point
                    if (!p.passed && p.x + this.pipeWidth < this.bird.x) {
                        p.passed = true;
                        this.score++;
                        document.getElementById("score").textContent = this.score;
                    }

                    // Remove off-screen pipes
                    if (p.x + this.pipeWidth < 0) {
                        this.pipes.splice(i, 1);
                    }
                }

                this.frameCounter++;
            },

            draw() {
                // Clear Canvas
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                // Draw Bird (Yellow Box for simplicity, but looks like a bird)
                this.ctx.fillStyle = "#f1c40f";
                this.ctx.fillRect(this.bird.x, this.bird.y, this.bird.width, this.bird.height);
                // Eye
                this.ctx.fillStyle = "black";
                this.ctx.fillRect(this.bird.x + 22, this.bird.y + 5, 4, 4);
                // Beak
                this.ctx.fillStyle = "#e67e22";
                this.ctx.fillRect(this.bird.x + 30, this.bird.y + 10, 8, 6);

                // Draw Pipes
                this.ctx.fillStyle = "#2ecc71";
                this.pipes.forEach(p => {
                    // Top pipe
                    this.ctx.fillRect(p.x, 0, this.pipeWidth, p.top);
                    this.ctx.strokeStyle = "#27ae60";
                    this.ctx.lineWidth = 2;
                    this.ctx.strokeRect(p.x, 0, this.pipeWidth, p.top);
                    
                    // Bottom pipe
                    this.ctx.fillRect(p.x, this.canvas.height - p.bottom, this.pipeWidth, p.bottom);
                    this.ctx.strokeRect(p.x, this.canvas.height - p.bottom, this.pipeWidth, p.bottom);
                });
            },

            loop() {
                this.update();
                this.draw();
                if (this.isGameRunning) {
                    this.gameLoop = requestAnimationFrame(() => this.loop());
                }
            },

            async finishGame() {
                if (!this.isGameRunning) return;
                this.isGameRunning = false;

                clearInterval(this.timerInterval);
                cancelAnimationFrame(this.gameLoop);

                this.showCard("resultCard");
                document.getElementById("finalScore").textContent = this.score;
                
                await this.saveScore();
                await this.loadRanking();
            },

            async saveScore() {
                try {
                    await this.supabaseClient.from("ranking_snake").insert([
                        { 
                            nome: this.playerName, 
                            score: this.score,
                            ip_address: this.playerIP
                        }
                    ]);
                } catch (err) {
                    console.error("Erro ao salvar score:", err);
                }
            },

            async loadRanking() {
                const list = document.getElementById("rankingList");
                list.innerHTML = "<p style='text-align: center; color: #8b949e;'>Carregando ranking...</p>";

                try {
                    const { data, error } = await this.supabaseClient
                        .from("ranking_snake")
                        .select("*")
                        .order("score", { ascending: false })
                        .limit(10);

                    if (error) throw error;

                    list.innerHTML = "";
                    if (data && data.length > 0) {
                        data.forEach((player, index) => {
                            const li = document.createElement("li");
                            const medal = index === 0 ? "🥇 " : index === 1 ? "🥈 " : index === 2 ? "🥉 " : "";
                            li.innerHTML = `
                                <span>${medal}${player.nome}</span>
                                <span class="score-val">${player.score} pts</span>
                            `;
                            list.appendChild(li);
                        });
                    } else {
                        list.innerHTML = "<li style='text-align: center; color: #8b949e;'>Nenhum score registrado ainda.</li>";
                    }
                } catch (err) {
                    list.innerHTML = "<li style='text-align: center; color: var(--danger-color);'>Erro ao carregar o ranking.</li>";
                }
            }
        };

        // Controles
        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                window.gameApp.jump();
            }
        });

        document.getElementById("game-container").addEventListener("mousedown", (e) => {
            window.gameApp.jump();
        });

        document.getElementById("game-container").addEventListener("touchstart", (e) => {
            e.preventDefault();
            window.gameApp.jump();
        });

        document.addEventListener("DOMContentLoaded", () => {
            window.gameApp.init();
        });
    </script>
</body>
</html>
