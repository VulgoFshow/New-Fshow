<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum Virtual - Edição Especial</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
/* =====================================================
   ÁLBUM PREMIUM
===================================================== */

.album-container{
    width:100%;
    display:flex;
    gap:35px;

    overflow-x:auto;
    overflow-y:hidden;

    scroll-snap-type:x mandatory;

    padding:30px 25px 50px;

    scrollbar-width:none;

    position:relative;
}

.album-container::-webkit-scrollbar{
    display:none;
}

/* =====================================================
   PÁGINAS
===================================================== */

.page{
    flex:0 0 92%;

    min-height:820px;

    scroll-snap-align:center;

    position:relative;

    padding:28px;

    border-radius:32px;

    display:grid;
    grid-template-columns:repeat(2,1fr);

    gap:18px;

    align-content:start;

    overflow:hidden;

    backdrop-filter:blur(10px);

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,.92),
            rgba(245,245,245,.96)
        );

    border:
        1px solid rgba(255,255,255,.8);

    box-shadow:
        0 30px 60px rgba(0,0,0,.35),
        0 10px 20px rgba(0,0,0,.15),
        inset 0 0 0 1px rgba(255,255,255,.7),
        inset 0 0 50px rgba(0,0,0,.03);
}

/* brilho superior */

.page::before{
    content:"";

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:180px;

    background:
        linear-gradient(
            rgba(255,255,255,.6),
            transparent
        );

    pointer-events:none;
}

/* sombra lateral */

.page::after{
    content:"";

    position:absolute;

    top:0;
    right:0;

    width:40px;
    height:100%;

    background:
        linear-gradient(
            to left,
            rgba(0,0,0,.08),
            transparent
        );

    pointer-events:none;
}

/* =====================================================
   CABEÇALHO DA PÁGINA
===================================================== */

.page-title{
    grid-column:span 2;

    text-align:center;

    font-size:28px;

    font-weight:900;

    letter-spacing:3px;

    text-transform:uppercase;

    color:#2d2d2d;

    padding-bottom:15px;

    margin-bottom:8px;

    border-bottom:4px solid rgba(0,0,0,.08);

    position:relative;
}

.page-title::after{
    content:"";

    position:absolute;

    bottom:-4px;
    left:50%;

    transform:translateX(-50%);

    width:120px;
    height:4px;

    border-radius:999px;

    background:
        linear-gradient(
            90deg,
            #ffd700,
            #ffef85,
            #ffd700
        );
}

/* =====================================================
   SLOT DAS FIGURINHAS
===================================================== */

.slot{
    aspect-ratio:2.5/3.5;

    position:relative;

    border-radius:16px;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    transition:
        transform .3s ease,
        box-shadow .3s ease;

    background:
        linear-gradient(
            135deg,
            rgba(240,240,240,.95),
            rgba(225,225,225,.95)
        );

    border:3px dashed rgba(120,120,120,.35);

    box-shadow:
        inset 0 0 20px rgba(0,0,0,.05);
}

/* efeito hover */

.slot:hover{
    transform:
        translateY(-4px)
        scale(1.02);

    box-shadow:
        0 12px 25px rgba(0,0,0,.18);
}

/* número */

.slot::before{
    content:attr(data-number);

    position:absolute;

    top:8px;
    left:10px;

    font-size:13px;

    font-weight:900;

    color:#666;

    z-index:5;
}

/* texto padrão */

.slot::after{
    content:"COLE A FIGURINHA";

    position:absolute;

    text-align:center;

    font-size:11px;

    font-weight:700;

    color:#9a9a9a;

    letter-spacing:1px;
}

/* =====================================================
   FIGURINHA COLADA
===================================================== */

.slot.filled{
    border:none;

    background:white;

    box-shadow:
        0 12px 25px rgba(0,0,0,.22),
        0 3px 8px rgba(0,0,0,.15);
}

.slot.filled::after{
    display:none;
}

/* brilho da figurinha */

.slot.filled::before{
    z-index:10;

    color:white;

    text-shadow:
        0 2px 5px rgba(0,0,0,.8);
}

.sticker-img{
    width:100%;
    height:100%;

    object-fit:cover;

    transition:transform .4s ease;
}

.slot.filled:hover .sticker-img{
    transform:scale(1.05);
}

/* =====================================================
   INDICADOR DE DESLIZAR
===================================================== */

.page:first-child .page-title::before{
    content:"← deslize →";

    position:absolute;

    top:-18px;
    right:0;

    font-size:12px;

    letter-spacing:1px;

    color:#777;
}

/* =====================================================
   RESPONSIVO
===================================================== */

@media(max-width:768px){

    .album-container{
        padding:18px;
        gap:22px;
    }

    .page{
        flex:0 0 92%;
        min-height:auto;
        padding:18px;
        border-radius:24px;
    }

    .page-title{
        font-size:20px;
    }

    .slot{
        border-radius:12px;
    }
 </style>
</head>
<body>

<div class="bg-fixed"></div>

<div class="loading-screen" id="loadingScreen">

</div>

<header>

    <div class="stats-bar">
        <span>Coladas: <b id="count">0</b>/22</span>

    <div style="display:flex;gap:10px;">
        <button class="btn-main" onclick="openModal()">

<div class="album-container">

    <!-- Página Esquerda -->
    <div class="page" id="leftPage">

        <div class="page-title">

        <div class="slot" data-number="01"></div>

    <div class="page" id="rightPage">

        <div class="slot" data-number="12"></div>

        <div class="slot" data-number="15"></div>

<!-- Modal -->

<div class="modal" id="modal">

    <div class="modal-content">

        <h2>Nova Figurinha</h2>

        <p>Digite o código da figurinha para colar</p>

        <input
            type="text"
            id="stickerCode"
            class="modal-input"
            placeholder="Ex: ABC123"
        >

        <div style="display:flex;gap:10px;margin-top:15px;">

            <button
                class="btn-main"
                style="flex:1;"
                onclick="confirmSticker()"
            >
                CONFIRMAR
            </button>

            <button
                class="btn-main"
                style="flex:1;background:#991b1b;"
                onclick="closeModal()"
            >
                CANCELAR
            </button>

        </div>

        <p
            id="modalMsg"
            style="margin-top:15px;font-weight:600;font-size:14px;"
        ></p>

    </div>

</div>

</body>

<script>
    // ================= CONFIGURAÇÕES APPWRITE =================
    const APPWRITE_ENDPOINT = "https://nyc.cloud.appwrite.io/v1";
    const APPWRITE_PROJECT_ID = "6a07b38c00004e1645ee";
    const APPWRITE_DB_ID = "6a07b77b0016f7c90141";
    const APPWRITE_COLLECTION_ID = "profiles";

    // ================= CONSTANTES DAS FIGURINHAS =================
    // Você pode alterar os links das imagens aqui
    const STICKERS_DATA = {
        'P': { slot: 1, url: 'https://i.ibb.co/DH4Hb5z7/Picsart-26-06-15-22-04-31-956.webp' },
        'FIG-02': { slot: 2, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-02' },
        'FIG-03': { slot: 3, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-03' },
        'FIG-04': { slot: 4, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-04' },
        'FIG-05': { slot: 5, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-05' },
        'FIG-06': { slot: 6, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-06' },
        'FIG-07': { slot: 7, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-07' },
        'FIG-08': { slot: 8, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-08' },
        'FIG-09': { slot: 9, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-09' },
        'FIG-10': { slot: 10, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-10' },
        'FIG-11': { slot: 11, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-11' },
        'FIG-12': { slot: 12, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-12' },
        'FIG-13': { slot: 13, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-13' },
        'FIG-14': { slot: 14, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-14' },
        'FIG-15': { slot: 15, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-15' },
        'FIG-16': { slot: 16, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-16' },
        'FIG-17': { slot: 17, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-17' },
        'FIG-18': { slot: 18, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-18' },
        'FIG-19': { slot: 19, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-19' },
        'FIG-20': { slot: 20, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-20' },
        'FIG-21': { slot: 21, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-21' },
        'FIG-22': { slot: 22, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-22' }
    };

    // ================= APPWRITE SETUP =================
    const client = new Appwrite.Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
    const account = new Appwrite.Account(client);
    const databases = new Appwrite.Databases(client);

    let currentUser = null;
    let ownedStickers = [];

    // ================= INICIALIZAÇÃO =================
async function init() {
    try {
        currentUser = await account.get();
        await loadAlbum();
        renderSlots();
        updateStats();
        document.getElementById('loadingScreen').style.display = 'none';
    } catch (error) {
        // Exibe o erro real no console do F12
        console.error("Erro detalhado do Appwrite:", error);
        
        // Alerta na tela para você ver o código do erro (ex: 401, 403)
        alert("Erro no login: " + error.message + " (Código: " + error.code + ")");
        
        // Aguarda 5 segundos antes de redirecionar para você conseguir ler
        setTimeout(() => {
            window.location.replace('/login.html');
        }, 5000);
    }
}

async function loadAlbum() {
    try {
        const doc = await databases.getDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id);
        ownedStickers = doc.stickers || [];
    } catch (error) {
        console.log("Criando novo registro de álbum...");
        try {
            await databases.createDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                userId: currentUser.$id,
                stickers: [],
                nickname: currentUser.name || "Colecionador" 
            });
            ownedStickers = [];
        } catch (createError) {
            console.error("Erro crítico ao criar documento:", createError);
            throw createError; 
        }
    }
}

    function renderSlots() {
        const left = document.getElementById('leftPage');
        const right = document.getElementById('rightPage');
        
        // Limpar slots mas manter título
        const titles = document.querySelectorAll('.page-title');
        left.innerHTML = ''; left.appendChild(titles[0]);
        right.innerHTML = ''; right.appendChild(titles[1]);

        // Criar os 22 slots baseados na numeração
        for(let i=1; i<=22; i++) {
const slot = document.createElement('div');
slot.className = 'slot';
slot.id = `slot-${i}`;
slot.setAttribute('data-number', String(i).padStart(2, '0'));

            const stickerCode = Object.keys(STICKERS_DATA).find(key => STICKERS_DATA[key].slot === i);
            
            if(stickerCode && ownedStickers.includes(stickerCode)) {
slot.classList.add('filled');
slot.innerHTML = `
    <img
        src="${STICKERS_DATA[stickerCode].url}"
        class="sticker-img"
        alt="${stickerCode}"
        loading="lazy"
    >
`;

            if(i <= 11) left.appendChild(slot);
            else right.appendChild(slot);
        }
    }

    // ================= LÓGICA DE COLAR =================
    function openModal() {
        document.getElementById('modal').classList.add('active');
        document.getElementById('stickerCode').value = '';
        document.getElementById('modalMsg').textContent = '';
        document.getElementById('stickerCode').focus();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    async function confirmSticker() {
        const input = document.getElementById('stickerCode');
        const code = input.value.toUpperCase().trim();
        const msg = document.getElementById('modalMsg');

        // 1. Verificar se o código existe na constante STICKERS_DATA
        if(!STICKERS_DATA[code]) {
            msg.textContent = "❌ Código inválido! Verifique o código digitado.";
            msg.style.color = "#991b1b";
            return;
        }

        // 2. Verificar se já colou
        if(ownedStickers.includes(code)) {
            msg.textContent = "⚠️ Você já colou esta figurinha!";
            msg.style.color = "#b45309";
            return;
        }

        // 3. Salvar no Appwrite
        try {
            msg.textContent = "⏳ Colando...";
            msg.style.color = "#4b0082";
            
            const newList = [...ownedStickers, code];
            await databases.updateDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                stickers: newList
            });

            ownedStickers = newList;
            
            // 4. Animar na interface usando o slot definido na constante
            const stickerInfo = STICKERS_DATA[code];
            const slot = document.getElementById(`slot-${stickerInfo.slot}`);
            
            if(slot) {
                slot.classList.add('filled');
                slot.innerHTML = `<img src="${stickerInfo.url}" class="sticker-img">`;
            }
            
            updateStats();
            msg.textContent = "✅ FIGURINHA COLADA COM SUCESSO!";
            msg.style.color = "#15803d";
            
            setTimeout(closeModal, 1500);

        } catch (error) {
            console.error(error);
            msg.textContent = "❌ Erro ao salvar. Tente novamente.";
            msg.style.color = "#991b1b";
        }
    }

    function updateStats() {
        const count = ownedStickers.length;
        document.getElementById('count').textContent = count;
        document.getElementById('percent').textContent = Math.round((count/22)*100) + "%";
    }

    function logout() {
        account.deleteSession('current').then(() => window.location.replace('/login.html'));
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
