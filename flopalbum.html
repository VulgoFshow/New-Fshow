<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum Virtual - Edição Revista Pastel</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* =====================================================
           VARIÁVEIS (TEMA PASTEL)
        ===================================================== */
        :root {
            --pastel-pink: #f8c8dc;
            --pastel-pink-dark: #f4a6c1;
            --pastel-blue: #aec6cf;
            --pastel-blue-dark: #8db3e2;
            --text-main: #5c6b73;
            --text-light: #8ba1ab;
            --glass-bg: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* =====================================================
           FUNDO (REVISTA)
        ===================================================== */
        body {
            background-image: url('https://i.ibb.co/5XGKjxVC/file-000000007120720e86b11b00a56ecbc5-2.jpg');
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* =====================================================
           TELA DE CARREGAMENTO
        ===================================================== */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--pastel-pink);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* =====================================================
           MENU SUPERIOR FIXO (ESTILO REVISTA)
        ===================================================== */
        .magazine-top-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 2px solid white;
            z-index: 100;
            width: max-content;
            max-width: 95%;
        }

        .stats-pill {
            font-weight: 700;
            font-size: 14px;
            color: var(--pastel-blue-dark);
            padding: 0 15px;
            border-left: 2px dashed var(--pastel-pink);
            border-right: 2px dashed var(--pastel-pink);
            white-space: nowrap;
        }

        .stats-pill b {
            color: var(--pastel-pink-dark);
            font-size: 16px;
        }

        .btn-pastel {
            background: var(--pastel-pink);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(244, 166, 193, 0.4);
            white-space: nowrap;
        }

        .btn-pastel:hover {
            transform: translateY(-2px);
            background: var(--pastel-pink-dark);
            box-shadow: 0 6px 15px rgba(244, 166, 193, 0.6);
        }

        .btn-pastel.blue {
            background: var(--pastel-blue);
            box-shadow: 0 4px 10px rgba(141, 179, 226, 0.4);
        }

        .btn-pastel.blue:hover {
            background: var(--pastel-blue-dark);
            box-shadow: 0 6px 15px rgba(141, 179, 226, 0.6);
        }

        /* =====================================================
           ÁLBUM (PÁGINAS TRANSPARENTES)
        ===================================================== */
        .album-container {
            width: 100%;
            display: flex;
            gap: 40px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            padding: 120px 50px 80px;
            scrollbar-width: none;
            flex-grow: 1;
        }

        .album-container::-webkit-scrollbar { display: none; }

        .page {
            flex: 0 0 90%;
            max-width: 1000px;
            margin: 0 auto;
            scroll-snap-align: center;
            position: relative;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
            align-content: start;
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .page-title {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 38px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: white;
            -webkit-text-stroke: 1.5px var(--pastel-pink-dark);
            text-shadow: 3px 3px 0px var(--pastel-blue);
            padding-bottom: 20px;
            margin-bottom: 10px;
        }

        /* =====================================================
           SLOT DAS FIGURINHAS
        ===================================================== */
        .slot {
            aspect-ratio: 2.5 / 3.5;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border: 2px dashed var(--pastel-blue-dark);
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
        }

        .slot::before {
            content: attr(data-number);
            position: absolute;
            font-size: 45px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 1px 1px 0 var(--pastel-blue);
            z-index: 1;
        }

        .slot::after {
            content: "COLE AQUI";
            position: absolute;
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            color: var(--text-main);
            background: rgba(255,255,255,0.7);
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 2px;
            z-index: 2;
            bottom: 15px;
        }

        /* =====================================================
           FIGURINHA COLADA
        ===================================================== */
        .slot.filled {
            border: none;
            background: transparent;
            box-shadow: 
                0 15px 25px rgba(0,0,0,0.15),
                0 5px 10px rgba(0,0,0,0.1);
        }

        .slot.filled::before, 
        .slot.filled::after {
            display: none;
        }

        .sticker-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            border: 4px solid white;
            transition: transform 0.3s ease;
        }

        .slot.filled:hover .sticker-img {
            transform: scale(1.05) rotate(2deg);
        }

        /* ANIMAÇÃO DE COLAGEM */
        .paste-anim {
            animation: stampIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: center center;
        }

        @keyframes stampIn {
            0% { 
                transform: scale(2.5) rotate(-20deg); 
                opacity: 0; 
                filter: drop-shadow(0 30px 30px rgba(0,0,0,0.4)); 
            }
            100% { 
                transform: scale(1) rotate(0deg); 
                opacity: 1; 
                filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); 
            }
        }

        /* =====================================================
           MODAL
        ==================================================== */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 200, 220, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 4px solid var(--pastel-blue);
            transform: translateY(30px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-content h2 {
            color: var(--pastel-pink-dark);
            font-weight: 800;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .modal-content p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .modal-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--pastel-blue);
            border-radius: 15px;
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s ease;
            color: var(--text-main);
            letter-spacing: 2px;
            background: #fdfdfd;
        }

        .modal-input:focus {
            border-color: var(--pastel-pink-dark);
            box-shadow: 0 0 15px rgba(244, 166, 193, 0.4);
            transform: scale(1.02);
        }

        /* =====================================================
           RESPONSIVIDADE (MOBILE)
        ===================================================== */
        @media(max-width: 768px) {
            .magazine-top-bar {
                top: 15px;
                padding: 10px 15px;
                gap: 10px;
            }
            .btn-pastel {
                padding: 8px 12px;
                font-size: 11px;
            }
            .album-container {
                padding: 100px 15px 40px;
            }
            .page {
                flex: 0 0 95%;
                padding: 10px;
                grid-template-columns: repeat(2, 1fr);
            }
            .page-title {
                font-size: 28px;
            }
            .slot::before {
                font-size: 35px;
            }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight: 700; letter-spacing: 2px; color: white;">CARREGANDO REVISTA...</p>
</div>

<div class="magazine-top-bar">
    <button class="btn-pastel" onclick="openModal()">Colar Figurinha</button>
    
    <div class="stats-pill">
        Coladas: <b id="count">0</b>/22
    </div>

    <button class="btn-pastel blue" onclick="logout()">Sair</button>
</div>

<div class="album-container">

    <div class="page" id="leftPage">
        <div class="page-title">Página 1</div>
    </div>

    <div class="page" id="rightPage">
        <div class="page-title">Página 2</div>
    </div>

</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2>Nova Figurinha</h2>
        <p>Digite o código para colar na revista</p>

        <input type="text" id="stickerCode" class="modal-input" placeholder="EX: FIG-02">

        <div style="display:flex; gap:10px; margin-top:25px;">
            <button class="btn-pastel" style="flex:1;" onclick="confirmSticker()">Confirmar</button>
            <button class="btn-pastel blue" style="flex:1;" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ================= CONFIGURAÇÕES APPWRITE =================
    const APPWRITE_ENDPOINT = "https://nyc.cloud.appwrite.io/v1";
    const APPWRITE_PROJECT_ID = "6a07b38c00004e1645ee";
    const APPWRITE_DB_ID = "6a07b77b0016f7c90141";
    const APPWRITE_COLLECTION_ID = "profiles";

    // ================= CONSTANTES DAS FIGURINHAS =================
    const STICKERS_DATA = {
        'P': { slot: 1, url: 'https://i.ibb.co/DH4Hb5z7/Picsart-26-06-15-22-04-31-956.webp' },
        'FIG-02': { slot: 2, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-02' },
        'FIG-03': { slot: 3, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-03' },
        'FIG-04': { slot: 4, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-04' },
        'FIG-05': { slot: 5, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-05' },
        'FIG-06': { slot: 6, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-06' },
        'FIG-07': { slot: 7, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-07' },
        'FIG-08': { slot: 8, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-08' },
        'FIG-09': { slot: 9, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-09' },
        'FIG-10': { slot: 10, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-10' },
        'FIG-11': { slot: 11, url: 'https://via.placeholder.com/200x280/f4a6c1/ffffff?text=FIG-11' },
        'FIG-12': { slot: 12, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-12' },
        'FIG-13': { slot: 13, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-13' },
        'FIG-14': { slot: 14, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-14' },
        'FIG-15': { slot: 15, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-15' },
        'FIG-16': { slot: 16, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-16' },
        'FIG-17': { slot: 17, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-17' },
        'FIG-18': { slot: 18, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-18' },
        'FIG-19': { slot: 19, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-19' },
        'FIG-20': { slot: 20, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-20' },
        'FIG-21': { slot: 21, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-21' },
        'FIG-22': { slot: 22, url: 'https://via.placeholder.com/200x280/8db3e2/ffffff?text=FIG-22' }
    };

    // ================= APPWRITE SETUP =================
    const client = new Appwrite.Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
    const account = new Appwrite.Account(client);
    const databases = new Appwrite.Databases(client);

    let currentUser = null;
    let ownedStickers = [];

    // ================= INICIALIZAÇÃO PROTEGIDA =================
    async function init() {
        console.log("Iniciando carregamento...");
        try {
            currentUser = await account.get();
            await loadAlbum();
            hideLoadingScreen(); // Só remove a tela de carregamento se der tudo certo
        } catch (error) {
            console.warn("⚠️ Usuário não autenticado. Redirecionando para a página de login.");
            window.location.replace('/login.html'); // Envia direto para o login sem renderizar o modo teste
        }
    }

    function hideLoadingScreen() {
        renderSlots();
        updateStats();
        const loader = document.getElementById('loadingScreen');
        if(loader) {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    }

    async function loadAlbum() {
        try {
            const doc = await databases.getDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id);
            ownedStickers = doc.stickers || [];
        } catch (error) {
            try {
                await databases.createDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                    userId: currentUser.$id,
                    stickers: [],
                    nickname: currentUser.name || "Colecionador" 
                });
                ownedStickers = [];
            } catch (createError) {
                console.error("Erro crítico ao criar documento:", createError);
                throw createError; 
            }
        }
    }

    function renderSlots() {
        const left = document.getElementById('leftPage');
        const right = document.getElementById('rightPage');
        
        const titles = document.querySelectorAll('.page-title');
        left.innerHTML = ''; left.appendChild(titles[0]);
        right.innerHTML = ''; right.appendChild(titles[1]);

        for(let i=1; i<=22; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.id = `slot-${i}`;
            slot.setAttribute('data-number', String(i).padStart(2, '0'));

            const stickerCode = Object.keys(STICKERS_DATA).find(key => STICKERS_DATA[key].slot === i);
            
            if(stickerCode && ownedStickers.includes(stickerCode)) {
                slot.classList.add('filled');
                slot.innerHTML = `
                    <img
                        src="${STICKERS_DATA[stickerCode].url}"
                        class="sticker-img"
                        alt="${stickerCode}"
                        loading="lazy"
                    >
                `;
            }

            if(i <= 11) left.appendChild(slot);
            else right.appendChild(slot);
        }
    }

    // ================= LÓGICA DE COLAR E ANIMAÇÃO =================
    function openModal() {
        document.getElementById('modal').classList.add('active');
        document.getElementById('stickerCode').value = '';
        document.getElementById('stickerCode').focus();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    async function confirmSticker() {
        const input = document.getElementById('stickerCode');
        const code = input.value.toUpperCase().trim();

        if(!STICKERS_DATA[code]) {
            alert("❌ Código inválido! Verifique o que você digitou.");
            return;
        }

        if(ownedStickers.includes(code)) {
            alert("⚠️ Você já colou esta figurinha na revista!");
            return;
        }

        closeModal();
        
        const stickerInfo = STICKERS_DATA[code];
        const slot = document.getElementById(`slot-${stickerInfo.slot}`);
        
        if(slot) {
            slot.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
        }

        try {
            const newList = [...ownedStickers, code];
            await databases.updateDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                stickers: newList
            });

            ownedStickers = newList;
            updateStats();
            
            setTimeout(() => {
                if(slot) {
                    slot.classList.add('filled');
                    slot.innerHTML = `<img src="${stickerInfo.url}" class="sticker-img paste-anim">`;
                }
            }, 600);

        } catch (error) {
            console.error(error);
            alert("❌ Erro ao salvar a figurinha. Tente novamente.");
        }
    }

    function updateStats() {
        const count = ownedStickers.length;
        document.getElementById('count').textContent = count;
    }

    function logout() {
        account.deleteSession('current').then(() => window.location.replace('/login.html'));
    }

    // DISPARADOR SEGURO: Evita perder o gatilho se a página carregar rápido demais
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

    // TIMER DE SEGURANÇA: Só aciona o fallback se o usuário de fato estiver logado mas a conexão travar
    setTimeout(() => {
        const loader = document.getElementById('loadingScreen');
        if (loader && loader.style.display !== 'none' && currentUser) {
            console.warn("⏳ Tempo limite esgotado. Forçando abertura da página.");
            hideLoadingScreen();
        }
    }, 3500);
</script>

</body>
</html>
