<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum Virtual - Edição Especial</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6a07b3;
            --secondary: #00d2ff;
            --dark: #1a1a1a;
            --light: #f4f4f4;
            --gold: #ffd700;
            --paper: #fff9e6;
            --border-radius: 15px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #121212;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        /* Background Overlay */
        .bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.ibb.co/JwbxBVdq/17020fb0-692a-11f1-9692-e5d4d6a13428.png') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.4) blur(3px);
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Header */
        header {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), #4b0082);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(106, 7, 179, 0.4);
            transition: var(--transition);
        }

        .btn-main:hover { transform: translateY(-3px) scale(1.05); }

        /* Album Container (The Magazine) */
        .album-container {
            width: 95%;
            max-width: 1100px;
            margin: 20px auto;
            background: var(--paper);
            border-radius: 10px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            display: flex;
            position: relative;
            min-height: 700px;
            padding: 10px;
            border: 1px solid #ddd;
        }

        /* Center Fold Shadow */
        .album-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 100%;
            background: linear-gradient(to right, 
                rgba(0,0,0,0.1) 0%, 
                rgba(0,0,0,0.2) 40%, 
                rgba(255,255,255,0.5) 50%, 
                rgba(0,0,0,0.2) 60%, 
                rgba(0,0,0,0.1) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .page {
            flex: 1;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px;
            align-content: start;
            position: relative;
        }

        .page-title {
            grid-column: 1 / -1;
            color: #333;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Sticker Slot */
        .slot {
            aspect-ratio: 2.5/3.5;
            background: #e0e0e0;
            border: 2px dashed #bbb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: #999;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .slot.filled {
            border: none;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: glueSticker 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes glueSticker {
            0% { transform: scale(2) rotate(15deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .sticker-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: white;
            color: var(--dark);
            padding: 40px;
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(106, 7, 179, 0.5);
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 18px;
            text-align: center;
            font-weight: 700;
            text-transform: uppercase;
        }

        .modal-input:focus { outline: none; border-color: var(--primary); }

        /* Stats */
        .stats-bar {
            background: rgba(255,255,255,0.1);
            padding: 10px 30px;
            border-radius: 50px;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            gap: 20px;
        }

        .stats-bar span b { color: var(--gold); }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .album-container { flex-direction: column; min-height: auto; }
            .album-container::after { display: none; }
            .page { padding: 20px; grid-template-columns: repeat(3, 1fr); }
            .slot { font-size: 16px; }
            header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="bg-fixed"></div>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <p style="margin-top: 20px;">Abrindo Álbum...</p>
</div>

<header>
    <div class="logo">MY STICKER ALBUM</div>
    <div class="stats-bar">
        <span>Coladas: <b id="count">0</b>/22</span>
        <span>Progresso: <b id="percent">0%</b></span>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="btn-main" onclick="openModal()">COLAR FIGURINHA</button>
        <button class="btn-main" style="background: #444;" onclick="logout()">SAIR</button>
    </div>
</header>

<div class="album-container">
    <div class="page" id="leftPage">
        <div class="page-title">Página Esquerda</div>
    </div>
    <div class="page" id="rightPage">
        <div class="page-title">Página Direita</div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2>Nova Figurinha</h2>
        <p>Digite o código da figurinha para colar</p>
        <input type="text" id="stickerCode" class="modal-input" placeholder="EX: FIG-01">
        <div style="display: flex; gap: 10px;">
            <button class="btn-main" style="flex: 1;" onclick="confirmSticker()">CONFIRMAR</button>
            <button class="btn-main" style="flex: 1; background: #991b1b;" onclick="closeModal()">CANCELAR</button>
        </div>
        <p id="modalMsg" style="margin-top: 15px; font-weight: 600; font-size: 14px;"></p>
    </div>
</div>

<script>
    // ================= CONFIGURAÇÕES APPWRITE =================
    const APPWRITE_ENDPOINT = "https://nyc.cloud.appwrite.io/v1";
    const APPWRITE_PROJECT_ID = "6a07b38c00004e1645ee";
    const APPWRITE_DB_ID = "6a07b77b0016f7c90141";
    const APPWRITE_COLLECTION_ID = "profiles";

    // ================= CONSTANTES DAS FIGURINHAS =================
    // Você pode alterar os links das imagens aqui
    const STICKERS_DATA = {
        'PA-MIRA1': { slot: 1, url: 'https://i.ibb.co/DH4Hb5z7/Picsart-26-06-15-22-04-31-956.webp' },
        'FIG-02': { slot: 2, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-02' },
        'FIG-03': { slot: 3, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-03' },
        'FIG-04': { slot: 4, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-04' },
        'FIG-05': { slot: 5, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-05' },
        'FIG-06': { slot: 6, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-06' },
        'FIG-07': { slot: 7, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-07' },
        'FIG-08': { slot: 8, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-08' },
        'FIG-09': { slot: 9, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-09' },
        'FIG-10': { slot: 10, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-10' },
        'FIG-11': { slot: 11, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-11' },
        'FIG-12': { slot: 12, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-12' },
        'FIG-13': { slot: 13, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-13' },
        'FIG-14': { slot: 14, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-14' },
        'FIG-15': { slot: 15, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-15' },
        'FIG-16': { slot: 16, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-16' },
        'FIG-17': { slot: 17, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-17' },
        'FIG-18': { slot: 18, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-18' },
        'FIG-19': { slot: 19, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-19' },
        'FIG-20': { slot: 20, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-20' },
        'FIG-21': { slot: 21, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-21' },
        'FIG-22': { slot: 22, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-22' }
    };

    // ================= APPWRITE SETUP =================
    const client = new Appwrite.Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
    const account = new Appwrite.Account(client);
    const databases = new Appwrite.Databases(client);

    let currentUser = null;
    let ownedStickers = [];

    // ================= INICIALIZAÇÃO =================
    async function init() {
        try {
            currentUser = await account.get();
            await loadAlbum();
            renderSlots();
            updateStats();
            document.getElementById('loadingScreen').style.display = 'none';
        } catch (error) {
            console.error("Não logado:", error);
            window.location.replace('/login.html');
        }
    }

    async function loadAlbum() {
        try {
            const doc = await databases.getDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id);
            ownedStickers = doc.stickers || [];
        } catch (error) {
            console.log("Criando novo registro de álbum...");
            await databases.createDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                userId: currentUser.$id,
                stickers: []
            });
            ownedStickers = [];
        }
    }

    function renderSlots() {
        const left = document.getElementById('leftPage');
        const right = document.getElementById('rightPage');
        
        // Limpar slots mas manter título
        const titles = document.querySelectorAll('.page-title');
        left.innerHTML = ''; left.appendChild(titles[0]);
        right.innerHTML = ''; right.appendChild(titles[1]);

        // Criar os 22 slots baseados na numeração
        for(let i=1; i<=22; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.id = `slot-${i}`;
            slot.textContent = i;

            // Verificar se este slot tem uma figurinha correspondente já colada
            // Procuramos nos STICKERS_DATA qual código corresponde a este slot
            const stickerCode = Object.keys(STICKERS_DATA).find(key => STICKERS_DATA[key].slot === i);
            
            if(stickerCode && ownedStickers.includes(stickerCode)) {
                slot.classList.add('filled');
                slot.innerHTML = `<img src="${STICKERS_DATA[stickerCode].url}" class="sticker-img">`;
            }

            if(i <= 11) left.appendChild(slot);
            else right.appendChild(slot);
        }
    }

    // ================= LÓGICA DE COLAR =================
    function openModal() {
        document.getElementById('modal').classList.add('active');
        document.getElementById('stickerCode').value = '';
        document.getElementById('modalMsg').textContent = '';
        document.getElementById('stickerCode').focus();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    async function confirmSticker() {
        const input = document.getElementById('stickerCode');
        const code = input.value.toUpperCase().trim();
        const msg = document.getElementById('modalMsg');

        // 1. Verificar se o código existe na constante STICKERS_DATA
        if(!STICKERS_DATA[code]) {
            msg.textContent = "❌ Código inválido! Verifique o código digitado.";
            msg.style.color = "#991b1b";
            return;
        }

        // 2. Verificar se já colou
        if(ownedStickers.includes(code)) {
            msg.textContent = "⚠️ Você já colou esta figurinha!";
            msg.style.color = "#b45309";
            return;
        }

        // 3. Salvar no Appwrite
        try {
            msg.textContent = "⏳ Colando...";
            msg.style.color = "#4b0082";
            
            const newList = [...ownedStickers, code];
            await databases.updateDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                stickers: newList
            });

            ownedStickers = newList;
            
            // 4. Animar na interface usando o slot definido na constante
            const stickerInfo = STICKERS_DATA[code];
            const slot = document.getElementById(`slot-${stickerInfo.slot}`);
            
            if(slot) {
                slot.classList.add('filled');
                slot.innerHTML = `<img src="${stickerInfo.url}" class="sticker-img">`;
            }
            
            updateStats();
            msg.textContent = "✅ FIGURINHA COLADA COM SUCESSO!";
            msg.style.color = "#15803d";
            
            setTimeout(closeModal, 1500);

        } catch (error) {
            console.error(error);
            msg.textContent = "❌ Erro ao salvar. Tente novamente.";
            msg.style.color = "#991b1b";
        }
    }

    function updateStats() {
        const count = ownedStickers.length;
        document.getElementById('count').textContent = count;
        document.getElementById('percent').textContent = Math.round((count/22)*100) + "%";
    }

    function logout() {
        account.deleteSession('current').then(() => window.location.replace('/login.html'));
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
