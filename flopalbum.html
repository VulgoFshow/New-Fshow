    <style>
/* ================= ÁLBUM ESTILO REVISTA ================= */

.album-container {
    width: 95%;
    max-width: 1200px;
    margin: 20px auto;
    background: #fdf8e7;
    border-radius: 15px;
    overflow: hidden;
    display: flex;
    position: relative;
    box-shadow:
        0 25px 60px rgba(0,0,0,0.6),
        inset 0 0 50px rgba(0,0,0,0.08);
}

/* Dobra central */

.album-container::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 8px;
    height: 100%;
    background: linear-gradient(
        to right,
        rgba(0,0,0,0.25),
        rgba(255,255,255,0.9),
        rgba(0,0,0,0.25)
    );
    z-index: 10;
}

.page {
    width: 50%;
    padding: 25px;
    display: grid;

    /* 11 espaços = 2 colunas x 6 linhas */
    grid-template-columns: repeat(2, 1fr);

    gap: 18px;
    align-content: start;
    position: relative;
}

/* Página esquerda */

.page:first-child {
    background:
        linear-gradient(
            to right,
            rgba(0,0,0,0.03),
            transparent
        );
}

/* Página direita */

.page:last-child {
    background:
        linear-gradient(
            to left,
            rgba(0,0,0,0.03),
            transparent
        );
}

.page-title {
    grid-column: span 2;
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    color: #444;
    border-bottom: 3px solid #ddd;
    padding-bottom: 10px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* ================= ESPAÇOS DAS FIGURINHAS ================= */

.slot {
    position: relative;

    aspect-ratio: 2.5 / 3.5;

    background:
        repeating-linear-gradient(
            45deg,
            #ececec,
            #ececec 10px,
            #e2e2e2 10px,
            #e2e2e2 20px
        );

    border: 3px dashed #bdbdbd;
    border-radius: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden;

    transition: all .3s ease;
}

.slot:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 18px rgba(0,0,0,.15);
}

.slot::before {
    content: attr(data-number);

    position: absolute;
    top: 5px;
    left: 7px;

    font-size: 12px;
    font-weight: 800;
    color: rgba(0,0,0,.45);
}

.slot.filled {
    background: white;
    border: none;

    box-shadow:
        0 6px 18px rgba(0,0,0,.18),
        inset 0 0 0 3px #fff;
}

.sticker-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ================= MOBILE ================= */

@media (max-width: 768px) {

    .album-container {
        flex-direction: row;
        min-height: auto;
    }

    .page {
        width: 50%;
        padding: 12px;
        gap: 10px;
    }

    .page-title {
        font-size: 15px;
        letter-spacing: 1px;
    }

    .slot {
        border-radius: 6px;
    }
}
    </style>
</head>

<script>
    // ================= CONFIGURAÇÕES APPWRITE =================
    const APPWRITE_ENDPOINT = "https://nyc.cloud.appwrite.io/v1";
    const APPWRITE_PROJECT_ID = "6a07b38c00004e1645ee";
    const APPWRITE_DB_ID = "6a07b77b0016f7c90141";
    const APPWRITE_COLLECTION_ID = "profiles";

    // ================= CONSTANTES DAS FIGURINHAS =================
    // Você pode alterar os links das imagens aqui
    const STICKERS_DATA = {
        'P': { slot: 1, url: 'https://i.ibb.co/DH4Hb5z7/Picsart-26-06-15-22-04-31-956.webp' },
        'FIG-02': { slot: 2, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-02' },
        'FIG-03': { slot: 3, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-03' },
        'FIG-04': { slot: 4, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-04' },
        'FIG-05': { slot: 5, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-05' },
        'FIG-06': { slot: 6, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-06' },
        'FIG-07': { slot: 7, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-07' },
        'FIG-08': { slot: 8, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-08' },
        'FIG-09': { slot: 9, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-09' },
        'FIG-10': { slot: 10, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-10' },
        'FIG-11': { slot: 11, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-11' },
        'FIG-12': { slot: 12, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-12' },
        'FIG-13': { slot: 13, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-13' },
        'FIG-14': { slot: 14, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-14' },
        'FIG-15': { slot: 15, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-15' },
        'FIG-16': { slot: 16, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-16' },
        'FIG-17': { slot: 17, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-17' },
        'FIG-18': { slot: 18, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-18' },
        'FIG-19': { slot: 19, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-19' },
        'FIG-20': { slot: 20, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-20' },
        'FIG-21': { slot: 21, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-21' },
        'FIG-22': { slot: 22, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-22' }
    };

    // ================= APPWRITE SETUP =================
    const client = new Appwrite.Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
    const account = new Appwrite.Account(client);
    const databases = new Appwrite.Databases(client);

    let currentUser = null;
    let ownedStickers = [];

    // ================= INICIALIZAÇÃO =================
async function init() {
    try {
        currentUser = await account.get();
        await loadAlbum();
        renderSlots();
        updateStats();
        document.getElementById('loadingScreen').style.display = 'none';
    } catch (error) {
        // Exibe o erro real no console do F12
        console.error("Erro detalhado do Appwrite:", error);
        
        // Alerta na tela para você ver o código do erro (ex: 401, 403)
        alert("Erro no login: " + error.message + " (Código: " + error.code + ")");
        
        // Aguarda 5 segundos antes de redirecionar para você conseguir ler
        setTimeout(() => {
            window.location.replace('/login.html');
        }, 5000);
    }
}

async function loadAlbum() {
    try {
        const doc = await databases.getDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id);
        ownedStickers = doc.stickers || [];
    } catch (error) {
        console.log("Criando novo registro de álbum...");
        try {
            await databases.createDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                userId: currentUser.$id,
                stickers: [],
                nickname: currentUser.name || "Colecionador" 
            });
            ownedStickers = [];
        } catch (createError) {
            console.error("Erro crítico ao criar documento:", createError);
            throw createError; 
        }
    }
}

    function renderSlots() {
        const left = document.getElementById('leftPage');
        const right = document.getElementById('rightPage');
        
        // Limpar slots mas manter título
        const titles = document.querySelectorAll('.page-title');
        left.innerHTML = ''; left.appendChild(titles[0]);
        right.innerHTML = ''; right.appendChild(titles[1]);

        // Criar os 22 slots baseados na numeração
        for(let i=1; i<=22; i++) {
const slot = document.createElement('div');
slot.className = 'slot';
slot.id = `slot-${i}`;
slot.setAttribute('data-number', String(i).padStart(2, '0'));

            const stickerCode = Object.keys(STICKERS_DATA).find(key => STICKERS_DATA[key].slot === i);
            
            if(stickerCode && ownedStickers.includes(stickerCode)) {
slot.classList.add('filled');
slot.innerHTML = `
    <img
        src="${STICKERS_DATA[stickerCode].url}"
        class="sticker-img"
        alt="${stickerCode}"
        loading="lazy"
    >
`;

            if(i <= 11) left.appendChild(slot);
            else right.appendChild(slot);
        }
    }

    // ================= LÓGICA DE COLAR =================
    function openModal() {
        document.getElementById('modal').classList.add('active');
        document.getElementById('stickerCode').value = '';
        document.getElementById('modalMsg').textContent = '';
        document.getElementById('stickerCode').focus();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    async function confirmSticker() {
        const input = document.getElementById('stickerCode');
        const code = input.value.toUpperCase().trim();
        const msg = document.getElementById('modalMsg');

        // 1. Verificar se o código existe na constante STICKERS_DATA
        if(!STICKERS_DATA[code]) {
            msg.textContent = "❌ Código inválido! Verifique o código digitado.";
            msg.style.color = "#991b1b";
            return;
        }

        // 2. Verificar se já colou
        if(ownedStickers.includes(code)) {
            msg.textContent = "⚠️ Você já colou esta figurinha!";
            msg.style.color = "#b45309";
            return;
        }

        // 3. Salvar no Appwrite
        try {
            msg.textContent = "⏳ Colando...";
            msg.style.color = "#4b0082";
            
            const newList = [...ownedStickers, code];
            await databases.updateDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                stickers: newList
            });

            ownedStickers = newList;
            
            // 4. Animar na interface usando o slot definido na constante
            const stickerInfo = STICKERS_DATA[code];
            const slot = document.getElementById(`slot-${stickerInfo.slot}`);
            
            if(slot) {
                slot.classList.add('filled');
                slot.innerHTML = `<img src="${stickerInfo.url}" class="sticker-img">`;
            }
            
            updateStats();
            msg.textContent = "✅ FIGURINHA COLADA COM SUCESSO!";
            msg.style.color = "#15803d";
            
            setTimeout(closeModal, 1500);

        } catch (error) {
            console.error(error);
            msg.textContent = "❌ Erro ao salvar. Tente novamente.";
            msg.style.color = "#991b1b";
        }
    }

    function updateStats() {
        const count = ownedStickers.length;
        document.getElementById('count').textContent = count;
        document.getElementById('percent').textContent = Math.round((count/22)*100) + "%";
    }

    function logout() {
        account.deleteSession('current').then(() => window.location.replace('/login.html'));
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
