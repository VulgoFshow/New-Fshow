<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Álbum Virtual - Edição Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* =====================================================
           VARIÁVEIS E RESET
        ===================================================== */
        :root {
            --primary-color: #6a07b3;
            --secondary-color: #00d2ff;
            --gold-light: #ffef85;
            --gold-main: #ffd700;
            --gold-dark: #b8860b;
            --bg-dark: #0f0c29;
            --text-main: #2d2d2d;
            --text-light: #9a9a9a;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
            --shadow-soft: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark), #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* =====================================================
           TELA DE CARREGAMENTO
        ===================================================== */
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--gold-main);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* =====================================================
           CABEÇALHO (DASHBOARD)
        ===================================================== */
        header {
            background: rgba(15, 12, 41, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            background: linear-gradient(to right, var(--gold-light), var(--gold-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0px 4px 15px rgba(255, 215, 0, 0.3);
        }

        .stats-bar {
            display: flex;
            gap: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .stats-bar b { color: var(--gold-main); font-size: 16px; }

        .btn-main {
            background: linear-gradient(135deg, var(--gold-main), var(--gold-dark));
            color: #111;
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            text-transform: uppercase;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.5);
        }

        .btn-main:active { transform: translateY(1px); }

        .btn-danger {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.3);
        }
        
        .btn-danger:hover { box-shadow: 0 8px 20px rgba(255, 65, 108, 0.5); }

        /* =====================================================
           ÁLBUM CONTAINER E PÁGINAS
        ===================================================== */
        .album-container {
            width: 100%;
            display: flex;
            gap: 40px;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            padding: 40px 50px 80px;
            scrollbar-width: none; /* Firefox */
            flex-grow: 1;
        }

        .album-container::-webkit-scrollbar { display: none; } /* Chrome */

        .page {
            flex: 0 0 90%;
            max-width: 1000px;
            margin: 0 auto;
            min-height: 850px;
            scroll-snap-align: center;
            position: relative;
            padding: 40px;
            border-radius: 20px 40px 40px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 25px;
            align-content: start;
            
            /* Efeito de Papel Premium / Vidro */
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-left: 5px solid #e0e0e0; /* Lombada da página */
            
            box-shadow: 
                30px 30px 60px rgba(0,0,0,0.4),
                inset 20px 0 30px rgba(0,0,0,0.05), /* Sombra da dobra */
                inset -2px 0 10px rgba(255,255,255,0.8);
            
            transition: transform 0.4s ease;
        }

        /* Indicador de Deslize */
        .page:first-child::before {
            content: "← DESLIZE PARA VER MAIS →";
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.6);
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* =====================================================
           CABEÇALHO DA PÁGINA
        ===================================================== */
        .page-title {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text-main);
            padding-bottom: 20px;
            margin-bottom: 20px;
            position: relative;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .page-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 5px;
            border-radius: 10px;
            background: linear-gradient(90deg, transparent, var(--gold-main), transparent);
        }

        /* =====================================================
           SLOT DAS FIGURINHAS
        ===================================================== */
        .slot {
            aspect-ratio: 2.5 / 3.5;
            position: relative;
            border-radius: 8px; /* Bordas mais retas parecem cards reais */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: 2px dashed rgba(100, 100, 100, 0.4);
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }

        /* Número de Fundo */
        .slot::before {
            content: attr(data-number);
            position: absolute;
            font-size: 45px;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.05);
            z-index: 1;
        }

        /* Texto Padrão */
        .slot::after {
            content: "COLE AQUI";
            position: absolute;
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            color: rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            z-index: 2;
        }

        /* =====================================================
           FIGURINHA COLADA (ESTADO PREENCHIDO)
        ===================================================== */
        .slot.filled {
            border: none;
            background: white;
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.2),
                0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .slot.filled::before, 
        .slot.filled::after {
            display: none; /* Esconde os textos de fundo */
        }

        .sticker-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            z-index: 5;
        }

        /* Efeito de Holograma / Reflexo ao passar o mouse */
        .slot.filled::after {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, 
                rgba(255,255,255,0) 0%, 
                rgba(255,255,255,0.6) 50%, 
                rgba(255,255,255,0) 100%);
            transform: skewX(-25deg);
            z-index: 10;
            display: block; /* Reativa o after para o brilho */
            pointer-events: none;
            transition: none;
        }

        .slot.filled:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.3),
                0 0 20px rgba(255, 215, 0, 0.4);
            z-index: 20;
        }

        .slot.filled:hover::after {
            animation: shine 0.8s ease-in-out;
        }

        @keyframes shine {
            100% { left: 200%; }
        }

        /* =====================================================
           MODAL
        ===================================================== */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--glass-bg);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--glass-border);
            transform: translateY(30px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-content h2 {
            color: var(--text-main);
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .modal-content p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .modal-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.9);
            color: var(--primary-color);
            letter-spacing: 2px;
        }

        .modal-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(106, 7, 179, 0.2);
        }

        /* =====================================================
           RESPONSIVIDADE (MOBILE)
        ===================================================== */
        @media(max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
            
            .stats-bar {
                width: 100%;
                justify-content: center;
            }

            .album-container {
                padding: 30px 15px;
                gap: 20px;
            }

            .page {
                flex: 0 0 95%;
                padding: 25px 15px;
                grid-template-columns: repeat(2, 1fr);
                min-height: auto;
            }

            .page-title {
                font-size: 22px;
            }

            .slot::before {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <p style="margin-top:20px; font-weight: 600; letter-spacing: 2px; color: #fff;">CARREGANDO ÁLBUM...</p>
</div>

<header>
    <div class="logo">MY STICKER ALBUM</div>

    <div class="stats-bar">
        <span>Coladas: <b id="count">0</b>/22</span>
        <span>Progresso: <b id="percent">0%</b></span>
    </div>

    <div style="display:flex; gap:10px;">
        <button class="btn-main" onclick="openModal()">
            Colar Figurinha
        </button>

        <button class="btn-main btn-danger" onclick="logout()">
            Sair
        </button>
    </div>
</header>

<div class="album-container">

    <div class="page" id="leftPage">
        <div class="page-title">Página 1</div>
        </div>

    <div class="page" id="rightPage">
        <div class="page-title">Página 2</div>
        </div>

</div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h2>Nova Figurinha</h2>
        <p>Digite o código para adicionar ao álbum</p>

        <input type="text" id="stickerCode" class="modal-input" placeholder="EX: FIG-02">

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-main" style="flex:1;" onclick="confirmSticker()">Confirmar</button>
            <button class="btn-main btn-danger" style="flex:1;" onclick="closeModal()">Cancelar</button>
        </div>

        <p id="modalMsg" style="margin-top:20px; font-weight:700; font-size:14px; margin-bottom: 0;"></p>
    </div>
</div>

<script>
    // ================= CONFIGURAÇÕES APPWRITE =================
    const APPWRITE_ENDPOINT = "https://nyc.cloud.appwrite.io/v1";
    const APPWRITE_PROJECT_ID = "6a07b38c00004e1645ee";
    const APPWRITE_DB_ID = "6a07b77b0016f7c90141";
    const APPWRITE_COLLECTION_ID = "profiles";

    // ================= CONSTANTES DAS FIGURINHAS =================
    const STICKERS_DATA = {
        'P': { slot: 1, url: 'https://i.ibb.co/DH4Hb5z7/Picsart-26-06-15-22-04-31-956.webp' },
        'FIG-02': { slot: 2, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-02' },
        'FIG-03': { slot: 3, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-03' },
        'FIG-04': { slot: 4, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-04' },
        'FIG-05': { slot: 5, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-05' },
        'FIG-06': { slot: 6, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-06' },
        'FIG-07': { slot: 7, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-07' },
        'FIG-08': { slot: 8, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-08' },
        'FIG-09': { slot: 9, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-09' },
        'FIG-10': { slot: 10, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-10' },
        'FIG-11': { slot: 11, url: 'https://via.placeholder.com/200x280/6a07b3/ffffff?text=FIG-11' },
        'FIG-12': { slot: 12, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-12' },
        'FIG-13': { slot: 13, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-13' },
        'FIG-14': { slot: 14, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-14' },
        'FIG-15': { slot: 15, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-15' },
        'FIG-16': { slot: 16, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-16' },
        'FIG-17': { slot: 17, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-17' },
        'FIG-18': { slot: 18, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-18' },
        'FIG-19': { slot: 19, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-19' },
        'FIG-20': { slot: 20, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-20' },
        'FIG-21': { slot: 21, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-21' },
        'FIG-22': { slot: 22, url: 'https://via.placeholder.com/200x280/00d2ff/ffffff?text=FIG-22' }
    };

    // ================= APPWRITE SETUP =================
    const client = new Appwrite.Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT_ID);
    const account = new Appwrite.Account(client);
    const databases = new Appwrite.Databases(client);

    let currentUser = null;
    let ownedStickers = [];

    // ================= INICIALIZAÇÃO =================
    async function init() {
        try {
            currentUser = await account.get();
            await loadAlbum();
            renderSlots();
            updateStats();
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingScreen').style.display = 'none';
            }, 500);
        } catch (error) {
            console.error("Erro detalhado do Appwrite:", error);
            alert("Erro no login: " + error.message + " (Código: " + error.code + ")");
            setTimeout(() => {
                window.location.replace('/login.html');
            }, 5000);
        }
    }

    async function loadAlbum() {
        try {
            const doc = await databases.getDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id);
            ownedStickers = doc.stickers || [];
        } catch (error) {
            console.log("Criando novo registro de álbum...");
            try {
                await databases.createDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                    userId: currentUser.$id,
                    stickers: [],
                    nickname: currentUser.name || "Colecionador" 
                });
                ownedStickers = [];
            } catch (createError) {
                console.error("Erro crítico ao criar documento:", createError);
                throw createError; 
            }
        }
    }

    function renderSlots() {
        const left = document.getElementById('leftPage');
        const right = document.getElementById('rightPage');
        
        const titles = document.querySelectorAll('.page-title');
        left.innerHTML = ''; left.appendChild(titles[0]);
        right.innerHTML = ''; right.appendChild(titles[1]);

        for(let i=1; i<=22; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.id = `slot-${i}`;
            slot.setAttribute('data-number', String(i).padStart(2, '0'));

            const stickerCode = Object.keys(STICKERS_DATA).find(key => STICKERS_DATA[key].slot === i);
            
            // CORREÇÃO: Faltava fechar a chave desse IF no seu código original!
            if(stickerCode && ownedStickers.includes(stickerCode)) {
                slot.classList.add('filled');
                slot.innerHTML = `
                    <img
                        src="${STICKERS_DATA[stickerCode].url}"
                        class="sticker-img"
                        alt="${stickerCode}"
                        loading="lazy"
                    >
                `;
            }

            if(i <= 11) left.appendChild(slot);
            else right.appendChild(slot);
        }
    }

    // ================= LÓGICA DE COLAR =================
    function openModal() {
        document.getElementById('modal').classList.add('active');
        document.getElementById('stickerCode').value = '';
        document.getElementById('modalMsg').textContent = '';
        document.getElementById('stickerCode').focus();
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    async function confirmSticker() {
        const input = document.getElementById('stickerCode');
        const code = input.value.toUpperCase().trim();
        const msg = document.getElementById('modalMsg');

        if(!STICKERS_DATA[code]) {
            msg.textContent = "❌ CÓDIGO INVÁLIDO!";
            msg.style.color = "#ff4b2b";
            return;
        }

        if(ownedStickers.includes(code)) {
            msg.textContent = "⚠️ VOCÊ JÁ COLOU ESTA FIGURINHA!";
            msg.style.color = "#b8860b";
            return;
        }

        try {
            msg.textContent = "⏳ COLANDO...";
            msg.style.color = "var(--primary-color)";
            
            const newList = [...ownedStickers, code];
            await databases.updateDocument(APPWRITE_DB_ID, APPWRITE_COLLECTION_ID, currentUser.$id, {
                stickers: newList
            });

            ownedStickers = newList;
            
            const stickerInfo = STICKERS_DATA[code];
            const slot = document.getElementById(`slot-${stickerInfo.slot}`);
            
            if(slot) {
                slot.classList.add('filled');
                slot.innerHTML = `<img src="${stickerInfo.url}" class="sticker-img">`;
            }
            
            updateStats();
            msg.textContent = "✅ FIGURINHA COLADA COM SUCESSO!";
            msg.style.color = "#15803d";
            
            setTimeout(closeModal, 1500);

        } catch (error) {
            console.error(error);
            msg.textContent = "❌ ERRO AO SALVAR. TENTE NOVAMENTE.";
            msg.style.color = "#ff4b2b";
        }
    }

    function updateStats() {
        const count = ownedStickers.length;
        document.getElementById('count').textContent = count;
        document.getElementById('percent').textContent = Math.round((count/22)*100) + "%";
    }

    function logout() {
        account.deleteSession('current').then(() => window.location.replace('/login.html'));
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
