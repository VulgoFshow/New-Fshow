<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fshow - Login & Cadastro</title>
    
    <!-- Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@11.0.0"></script>

    <meta name="theme-color" content="#8A2BE2">
    
<style>
/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: radial-gradient(circle at 20% 20%, rgba(128,0,255,0.25), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255,140,0,0.25), transparent 40%),
                linear-gradient(135deg, #120018, #1d0033, #2a003d);
    background-size: 200% 200%;
    animation: gradientMove 12s ease infinite;
    background-attachment: fixed;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.main-wrapper {
    width: 100%;
    max-width: 420px;
    animation: fadeIn 0.8s ease-out;
}

.logo-fshow {
    text-align: center;
    font-size: 3rem;
    font-weight: 900;
    margin-bottom: 25px;
    letter-spacing: -2px;
    background: linear-gradient(45deg, #8000ff, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 5px 20px rgba(128,0,255,0.4));
    animation: glowLogo 3s ease-in-out infinite alternate;
}

@keyframes glowLogo {
    from { filter: drop-shadow(0 0 10px rgba(128,0,255,0.4)); }
    to { filter: drop-shadow(0 0 25px rgba(255,140,0,0.6)); }
}

.auth-card {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(128,0,255,0.3);
    border-radius: 26px;
    padding: 35px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(128,0,255,0.15);
    transition: 0.4s ease;
}

.tab-control {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    background: rgba(0,0,0,0.3);
    padding: 6px;
    border-radius: 14px;
}

.tab-btn {
    flex: 1;
    padding: 13px;
    border: none;
    background: transparent;
    color: #aaa;
    font-weight: 600;
    cursor: pointer;
    border-radius: 12px;
    transition: 0.3s;
    font-size: 0.9rem;
}

.tab-btn.active {
    background: linear-gradient(45deg, #8000ff, #ff8c00);
    color: white;
}

form {
    display: none;
    flex-direction: column;
    gap: 18px;
}

form.active {
    display: flex;
}

.field {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.field label {
    font-size: 0.75rem;
    font-weight: 700;
    background: linear-gradient(45deg, #8000ff, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-size: 1rem;
}

input::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

.btn-submit {
    margin-top: 15px;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(45deg, #8000ff, #ff8c00);
    color: white;
    font-weight: 800;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(255,140,0,0.4);
}

.btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.social-auth {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.btn-social {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.08);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: 0.3s ease;
    font-weight: 600;
}

.btn-social:hover {
    background: rgba(255, 255, 255, 0.12);
    transform: translateY(-2px);
}

.btn-discord {
    background: rgba(88, 101, 242, 0.2);
    border-color: rgba(88, 101, 242, 0.4);
}

.btn-discord:hover {
    background: rgba(88, 101, 242, 0.3);
}

.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: #888;
    font-size: 0.85rem;
}

.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
}

.message {
    padding: 12px;
    border-radius: 10px;
    font-size: 0.9rem;
    margin-bottom: 15px;
    display: none;
}

.message.active { display: block; }
.message.error { background: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; }
.message.success { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid #4caf50; }
.message.info { background: rgba(33, 150, 243, 0.2); color: #2196f3; border: 1px solid #2196f3; }

.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal.active { display: flex; }

.modal-content {
    background: rgba(20, 20, 20, 0.95);
    border: 1px solid rgba(128,0,255,0.3);
    border-radius: 26px;
    padding: 35px;
    max-width: 420px;
    width: 90%;
}

.profile-picture-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.profile-picture {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    overflow: hidden;
    border: 2px solid #8000ff;
    position: relative;
}

.profile-picture img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
}

.profile-picture.loading::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}

.file-upload {
    font-size: 0.8rem;
    color: #8000ff;
    cursor: pointer;
    text-decoration: underline;
    transition: 0.2s;
}

.file-upload:hover {
    color: #ff8c00;
}

.upload-progress {
    font-size: 0.75rem;
    color: #2196f3;
    display: none;
}

.upload-progress.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
}
</style>
</head>
<body>

<div class="main-wrapper">
    <h1 class="logo-fshow">FSHOW</h1>

    <div class="auth-card">
        <div class="tab-control">
            <button class="tab-btn active" type="button" data-tab="login">Entrar</button>
            <button class="tab-btn" type="button" data-tab="signup">Criar Conta</button>
        </div>

        <!-- LOGIN -->
        <form id="login-form" class="active">
            <div id="loginMessage" class="message"></div>
            <div class="field">
                <label>E-mail</label>
                <input type="email" id="loginEmail" placeholder="exemplo@gmail.com" required>
            </div>
            <div class="field">
                <label>Senha</label>
                <input type="password" id="loginPassword" placeholder="Sua senha" required>
            </div>
            <div style="text-align: right;">
                <a href="#" id="forgotPasswordLink" style="color: #ff8c00; font-size: 0.8rem; text-decoration: none;">Esqueceu a senha?</a>
            </div>
            <button type="button" class="btn-submit" id="loginBtn">FAZER LOGIN</button>
            
            <div class="divider">ou entre com</div>
            
            <div class="social-auth">
                <button type="button" class="btn-social" id="googleLoginBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M3.99 12.69c-.18-.66-.27-1.35-.27-2.09 0-.74.09-1.45.26-2.09V5.07H2.18C.635 7.72 0 10.24 0 12.6c0 2.36.635 4.88 2.18 7.53l3.57-2.77c.9-1.05 1.4-2.4 1.4-3.84 0-.74-.09-1.45-.26-2.09v-2.84z" fill="#FBBC05"/>
                        <path d="M12 4.75c1.77 0 3.29.61 4.53 1.6l3.36-3.36C17.45 1.09 14.97 0 12 0 7.7 0 3.99 2.47 2.18 6.07l3.57 2.77c.9-1.05 2.4-2.09 4.25-2.09z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
                <button type="button" class="btn-social btn-discord" id="discordLoginBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.419-2.157 2.419z"/>
                    </svg>
                    Discord
                </button>
            </div>
        </form>

        <!-- SIGNUP -->
        <form id="signup-form">
            <div id="signupMessage" class="message"></div>
            <div class="profile-picture-container">
                <div class="profile-picture" id="profilePicturePreview">👤</div>
                <label class="file-upload" for="avatar">Escolher foto</label>
                <input type="file" id="avatar" accept="image/*" style="display: none;">
                <div class="upload-progress" id="uploadProgress"></div>
            </div>
            <div class="field">
                <label>Nome de Usuário</label>
                <input type="text" id="signupNickname" placeholder="Seu apelido" required>
            </div>
            <div class="field">
                <label>E-mail</label>
                <input type="email" id="signupEmail" placeholder="exemplo@gmail.com" required>
            </div>
            <div class="field">
                <label>Senha</label>
                <input type="password" id="signupPassword" placeholder="Mínimo 6 caracteres" required>
            </div>
            <div class="field">
                <label>Confirmar Senha</label>
                <input type="password" id="signupPasswordConfirm" placeholder="Confirme sua senha" required>
            </div>
            <button type="button" class="btn-submit" id="signupBtn">CRIAR CONTA</button>
        </form>
    </div>
</div>

<!-- MODAL RECUPERAR SENHA -->
<div id="forgotPasswordModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 20px; color: #8000ff;">Recuperar Senha</h2>
        <div id="forgotPasswordMessage" class="message"></div>
        <div class="field">
            <label>E-mail</label>
            <input type="email" id="forgotPasswordEmail" placeholder="Seu e-mail registrado">
        </div>
        <button type="button" class="btn-submit" id="sendResetEmailBtn" style="width: 100%;">ENVIAR LINK</button>
        <button type="button" id="closeForgotModal" style="width: 100%; margin-top: 10px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 14px; padding: 16px; color: white; cursor: pointer; transition: 0.3s ease;">FECHAR</button>
    </div>
</div>

<script>
/* ================= APPWRITE CONFIG ================= */
const client = new Appwrite.Client();

client
    .setEndpoint("https://cloud.appwrite.io/v1") // Endpoint padrão (ajuste se necessário para nyc.cloud...)
    .setProject("6a07b38c00004e1645ee");

const account = new Appwrite.Account(client);
const databases = new Appwrite.Databases(client);
const storage = new Appwrite.Storage(client);

const DATABASE_ID = "6a07b77b0016f7c90141"; 
const PROFILES_COLLECTION_ID = "profiles"; 
const AVATARS_BUCKET_ID = "6a07b91a000e61c9e4b3";

// URL FIXA DO SITE PARA REDIRECIONAMENTOS
const SITE_URL = "https://www.fshow.site/";

let selectedAvatarFile = null;

/* ================= FUNÇÕES AUXILIARES ================= */

function showMsg(id, text, type) {
    const el = document.getElementById(id);
    if (el) {
        el.textContent = text;
        el.className = `message active ${type}`;
        setTimeout(() => el.classList.remove('active'), 5000);
    }
}

function toggleTabs(tab) {
    document.querySelectorAll("form").forEach(f => f.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(`${tab}-form`).classList.add("active");
    document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add("active");
}

function saveLoginTimestamp() {
    localStorage.setItem("lastLoginTime", Date.now().toString());
}

async function uploadProfilePicture(file, userId) {
    try {
        const progressEl = document.getElementById('uploadProgress');
        progressEl.classList.add('active');
        progressEl.textContent = 'Enviando foto...';

        const uploadedFile = await storage.createFile(
            AVATARS_BUCKET_ID,
            Appwrite.ID.unique(),
            file
        );

        await databases.updateDocument(
            DATABASE_ID,
            PROFILES_COLLECTION_ID,
            userId,
            { avatarFileId: uploadedFile.$id }
        );

        progressEl.textContent = 'Foto enviada!';
        setTimeout(() => progressEl.classList.remove('active'), 2000);
        return uploadedFile.$id;
    } catch (error) {
        console.error("Erro ao fazer upload da foto de perfil:", error);
        throw error;
    }
}

/* ================= EVENT LISTENERS ================= */

document.addEventListener("DOMContentLoaded", () => {
    
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.onclick = () => toggleTabs(btn.dataset.tab);
    });

    document.getElementById("avatar").onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) return showMsg("signupMessage", "Selecione uma imagem válida", "error");

        selectedAvatarFile = file;
        const reader = new FileReader();
        reader.onload = (event) => {
            const preview = document.getElementById("profilePicturePreview");
            preview.innerHTML = `<img src="${event.target.result}" alt="Preview">`;
        };
        reader.readAsDataURL(file);
    };

    // ===== LOGIN E-MAIL/SENHA =====
    document.getElementById("loginBtn").onclick = async () => {
        const email = document.getElementById("loginEmail").value;
        const pass = document.getElementById("loginPassword").value;
        if (!email || !pass) return showMsg("loginMessage", "Preencha tudo", "error");

        try {
            const loginBtn = document.getElementById("loginBtn");
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Entrando...';

            await account.createEmailPasswordSession(email, pass);
            saveLoginTimestamp();
            showMsg("loginMessage", "Sucesso! Redirecionando...", "success");
            setTimeout(() => window.location.href = SITE_URL + "index.html", 1000);
        } catch (e) {
            showMsg("loginMessage", e.message, "error");
            document.getElementById("loginBtn").disabled = false;
            document.getElementById("loginBtn").textContent = "FAZER LOGIN";
        }
    };

    // ===== LOGIN GOOGLE =====
    document.getElementById("googleLoginBtn").onclick = async () => {
        try {
            await account.createOAuth2Session(
                "google", 
                SITE_URL + "index.html", 
                SITE_URL + "login.html"
            );
        } catch (e) {
            showMsg("loginMessage", "Erro no login Google: " + e.message, "error");
        }
    };

    // ===== LOGIN DISCORD =====
    document.getElementById("discordLoginBtn").onclick = async () => {
        try {
            await account.createOAuth2Session(
                "discord", 
                SITE_URL + "index.html", 
                SITE_URL + "login.html"
            );
        } catch (e) {
            showMsg("loginMessage", "Erro no login Discord: " + e.message, "error");
        }
    };

    // ===== CADASTRO (SIGNUP) =====
    document.getElementById("signupBtn").onclick = async () => {
        const nick = document.getElementById("signupNickname").value;
        const email = document.getElementById("signupEmail").value;
        const pass = document.getElementById("signupPassword").value;
        const confirm = document.getElementById("signupPasswordConfirm").value;

        if (!nick || !email || !pass || !confirm) return showMsg("signupMessage", "Preencha tudo", "error");
        if (pass !== confirm) return showMsg("signupMessage", "Senhas não batem", "error");

        const signupBtn = document.getElementById("signupBtn");
        signupBtn.disabled = true;
        signupBtn.innerHTML = '<span class="spinner"></span>Criando...';
        
        try {
            const user = await account.create(Appwrite.ID.unique(), email, pass, nick);

            await databases.createDocument(
                DATABASE_ID,
                PROFILES_COLLECTION_ID,
                user.$id,
                { userId: user.$id, nickname: nick }
            );

            if (selectedAvatarFile) {
                await uploadProfilePicture(selectedAvatarFile, user.$id);
            }

            await account.createEmailPasswordSession(email, pass);
            saveLoginTimestamp();
            showMsg("signupMessage", "Conta criada com sucesso!", "success");
            setTimeout(() => window.location.href = SITE_URL + "index.html", 1500);
        } catch (e) {
            console.error("Erro no cadastro:", e);
            showMsg("signupMessage", e.message, "error");
            signupBtn.disabled = false;
            signupBtn.innerHTML = "CRIAR CONTA";
        }
    };

    // ===== RECUPERAR SENHA =====
    document.getElementById("forgotPasswordLink").onclick = (e) => {
        e.preventDefault();
        document.getElementById("forgotPasswordModal").classList.add("active");
    };

    document.getElementById("closeForgotModal").onclick = () => {
        document.getElementById("forgotPasswordModal").classList.remove("active");
    };

    document.getElementById("sendResetEmailBtn").onclick = async () => {
        const email = document.getElementById("forgotPasswordEmail").value;
        if (!email) return showMsg("forgotPasswordMessage", "Digite o e-mail", "error");

        try {
            await account.createRecovery(email, SITE_URL + "reset-password.html");
            showMsg("forgotPasswordMessage", "Link de recuperação enviado!", "success");
        } catch (e) {
            showMsg("forgotPasswordMessage", e.message, "error");
        }
    };
});

/* ===== VERIFICAÇÃO DE LOGIN ===== */
(async () => {
    try {
        await account.get();
        window.location.href = SITE_URL + "index.html";
    } catch (e) {
        console.log("Usuário não autenticado.");
    }
})();
</script>
</body>
</html>
