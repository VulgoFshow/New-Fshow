<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fshow - Login & Cadastro</title>
    
    <!-- Appwrite SDK -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@11.0.0"></script>

    <meta name="theme-color" content="#8A2BE2">
    
<style>
/* ===== RESET ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background: radial-gradient(circle at 20% 20%, rgba(128,0,255,0.25), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255,140,0,0.25), transparent 40%),
                linear-gradient(135deg, #120018, #1d0033, #2a003d);
    background-size: 200% 200%;
    animation: gradientMove 12s ease infinite;
    background-attachment: fixed;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.main-wrapper {
    width: 100%;
    max-width: 420px;
    animation: fadeIn 0.8s ease-out;
}

.logo-fshow {
    text-align: center;
    font-size: 3rem;
    font-weight: 900;
    margin-bottom: 25px;
    letter-spacing: -2px;
    background: linear-gradient(45deg, #8000ff, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 5px 20px rgba(128,0,255,0.4));
    animation: glowLogo 3s ease-in-out infinite alternate;
}

@keyframes glowLogo {
    from { filter: drop-shadow(0 0 10px rgba(128,0,255,0.4)); }
    to { filter: drop-shadow(0 0 25px rgba(255,140,0,0.6)); }
}

.auth-card {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(128,0,255,0.3);
    border-radius: 26px;
    padding: 35px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6),
                0 0 40px rgba(128,0,255,0.15);
    transition: 0.4s ease;
}

.tab-control {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
    background: rgba(0,0,0,0.3);
    padding: 6px;
    border-radius: 14px;
}

.tab-btn {
    flex: 1;
    padding: 13px;
    border: none;
    background: transparent;
    color: #aaa;
    font-weight: 600;
    cursor: pointer;
    border-radius: 12px;
    transition: 0.3s;
    font-size: 0.9rem;
}

.tab-btn.active {
    background: linear-gradient(45deg, #8000ff, #ff8c00);
    color: white;
}

form {
    display: none;
    flex-direction: column;
    gap: 18px;
}

form.active {
    display: flex;
}

.field {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.field label {
    font-size: 0.75rem;
    font-weight: 700;
    background: linear-gradient(45deg, #8000ff, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(0, 0, 0, 0.3);
    color: white;
    font-size: 1rem;
}

input::placeholder {
    color: rgba(255, 255, 255, 0.5);
}

.btn-submit {
    margin-top: 15px;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(45deg, #8000ff, #ff8c00);
    color: white;
    font-weight: 800;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn-submit:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(255,140,0,0.4);
}

.btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
}

.social-auth {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.btn-social {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.08);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: 0.3s ease;
    font-weight: 600;
    font-size: 0.85rem;
}

.btn-social:hover {
    background: rgba(255, 255, 255, 0.12);
    transform: translateY(-2px);
}

.btn-google { grid-column: span 2; }

.btn-discord {
    background: rgba(88, 101, 242, 0.2);
    border-color: rgba(88, 101, 242, 0.4);
}

.btn-spotify {
    background: rgba(30, 215, 96, 0.15);
    border-color: rgba(30, 215, 96, 0.3);
}

.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: #888;
    font-size: 0.85rem;
}

.divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
}

.message {
    padding: 12px;
    border-radius: 10px;
    font-size: 0.9rem;
    margin-bottom: 15px;
    display: none;
}

.message.active { display: block; }
.message.error { background: rgba(244, 67, 54, 0.2); color: #f44336; border: 1px solid #f44336; }
.message.success { background: rgba(76, 175, 80, 0.2); color: #4caf50; border: 1px solid #4caf50; }
.message.info { background: rgba(33, 150, 243, 0.2); color: #2196f3; border: 1px solid #2196f3; }

.modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.modal.active { display: flex; }

.modal-content {
    background: rgba(20, 20, 20, 0.95);
    border: 1px solid rgba(128,0,255,0.3);
    border-radius: 26px;
    padding: 35px;
    max-width: 420px;
    width: 90%;
    text-align: center;
}

.profile-picture-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.profile-picture {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem;
    overflow: hidden;
    border: 2px solid #8000ff;
    position: relative;
}

.profile-picture img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
}

.profile-picture.loading::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}

.file-upload {
    font-size: 0.8rem;
    color: #8000ff;
    cursor: pointer;
    text-decoration: underline;
    transition: 0.2s;
}

.file-upload:hover {
    color: #ff8c00;
}

.upload-progress {
    font-size: 0.75rem;
    color: #2196f3;
    display: none;
}

.upload-progress.active {
    display: block;
}

/* Styles for the Logged In Popup */
#alreadyLoggedInModal .user-info {
    margin: 20px 0;
}
#alreadyLoggedInModal .user-name {
    font-size: 1.2rem;
    font-weight: bold;
    margin-top: 10px;
}
#alreadyLoggedInModal .user-email {
    font-size: 0.9rem;
    color: #aaa;
}
#alreadyLoggedInModal .modal-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 25px;
}
#alreadyLoggedInModal .btn-secondary {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 16px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s ease;
}
#alreadyLoggedInModal .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
}
</style>
</head>

<!-- MODAL RECUPERAR SENHA -->

<script>
/* ================= APPWRITE CONFIG ================= */
const client = new Appwrite.Client();

client
    .setEndpoint("https://nyc.cloud.appwrite.io/v1") 
    .setProject("6a07b38c00004e1645ee");

const account = new Appwrite.Account(client);
const databases = new Appwrite.Databases(client);
const storage = new Appwrite.Storage(client);
const avatars = new Appwrite.Avatars(client);

const DATABASE_ID = "6a07b77b0016f7c90141"; 
const PROFILES_COLLECTION_ID = "profiles"; 
const AVATARS_BUCKET_ID = "6a07b91a000e61c9e4b3";

const SITE_URL = "https://www.fshow.site/";

let selectedAvatarFile = null;

/* ================= REDIRECIONAMENTO DINÂMICO ================= */

/**
 * Determina para qual página o usuário deve ser enviado após o login.
 * Prioriza o parâmetro 'redirect' na URL, depois o document.referrer (se for do mesmo site),
 * e finalmente a index.html.
 */
function getRedirectUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    const redirectParam = urlParams.get('redirect');
    
    if (redirectParam) {
        // Se for uma URL completa, garantir que é do mesmo domínio por segurança
        if (redirectParam.startsWith('http')) {
            try {
                const targetUrl = new URL(redirectParam);
                if (targetUrl.hostname === window.location.hostname) {
                    return redirectParam;
                }
            } catch (e) {
                console.error("URL de redirecionamento inválida");
            }
        } else {
            // Se for um caminho relativo
            return redirectParam.startsWith('/') ? redirectParam : '/' + redirectParam;
        }
    }
    
    // Se vier de outra página do site (que não seja a própria login.html)
    if (document.referrer && 
        document.referrer !== window.location.href && 
        document.referrer.includes(window.location.hostname) &&
        !document.referrer.includes('login.html')) {
        return document.referrer;
    }
    
    return SITE_URL + "index.html";
}

const REDIRECT_URL = getRedirectUrl();

/* ================= FUNÇÕES AUXILIARES ================= */

function showMsg(id, text, type) {
    const el = document.getElementById(id);
    if (el) {
        el.textContent = text;
        el.className = `message active ${type}`;
        setTimeout(() => el.classList.remove('active'), 5000);
    }
}

function toggleTabs(tab) {
    document.querySelectorAll("form").forEach(f => f.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(`${tab}-form`).classList.add("active");
    document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add("active");
}

function saveLoginTimestamp() {
    localStorage.setItem("lastLoginTime", Date.now().toString());
}

async function uploadProfilePicture(file, userId) {
    try {
        const progressEl = document.getElementById('uploadProgress');
        progressEl.classList.add('active');
        progressEl.textContent = 'Enviando foto...';

        const uploadedFile = await storage.createFile(
            AVATARS_BUCKET_ID,
            Appwrite.ID.unique(),
            file
        );

        await databases.updateDocument(
            DATABASE_ID,
            PROFILES_COLLECTION_ID,
            userId,
            { avatarFileId: uploadedFile.$id }
        );

        progressEl.textContent = 'Foto enviada!';
        setTimeout(() => progressEl.classList.remove('active'), 2000);
        return uploadedFile.$id;
    } catch (error) {
        console.error("Erro ao fazer upload da foto de perfil:", error);
        throw error;
    }
}

async function checkSession() {
    try {
        const user = await account.get();
        if (user) {
            // User is logged in, show the popup
            document.getElementById("loggedInName").textContent = user.name || "Usuário";
            document.getElementById("loggedInEmail").textContent = user.email;
            
            // Try to get avatar
            try {
                const profile = await databases.getDocument(DATABASE_ID, PROFILES_COLLECTION_ID, user.$id);
                if (profile && profile.avatarFileId) {
                    const avatarUrl = storage.getFileView(AVATARS_BUCKET_ID, profile.avatarFileId);
                    document.getElementById("loggedInAvatar").innerHTML = `<img src="${avatarUrl}" alt="Avatar">`;
                } else {
                    // Fallback to initials if no custom avatar
                    const avatarInitials = avatars.getInitials(user.name);
                    document.getElementById("loggedInAvatar").innerHTML = `<img src="${avatarInitials}" alt="Avatar">`;
                }
            } catch (e) {
                // Fallback to initials if profile document doesn't exist yet
                const avatarInitials = avatars.getInitials(user.name);
                document.getElementById("loggedInAvatar").innerHTML = `<img src="${avatarInitials}" alt="Avatar">`;
            }

            document.getElementById("alreadyLoggedInModal").classList.add("active");
        }
    } catch (error) {
        // No active session, stay on login page
        console.log("Nenhuma sessão ativa encontrada.");
    }
}

/* ================= EVENT LISTENERS ================= */

document.addEventListener("DOMContentLoaded", () => {
    
    // Check if user is already logged in
    checkSession();

    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.onclick = () => toggleTabs(btn.dataset.tab);
    });

    document.getElementById("avatar").onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) return showMsg("signupMessage", "Selecione uma imagem válida", "error");

        selectedAvatarFile = file;
        const reader = new FileReader();
        reader.onload = (event) => {
            const preview = document.getElementById("profilePicturePreview");
            preview.innerHTML = `<img src="${event.target.result}" alt="Preview">`;
        };
        reader.readAsDataURL(file);
    };

    // Already Logged In Modal Actions
    document.getElementById("stayLoggedInBtn").onclick = () => {
        window.location.href = REDIRECT_URL;
    };

    document.getElementById("logoutAndSwitchBtn").onclick = async () => {
        try {
            await account.deleteSession('current');
            document.getElementById("alreadyLoggedInModal").classList.remove("active");
        } catch (e) {
            showMsg("loginMessage", "Erro ao sair: " + e.message, "error");
        }
    };

    // ===== LOGIN E-MAIL/SENHA =====
    document.getElementById("loginBtn").onclick = async () => {
        const email = document.getElementById("loginEmail").value;
        const pass = document.getElementById("loginPassword").value;
        if (!email || !pass) return showMsg("loginMessage", "Preencha tudo", "error");

        try {
            const loginBtn = document.getElementById("loginBtn");
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Entrando...';

            await account.createEmailPasswordSession(email, pass);
            saveLoginTimestamp();
            showMsg("loginMessage", "Sucesso! Redirecionando...", "success");
            setTimeout(() => window.location.href = REDIRECT_URL, 1000);
        } catch (e) {
            showMsg("loginMessage", e.message, "error");
            document.getElementById("loginBtn").disabled = false;
            document.getElementById("loginBtn").textContent = "FAZER LOGIN";
        }
    };

    // ===== LOGIN GOOGLE =====
    document.getElementById("googleLoginBtn").onclick = async () => {
        try {
            await account.createOAuth2Session(
                "google", 
                REDIRECT_URL, 
                SITE_URL + "login.html"
            );
        } catch (e) {
            showMsg("loginMessage", "Erro no login Google: " + e.message, "error");
        }
    };

    // ===== LOGIN DISCORD =====
    document.getElementById("discordLoginBtn").onclick = async () => {
        try {
            await account.createOAuth2Session(
                "discord", 
                REDIRECT_URL, 
                SITE_URL + "login.html"
            );
        } catch (e) {
            showMsg("loginMessage", "Erro no login Discord: " + e.message, "error");
        }
    };

    // ===== LOGIN SPOTIFY =====
    document.getElementById("spotifyLoginBtn").onclick = async () => {
        try {
            await account.createOAuth2Session(
                "spotify", 
                REDIRECT_URL, 
                SITE_URL + "login.html"
            );
        } catch (e) {
            showMsg("loginMessage", "Erro no login Spotify: " + e.message, "error");
        }
    };

    // ===== CADASTRO (SIGNUP) =====
    document.getElementById("signupBtn").onclick = async () => {
        const nick = document.getElementById("signupNickname").value;
        const email = document.getElementById("signupEmail").value;
        const pass = document.getElementById("signupPassword").value;
        const confirm = document.getElementById("signupPasswordConfirm").value;

        if (!nick || !email || !pass || !confirm) return showMsg("signupMessage", "Preencha tudo", "error");
        if (pass !== confirm) return showMsg("signupMessage", "Senhas não batem", "error");
        if (pass.length < 6) return showMsg("signupMessage", "Senha muito curta", "error");

        try {
            const signupBtn = document.getElementById("signupBtn");
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="spinner"></span>Criando...';

            // 1. Criar conta
            const user = await account.create(Appwrite.ID.unique(), email, pass, nick);
            
            // 2. Login automático
            await account.createEmailPasswordSession(email, pass);
            
            // 3. Criar documento de perfil no banco de dados
            await databases.createDocument(DATABASE_ID, PROFILES_COLLECTION_ID, user.$id, {
                nickname: nick,
                email: email,
                createdAt: new Date().toISOString()
            });

            // 4. Upload da foto se houver
            if (selectedAvatarFile) {
                await uploadProfilePicture(selectedAvatarFile, user.$id);
            }

            saveLoginTimestamp();
            showMsg("signupMessage", "Conta criada com sucesso!", "success");
            setTimeout(() => window.location.href = REDIRECT_URL, 1500);
        } catch (e) {
            showMsg("signupMessage", e.message, "error");
            document.getElementById("signupBtn").disabled = false;
            document.getElementById("signupBtn").textContent = "CRIAR CONTA";
        }
    };

    // Forgot Password Logic
    document.getElementById("forgotPasswordLink").onclick = (e) => {
        e.preventDefault();
        document.getElementById("forgotPasswordModal").classList.add("active");
    };

    document.getElementById("closeForgotModal").onclick = () => {
        document.getElementById("forgotPasswordModal").classList.remove("active");
    };

    document.getElementById("sendResetEmailBtn").onclick = async () => {
        const email = document.getElementById("forgotPasswordEmail").value;
        if (!email) return showMsg("forgotPasswordMessage", "Informe o e-mail", "error");

        try {
            await account.createRecovery(email, SITE_URL + "reset-password.html");
            showMsg("forgotPasswordMessage", "E-mail de recuperação enviado!", "success");
        } catch (e) {
            showMsg("forgotPasswordMessage", e.message, "error");
        }
    };
});
</script>
</body>
</html>
