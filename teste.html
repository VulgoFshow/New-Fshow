<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fshow - Voto Único</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <link rel="icon" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png" type="image/png">
  <link rel="apple-touch-icon" href="https://i.ibb.co/0Vv5RSLg/Logo-Fshow2.png">
  <meta name="theme-color" content="#8A2BE2">

  <style>
    :root {
      --bg: #06080d;
      --card-bg: rgba(25, 25, 35, 0.85);
      --accent: #00e6d8;
      --accent-2: #4f7cff;
      --accent-soft: rgba(0, 230, 216, 0.25);
      --text: #ffffff;
      --muted: #a0a4b0;
      --radius-md: 12px;
      --radius-lg: 18px;
      --transition: 0.45s cubic-bezier(.2,.8,.2,1);
      --shadow-md: 0 10px 30px rgba(0,0,0,0.45);
      --shadow-glow: 0 0 25px rgba(0,230,216,0.25);
      --panel-border: rgba(255,255,255,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 230, 216, 0.18), transparent 55%),
        radial-gradient(circle at 80% 80%, rgba(79,124,255,0.18), transparent 60%),
        linear-gradient(160deg, var(--bg), #0c1018 45%, #05070b);
      background-attachment: fixed;
    }

    .container {
      max-width: 480px;
      width: 100%;
      padding: 30px 20px;
      animation: fadeSlideUp 0.9s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); filter: blur(6px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    h1 { font-size: 26px; font-weight: 900; text-align: center; letter-spacing: 0.6px; margin-bottom: 12px; }

    .options { display: flex; flex-direction: column; gap: 18px; margin-top: 28px; }

    .option {
      position: relative;
      display: flex;
      background: var(--card-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: var(--transition);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }

    .option:hover {
      transform: translateY(-6px) scale(1.01);
      border-color: var(--accent);
      box-shadow: var(--shadow-md), var(--shadow-glow);
    }

    .option img { width: 120px; height: 120px; object-fit: cover; flex-shrink: 0; border-right: 1px solid var(--panel-border); }

    .option-content { display: flex; align-items: center; padding: 18px; width: 100%; font-size: 18px; font-weight: 600; gap: 15px; }

    .option-content input[type="radio"] {
      appearance: none;
      width: 24px;
      height: 24px;
      border: 2px solid var(--muted);
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      transition: var(--transition);
    }

    .option-content input[type="radio"]:checked { border-color: var(--accent); box-shadow: 0 0 0 5px var(--accent-soft); }
    .option-content input[type="radio"]:checked::before {
      content: ""; position: absolute; inset: 5px; background: var(--accent); border-radius: 50%;
    }

    .captcha-container { margin: 32px 0; display: flex; justify-content: center; }

    button#botaoVotar {
      width: 100%; padding: 18px; font-size: 18px; font-weight: 900; border: none; border-radius: var(--radius-md);
      text-transform: uppercase; letter-spacing: 1.2px; background: #2b2f3a; color: var(--muted); cursor: not-allowed; transition: var(--transition);
    }

    button#botaoVotar.active {
      cursor: pointer; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #001818;
      box-shadow: 0 10px 30px var(--accent-soft);
    }

    #confirmTela, #errorTela, #loadingTela {
      display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; width: 100%;
    }

    .card { background: var(--card-bg); border-radius: 20px; padding: 36px; width: 100%; max-width: 460px; box-shadow: var(--shadow-md); backdrop-filter: blur(12px); }
    .error-msg { color: #ff6b6b; font-weight: 900; font-size: 22px; margin-bottom: 12px; }
    .voltar { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #001818; padding: 14px; border: none; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 800; margin-top: 22px; transition: var(--transition); }

    .spinner {
      width: 52px; height: 52px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.15); border-top-color: var(--accent);
      animation: spin 0.9s linear infinite; margin-bottom: 22px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (min-width: 768px) {
      .container { max-width: 720px; }
      .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px; }
      .option { flex-direction: column; text-align: center; }
      .option img { width: 100%; height: 180px; border-right: none; border-bottom: 1px solid var(--panel-border); }
      .option-content { justify-content: center; padding: 22px 12px; }
    }
  </style>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
</head>
<body>

  <div id="loadingTela" style="display: flex;">
    <div class="spinner"></div>
    <p id="loadingText">Iniciando sistema de segurança...</p>
  </div>

  <div id="votoTela" class="container" style="display: none;">
    <h1>Quem você quer que VENÇA a F10?</h1>
    <p style="text-align: center; color: var(--muted); font-size: 12px; margin-bottom: 20px;">É permitido apenas um voto por dispositivo.</p>
    
    <div class="options">

      <label class="option">
        <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/João.jpg?raw=true" alt="João">
        <div class="option-content">
          <input type="radio" name="vote" value="João"> João
        </div>
      </label>

      <label class="option">
        <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/Koyuh.jpg?raw=true" alt="Koyuh">
        <div class="option-content">
          <input type="radio" name="vote" value="Koyuh"> Koyuh
        </div>
      </label>
  
      <label class="option">
        <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/Luca.jpg?raw=true" alt="Luca">
        <div class="option-content">
          <input type="radio" name="vote" value="Luca"> Luca
        </div>
      </label>
  
      <label class="option">
        <img src="https://github.com/VulgoFshow/New-Fshow/blob/main/fotos/Paiva.jpg?raw=true" alt="Paiva">
        <div class="option-content">
          <input type="radio" name="vote" value="Paiva"> Paiva
        </div>
      </label>
      
    </div>

    <div class="captcha-container">
      <div class="cf-turnstile" data-sitekey="0x4AAAAAACEGre7O4wmrWp4M" data-callback="onCaptchaSuccess" data-theme="dark"></div>
    </div>

    <button id="botaoVotar" onclick="submitVote()" disabled>VOTAR</button>
  </div>

  <div id="confirmTela">
    <div class="card">
      <div style="font-size: 50px; margin-bottom: 10px;">✔</div>
      <h2 id="nomeConfirm"></h2>
      <p style="color: #00ffb3; font-weight: bold;">Voto computado com sucesso!</p>
      <button class="voltar" onclick="location.href='votefshow.html'">VOTO DA TORCIDA</button>
    </div>
  </div>

  <div id="errorTela">
    <div class="card">
      <div class="error-msg" id="errorTitle">Acesso Negado</div>
      <p id="errorMessage"></p>
      <button class="voltar" onclick="location.reload()">TENTAR NOVAMENTE</button>
      <button class="voltar" onclick="location.href='votefshow.html'">VOTO DA TORCIDA</button>
    </div>
  </div>

  <script>
    const CONFIG = {
      ROUND: "rodada_teste3",
      URL: "https://beuqcarjvvjjmwoedvsc.supabase.co",
      KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJldXFjYXJqdnZqam13b2VkdnNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MzUxODQsImV4cCI6MjA4NDQxMTE4NH0.RxFRnk7zqPCJcIcF99BdPYLPRFtMR99diu4lU9pENJ4",
      TABLE: "testes",
      MIN_TIME: 3000 
    };

    let state = {
      client: null,
      deviceFingerprint: null,
      ip: null,
      token: null,
      start: Date.now(),
      isBot: false,
      isVPN: false,
      vpnCheckStatus: null
    };

    function detectBot() {
      const criteria = [
        navigator.webdriver,
        !navigator.languages || navigator.languages.length === 0,
        /HeadlessChrome/.test(navigator.userAgent)
      ];
      if (criteria.some(c => !!c)) state.isBot = true;
    }

    /**
     * Gera um fingerprint robusto do dispositivo usando múltiplas características
     * Combina: canvas fingerprint, webgl, screen info, navigator info, storage, etc
     */
    async function generateDeviceFingerprint() {
      const components = [];

      // 1. Canvas Fingerprint
      try {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.textBaseline = 'alphabetic';
        ctx.fillStyle = '#f60';
        ctx.fillRect(125, 1, 62, 20);
        ctx.fillStyle = '#069';
        ctx.fillText('Browser Fingerprint', 2, 15);
        ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
        ctx.fillText('Browser Fingerprint', 4, 17);
        components.push(canvas.toDataURL());
      } catch (e) {
        components.push('canvas_error');
      }

      // 2. WebGL Fingerprint
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (gl) {
          const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
          if (debugInfo) {
            components.push(gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL));
            components.push(gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL));
          }
        }
      } catch (e) {
        components.push('webgl_error');
      }

      // 3. Screen Info
      components.push(window.screen.width);
      components.push(window.screen.height);
      components.push(window.screen.colorDepth);
      components.push(window.screen.pixelDepth);
      components.push(window.devicePixelRatio);

      // 4. Navigator Info
      components.push(navigator.language);
      components.push(navigator.hardwareConcurrency);
      components.push(navigator.deviceMemory);
      components.push(navigator.maxTouchPoints);
      components.push(navigator.vendor);
      components.push(navigator.platform);
      components.push(navigator.userAgent);

      // 5. Timezone
      components.push(new Date().getTimezoneOffset());

      // 6. Local Storage Availability
      try {
        const test = '__test__';
        localStorage.setItem(test, test);
        localStorage.removeItem(test);
        components.push('localStorage_available');
      } catch (e) {
        components.push('localStorage_unavailable');
      }

      // 7. Session Storage Availability
      try {
        const test = '__test__';
        sessionStorage.setItem(test, test);
        sessionStorage.removeItem(test);
        components.push('sessionStorage_available');
      } catch (e) {
        components.push('sessionStorage_unavailable');
      }

      // 8. Plugins (se disponível)
      if (navigator.plugins && navigator.plugins.length > 0) {
        for (let i = 0; i < navigator.plugins.length; i++) {
          components.push(navigator.plugins[i].name);
        }
      }

      // 9. IndexedDB Support
      components.push(!!window.indexedDB);

      // 10. Audio Context
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        components.push(audioContext.sampleRate);
      } catch (e) {
        components.push('audio_context_error');
      }

      // Combina todos os componentes em uma string
      const fingerprint = components.join('|');

      // Hash SHA-256 do fingerprint
      return await hashString(fingerprint);
    }

    /**
     * Função para fazer hash SHA-256 de uma string
     */
    async function hashString(str) {
      const encoder = new TextEncoder();
      const data = encoder.encode(str);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex;
    }

    /**
     * Detecta VPN usando a API proxycheck.io (gratuita, até 100 queries/dia sem registro)
     * Retorna true se VPN/Proxy detectado, false caso contrário
     */
    async function checkVPN(ipAddress) {
      try {
        document.getElementById("loadingText").innerText = "Verificando segurança da conexão...";
        
        // Usando proxycheck.io v2 API (gratuita)
        const response = await fetch(
          `https://proxycheck.io/v2/${ipAddress}?vpn=1&asn=1&node=1&inf=1&tag=msg`,
          { method: 'GET' }
        );

        if (!response.ok) {
          console.warn("Erro ao verificar VPN:", response.status);
          return false; // Se falhar, permite o voto (não bloqueia por erro)
        }

        const data = await response.json();
        
        // Verifica se o IP é VPN, Proxy ou Tor
        if (data[ipAddress]) {
          const ipData = data[ipAddress];
          
          // Verifica os campos de detecção
          const isVPN = ipData.vpn === 'yes' || ipData.vpn === true;
          const isProxy = ipData.proxy === 'yes' || ipData.proxy === true;
          const isTor = ipData.type === 'Tor' || ipData.isTor === 'yes' || ipData.isTor === true;
          
          state.vpnCheckStatus = {
            vpn: isVPN,
            proxy: isProxy,
            tor: isTor,
            type: ipData.type,
            provider: ipData.provider
          };

          return isVPN || isProxy || isTor;
        }
        
        return false;
      } catch (e) {
        console.error("Erro na verificação de VPN:", e);
        return false; // Se falhar, permite o voto (não bloqueia por erro)
      }
    }

    async function initSecurity() {
      detectBot();
      try {
        state.client = supabase.createClient(CONFIG.URL, CONFIG.KEY);
        
        // Verifica se já votou usando localStorage com o fingerprint
        document.getElementById("loadingText").innerText = "Gerando identificação do dispositivo...";
        
        // Gera fingerprint robusto do dispositivo
        state.deviceFingerprint = await generateDeviceFingerprint();

        // Verifica se este dispositivo já votou
        if (localStorage.getItem("voted_device_" + state.deviceFingerprint)) {
          return showError("Dispositivo já votou", "Este dispositivo já participou desta rodada. Um voto por dispositivo é permitido.");
        }

        document.getElementById("loadingText").innerText = "Validando dispositivo...";
        
        // Também usa FingerprintJS como camada adicional de segurança
        if (typeof FingerprintJS !== 'undefined') {
          const fp = await FingerprintJS.load();
          const result = await fp.get();
          // Armazena como backup, mas usa nosso fingerprint principal
        }

        document.getElementById("loadingText").innerText = "Analisando conexão...";
        try {
          const res = await fetch("https://api.ipify.org?format=json");
          const data = await res.json();
          state.ip = data.ip;
        } catch (e) { 
          state.ip = "0.0.0.0"; 
        }

        // Verifica se está usando VPN
        document.getElementById("loadingText").innerText = "Verificando segurança da conexão...";
        state.isVPN = await checkVPN(state.ip);

        if (state.isVPN) {
          return showError(
            "VPN Detectada", 
            "Não é permitido votar usando VPN, Proxy ou Tor. Por favor, desconecte-se e tente novamente com sua conexão normal."
          );
        }

        // Verifica se já votou no banco de dados
        const { data: existingByFingerprint, error: checkErr1 } = await state.client
          .from(CONFIG.TABLE)
          .select("id")
          .eq("device_fingerprint", state.deviceFingerprint)
          .eq("round_id", CONFIG.ROUND)
          .maybeSingle();
        
        if (existingByFingerprint) {
          localStorage.setItem("voted_device_" + state.deviceFingerprint, "true");
          return showError("Dispositivo já votou", "Este dispositivo já participou desta rodada.");
        }

        // Verifica se o IP já votou (camada adicional de segurança)
        const { data: existingByIP, error: checkErr2 } = await state.client
          .from(CONFIG.TABLE)
          .select("id")
          .eq("ip", state.ip)
          .eq("round_id", CONFIG.ROUND)
          .maybeSingle();
        
        if (existingByIP) {
          return showError(
            "IP já votou", 
            "Este endereço IP já participou desta rodada. Um voto por dispositivo é permitido."
          );
        }
        
        document.getElementById("loadingTela").style.display = "none";
        document.getElementById("votoTela").style.display = "block";
      } catch (e) { 
        console.error("Erro Init:", e);
        showError("Erro de Inicialização", "Falha nos módulos de segurança."); 
      }
    }

    window.onCaptchaSuccess = (token) => { 
      state.token = token; 
      checkReady(); 
    };

    function checkReady() {
      const sel = document.querySelector('input[name="vote"]:checked');
      const btn = document.getElementById("botaoVotar");
      if (sel && state.token) { 
        btn.disabled = false; 
        btn.classList.add("active"); 
      } else { 
        btn.disabled = true; 
        btn.classList.remove("active"); 
      }
    }

    document.querySelectorAll('input[name="vote"]').forEach(r => r.onchange = checkReady);

    async function submitVote() {
      const sel = document.querySelector('input[name="vote"]:checked');
      const btn = document.getElementById("botaoVotar");
      
      if (btn.disabled) return;

      const elapsed = Date.now() - state.start;
      if (elapsed < CONFIG.MIN_TIME && !state.isBot) {
        return showError("Ação muito rápida", "Por favor, aguarde um momento antes de votar.");
      }

      btn.disabled = true;
      btn.innerText = "VALIDANDO...";

      try {
        // 1. Verificação final de duplicidade por fingerprint
        const { data: existing, error: checkErr } = await state.client
          .from(CONFIG.TABLE)
          .select("id")
          .eq("device_fingerprint", state.deviceFingerprint)
          .eq("round_id", CONFIG.ROUND)
          .maybeSingle();
        
        if (existing) {
          localStorage.setItem("voted_device_" + state.deviceFingerprint, "true");
          return showError("Voto Duplicado", "Este dispositivo já votou nesta rodada.");
        }

        // 2. Verificação final de duplicidade por IP
        const { data: existingIP, error: checkErr2 } = await state.client
          .from(CONFIG.TABLE)
          .select("id")
          .eq("ip", state.ip)
          .eq("round_id", CONFIG.ROUND)
          .maybeSingle();
        
        if (existingIP) {
          return showError("IP já votou", "Este endereço IP já participou desta rodada.");
        }

        btn.innerText = "ENVIANDO...";

        // 3. Inserção com fingerprint de dispositivo
        const { error: insErr } = await state.client.from(CONFIG.TABLE).insert([{
          participante: sel.value,
          ip: state.ip || "0.0.0.0",
          device_fingerprint: state.deviceFingerprint,
          round_id: CONFIG.ROUND,
          turnstile_token: state.token,
          user_agent: navigator.userAgent,
          vpn_detected: state.isVPN,
          vpn_check_status: JSON.stringify(state.vpnCheckStatus)
        }]);

        if (insErr) {
            console.error("Erro Supabase:", insErr);
            throw insErr;
        }

        // Sucesso
        localStorage.setItem("voted_device_" + state.deviceFingerprint, "true");
        document.getElementById("votoTela").style.display = "none";
        document.getElementById("confirmTela").style.display = "flex";
        document.getElementById("nomeConfirm").innerText = sel.value;

      } catch (e) {
        console.error("Erro Final:", e);
        showError("Erro ao Votar", "Houve um problema ao salvar seu voto. Detalhes no console.");
        btn.disabled = false;
        btn.innerText = "VOTAR";
      }
    }

    function showError(title, msg) {
      document.getElementById("loadingTela").style.display = "none";
      document.getElementById("votoTela").style.display = "none";
      document.getElementById("errorTela").style.display = "flex";
      document.getElementById("errorTitle").innerText = title;
      document.getElementById("errorMessage").innerText = msg;
    }

    window.addEventListener('DOMContentLoaded', initSecurity);
  </script>
</body>
</html>
