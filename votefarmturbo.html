<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Julgamento do Público</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

:root {
  --primary: #6366f1;
  --primary-hover: #4f46e5;
  --bg: #0f172a;
  --card-bg: #1e293b;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --accent: #10b981;
  --border: #334155;
  --shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
  --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

body {
  background-color: var(--bg);
  background-image: 
    radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
    radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
    radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container { width: 100%; max-width: 480px; perspective: 1000px; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 32px;
  box-shadow: var(--shadow);
  text-align: center;
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
  min-height: 450px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: transform 0.3s ease;
}

.voting-id-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(255,255,255,0.05);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 10px;
  color: var(--text-muted);
  border: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.timer-container { margin-bottom: 24px; }
.timer-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 4px; }
.timer-value { font-size: 36px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--primary); text-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
.timer-value.warning { color: var(--danger); animation: pulse 1s infinite; }

@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

.title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 32px;
  background: linear-gradient(to right, #fff, #94a3b8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
}

.option {
  position: relative;
  padding: 16px 24px;
  margin-bottom: 12px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s ease;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.option:hover { background: rgba(255, 255, 255, 0.06); border-color: var(--primary); color: var(--text-main); }
.option.selected { background: rgba(99, 102, 241, 0.1); border-color: var(--primary); color: var(--text-main); box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
.option.selected::after { content: '✓'; color: var(--primary); font-weight: 800; }

button {
  width: 100%; padding: 18px; margin-top: 16px; border-radius: 16px; border: none;
  background: var(--primary); color: white; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 0.05em;
}

button:hover { background: var(--primary-hover); transform: translateY(-1px); }
button:active { transform: translateY(1px); }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.hidden { display: none !important; }

.vote-name { font-size: 32px; font-weight: 800; color: var(--accent); margin: 12px 0 32px 0; }

#loadingStatus { color: var(--text-muted); font-size: 14px; }
.error-msg { color: var(--danger); font-size: 14px; margin-top: 10px; }

/* Animações de Transição */
.fade-in { animation: fadeIn 0.3s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<div class="container">
  <div class="card" id="mainCard">
    <div class="voting-id-badge" id="votingIdDisplay">ID: --</div>

    <!-- TELA DE CARREGAMENTO -->
    <div id="loadingScreen" class="fade-in">
      <div class="title">INICIANDO...</div>
      <p id="loadingStatus">Otimizando conexão...</p>
    </div>

    <!-- TELA DE VOTAÇÃO -->
    <div id="voteScreen" class="hidden fade-in">
      <div class="timer-container">
        <div class="timer-label">Tempo Restante</div>
        <div class="timer-value" id="countdown">--:--</div>
      </div>
      <div class="title">Quem deve FICAR?</div>
      <div class="option" onclick="selectOption(this)">Koyuh</div>
      <div class="option" onclick="selectOption(this)">Brunno</div>
      <div class="option" onclick="selectOption(this)">Mira</div>
      <button id="voteBtn" onclick="confirmVote()">VOTAR</button>
    </div>

    <!-- TELA DE CONFIRMAÇÃO -->
    <div id="confirmScreen" class="hidden fade-in">
      <div class="title">VOTO REGISTRADO</div>
      <p style="color: var(--text-muted)">Você votou em:</p>
      <div class="vote-name" id="votedName"></div>
      <button onclick="resetVoting()">VOTAR NOVAMENTE</button>
    </div>

    <!-- TELA DE ENCERRADO -->
    <div id="closedScreen" class="hidden fade-in">
      <div class="title" style="background: linear-gradient(to right, #ef4444, #f87171); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">VOTAÇÃO ENCERRADA</div>
      <p style="color: var(--text-muted)">O tempo para esta rodada expirou.</p>
      <button onclick="window.location.reload()" style="margin-top: 30px;">RECARREGAR</button>
    </div>
  </div>
</div>

<script>
// ====================== CONTROLE MANUAL ======================
const VOTACAO_ABERTA = true;  // mude para false para ENCERRAR a votação
const ID_VOTACAO = "Roça-6"; 
// =============================================================

// Configurações do Firebase (necessário para enviar os votos)
const firebaseConfig = {
  apiKey: "AIzaSyD6NAWtJ1bOD-vdVbSQuf5440XaBkg6uaU",
  authDomain: "enquete-fa527.firebaseapp.com",
  databaseURL: "https://enquete-fa527-default-rtdb.firebaseio.com",
  projectId: "enquete-fa527",
  storageBucket: "enquete-fa527.firebasestorage.app",
  messagingSenderId: "544422121318",
  appId: "1:544422121318:web:e3d0412f7bf9740e7142a7"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

const els = {
  loading: document.getElementById("loadingScreen"),
  vote: document.getElementById("voteScreen"),
  confirm: document.getElementById("confirmScreen"),
  closed: document.getElementById("closedScreen"),
  btn: document.getElementById("voteBtn"),
  votedName: document.getElementById("votedName"),
  badge: document.getElementById("votingIdDisplay")
};

let selected = null;
let sending = false;

els.badge.innerText = `ID: ${ID_VOTACAO}`;

function showScreen(screenId) {
  const screens = ['loadingScreen', 'voteScreen', 'confirmScreen', 'closedScreen'];
  screens.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.classList.toggle("hidden", id !== screenId);
    }
  });
}

// INICIALIZAÇÃO
function inicializarVotacao() {
  if (VOTACAO_ABERTA) {
    showScreen("voteScreen");
  } else {
    showScreen("closedScreen");
  }
}

function selectOption(el) {
  if (!VOTACAO_ABERTA) return;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selected = el.innerText;
}

async function confirmVote() {
  if (!VOTACAO_ABERTA || !selected || sending) return;
  
  sending = true;
  els.btn.disabled = true;
  els.btn.innerText = "ENVIANDO...";

  try {
    // Registra o voto no Firestore
    await db.collection("roca36").add({ 
      candidato: selected,
      votacao_id: ID_VOTACAO,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    els.votedName.innerText = selected;
    showScreen("confirmScreen");
  } catch (error) {
    console.error(error);
    alert("Erro ao votar. Tente novamente.");
    els.btn.disabled = false;
    els.btn.innerText = "VOTAR";
  } finally {
    sending = false;
  }
}

function resetVoting() {
  if (!VOTACAO_ABERTA) {
    showScreen("closedScreen");
    return;
  }
  
  selected = null;
  sending = false;
  els.btn.disabled = false;
  els.btn.innerText = "VOTAR";
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  showScreen("voteScreen");
}

// Inicia a lógica ao carregar a página
inicializarVotacao();

</script>
</body>
</html>
